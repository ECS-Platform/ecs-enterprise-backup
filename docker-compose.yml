services:
  ecs:
    build: .
    ports:
      - "8000:8000"
    environment:
      ECS_PG_HOST: postgres-demo
      ECS_PG_PORT: 5432
      ECS_PG_DATABASE: ecs_demo
      ECS_PG_USER: ecs_user
      ECS_PG_PASSWORD: ecs_password
      ECS_LINUX_CONTAINER: ubuntu-demo
      ECS_SONAR_URL: http://sonarqube-demo:9000
      ECS_SONAR_USER: admin
      ECS_SONAR_PASSWORD: a123
      ECS_GITLEAKS_SCAN_PATH: /app/demo-data/gitleaks-sample
      # ---- ECS platform (evidence repository / vector store / object store) ----
      ECS_CONFIG_DIR: /app/config
      ECS_REPO_PG_HOST: postgres
      ECS_REPO_PG_DATABASE: ecs_repository
      ECS_REPO_PG_USER: ecs_user
      ECS_REPO_PG_PASSWORD: ecs_password
      ECS_VECTOR_PG_HOST: pgvector
      ECS_VECTOR_PG_DATABASE: ecs_vectors
      ECS_VECTOR_PG_USER: ecs_user
      ECS_VECTOR_PG_PASSWORD: ecs_password
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ecs_minio
      MINIO_SECRET_KEY: ecs_minio_secret
      REDIS_URL: redis://redis:6379/0
      # ---- self-hosted source systems (real connectivity) ----
      GITEA_URL: http://gitea:3000
      GITEA_TOKEN: ${GITEA_TOKEN:-}
      SONAR_URL: http://sonarqube-demo:9000
      SONAR_USER: ${SONAR_USER:-admin}
      SONAR_PASSWORD: ${SONAR_PASSWORD:-a123}
      JENKINS_URL: http://jenkins:8080
      JENKINS_USER: ${JENKINS_USER:-admin}
      JENKINS_TOKEN: ${JENKINS_TOKEN:-admin123}
      # ---- SaaS sources: enabled + credentials injected from host env (never hardcoded) ----
      ECS_JIRA_ENABLED: ${ECS_JIRA_ENABLED:-false}
      JIRA_URL: ${JIRA_URL:-}
      JIRA_USER: ${JIRA_USER:-}
      JIRA_TOKEN: ${JIRA_TOKEN:-}
      ECS_CONFLUENCE_ENABLED: ${ECS_CONFLUENCE_ENABLED:-false}
      CONFLUENCE_URL: ${CONFLUENCE_URL:-}
      CONFLUENCE_USER: ${CONFLUENCE_USER:-}
      CONFLUENCE_TOKEN: ${CONFLUENCE_TOKEN:-}
      ECS_GITHUB_ENABLED: ${ECS_GITHUB_ENABLED:-false}
      GITHUB_URL: ${GITHUB_URL:-https://api.github.com}
      GITHUB_ORG: ${GITHUB_ORG:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ECS_FIGMA_ENABLED: ${ECS_FIGMA_ENABLED:-false}
      FIGMA_URL: ${FIGMA_URL:-https://api.figma.com}
      FIGMA_TOKEN: ${FIGMA_TOKEN:-}
      FIGMA_TEAM_IDS: ${FIGMA_TEAM_IDS:-}
      # ---- Microsoft 365 (Teams + SharePoint via Graph, shared app registration) ----
      ECS_TEAMS_ENABLED: ${ECS_TEAMS_ENABLED:-false}
      ECS_SHAREPOINT_ENABLED: ${ECS_SHAREPOINT_ENABLED:-false}
      MS_GRAPH_URL: ${MS_GRAPH_URL:-https://graph.microsoft.com/v1.0}
      MS_TENANT_ID: ${MS_TENANT_ID:-}
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
      SHAREPOINT_SITE_ID: ${SHAREPOINT_SITE_ID:-}
      # LLM provider/keys are injected from the host environment (never hardcoded).
      # Default provider is local Ollama (qwen3:8b); switch with ECS_LLM_PROVIDER=gemini.
      ECS_LLM_PROVIDER: ${ECS_LLM_PROVIDER:-ollama}
      ECS_LLM_MODEL: ${ECS_LLM_MODEL:-}
      ECS_EMBEDDING_MODEL: ${ECS_EMBEDDING_MODEL:-}
      ECS_VECTOR_DIM: ${ECS_VECTOR_DIM:-768}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./ECS_Query_Driven_Control_Library_Consolidated.xlsx:/app/ECS_Query_Driven_Control_Library_Consolidated.xlsx:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./demo-data/gitleaks-sample:/app/demo-data/gitleaks-sample:ro
      - ./config:/app/config:ro
      # ---- dev hot-reload: source bind-mounts (no rebuild on .py edits) ----
      - ./app:/app/app
      - ./modules:/app/modules
      - ./ecs_platform:/app/ecs_platform
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000",
              "--reload", "--reload-dir", "/app/app", "--reload-dir", "/app/modules",
              "--reload-dir", "/app/ecs_platform"]
    depends_on:
      - postgres-demo
      - postgres
      - pgvector
    # Reach a host-local Ollama daemon (qwen3:8b) from inside the container.
    # Required on Linux; a no-op on Docker Desktop where this is auto-provided.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres-demo:
    image: postgres:16
    # Pin the container name so the predefined-query PostgreSQL connector
    # (ECS_PG_HOST=postgres-demo) resolves the same DNS name regardless of the
    # compose project prefix.
    container_name: postgres-demo
    environment:
      POSTGRES_DB: ecs_demo
      POSTGRES_USER: ecs_user
      POSTGRES_PASSWORD: ecs_password
    ports:
      - "5432:5432"
    restart: unless-stopped

  ubuntu-demo:
    image: ubuntu:22.04
    profiles: ["demo-connectors"]
    # Pin the container name: the Linux connector runs `docker exec ubuntu-demo`
    # (ECS_LINUX_CONTAINER=ubuntu-demo). Without this, compose names the
    # container "<project>-ubuntu-demo-1" and the exec fails with
    # "No such container: ubuntu-demo".
    container_name: ubuntu-demo
    hostname: ubuntu-demo
    command: ["sleep", "infinity"]
    restart: unless-stopped

  sonarqube-demo:
    image: sonarqube:lts-community
    profiles: ["demo-connectors"]
    # Pin the container name so the SonarQube connector
    # (ECS_SONAR_URL=http://sonarqube-demo:9000) resolves the same DNS name
    # regardless of the compose project prefix.
    container_name: sonarqube-demo
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    restart: unless-stopped

  # ============================================================
  # ECS platform backing services (system of record + AI layer)
  # ============================================================
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ecs_repository
      POSTGRES_USER: ecs_user
      POSTGRES_PASSWORD: ecs_password
    volumes:
      - ecs_repo_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecs_user -d ecs_repository"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ecs_vectors
      POSTGRES_USER: ecs_user
      POSTGRES_PASSWORD: ecs_password
    volumes:
      - ecs_vector_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecs_user -d ecs_vectors"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - ecs_redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ecs_minio
      MINIO_ROOT_PASSWORD: ecs_minio_secret
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - ecs_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Self-hosted source systems (GitHub substitute + CI) ----
  gitea:
    image: gitea/gitea:1.22
    profiles: ["sources"]
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__ROOT_URL: http://localhost:3000/
      # Install is completed via the /install HTTP form by the seeding script
      # (creates the admin user too), so no `docker compose exec` is required.
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__server__OFFLINE_MODE: "true"
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - ecs_gitea_data:/data
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts
    profiles: ["sources"]
    environment:
      # Skip the setup wizard. An init.groovy.d script then sets up a deterministic
      # admin account and allows anonymous read, so the ECS connector reports
      # connected=true and the seed script can create jobs with admin creds.
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      JENKINS_ADMIN_USER: ${JENKINS_USER:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_TOKEN:-admin123}
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ecs_jenkins_data:/var/jenkins_home
      - ./demo-data/jenkins/init.groovy.d:/var/jenkins_home/init.groovy.d:ro
    restart: unless-stopped

volumes:
  ecs_repo_data:
  ecs_vector_data:
  ecs_redis_data:
  ecs_minio_data:
  ecs_gitea_data:
  ecs_jenkins_data:
