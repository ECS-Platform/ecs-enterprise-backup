name: ECS CI

# Lightweight CI: compile the codebase and run the offline-safe targeted test
# suites. Runs with DEMO_MODE (no external DB / IdP / LLM required), matching how
# the test suite is designed to run. Keep this fast and dependency-light.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEMO_MODE: "true"
      ECS_AUTH_ENABLED: "false"
      ECS_VALIDATE_CONFIG: "off"
      PYTHONPATH: "."

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile (syntax check)
        run: python -m compileall -q app modules scripts tests config

      - name: Run targeted tests
        run: |
          pytest -q -p no:cacheprovider \
            tests/test_connector_execution_ingestion.py \
            tests/test_batch2_rest_ui.py \
            tests/test_rag_answer_validation.py \
            tests/test_audit_llm_workbench.py \
            tests/test_uat_asset_scheduler.py \
            tests/test_connector_test_workbench.py \
            tests/test_evidence_repository.py \
            tests/test_production_hardening.py \
            tests/test_ui_nav_and_summary_cleanup.py
