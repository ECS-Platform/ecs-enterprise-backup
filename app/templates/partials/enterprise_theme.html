<style>
:root {
  --ecs-sidebar: #17202a;
  --ecs-accent: #2563eb;
  --ecs-success: #059669;
  --ecs-card-radius: 12px;
}
body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
body.ecs-enterprise-body { background: #f4f6f9; }

/* Legacy .sidebar alias for pages not yet migrated */
.sidebar { min-height: 100vh; background: var(--ecs-sidebar) !important; }

/* Enterprise sidebar navigation system */
.ecs-sidebar {
  background: var(--ecs-sidebar) !important;
  min-height: 100vh;
  padding: 0;
  flex: 0 0 auto;
}
.ecs-sidebar-inner {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding: 1rem 0.75rem;
  overflow-x: hidden;
  overflow-y: auto;
}
.ecs-sidebar-brand {
  font-size: 1.05rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: #f8f9fa;
  padding: 0 0.5rem 0.85rem;
  margin-bottom: 0.5rem;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  line-height: 1.3;
}
.ecs-sidebar-section-label {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.09em;

  padding: 0.5rem 0.5rem 0.35rem;
  margin: 0;
}
.ecs-sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 0.25rem;
}
.ecs-sidebar-nav-modules {
  margin-bottom: 0.75rem;
}
.ecs-sidebar-btn {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  width: 100%;
  min-height: 36px;
  padding: 0.45rem 0.7rem;
  font-size: 0.8125rem;
  font-weight: 500;
  line-height: 1.25;
  color: #dee2e6;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 6px;
  text-decoration: none;
  text-align: left;
  white-space: normal;
  word-wrap: break-word;
  transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  box-sizing: border-box;
}
.ecs-sidebar-btn:hover {
  background: rgba(255, 255, 255, 0.11);
  border-color: rgba(255, 255, 255, 0.26);
  color: #ffffff;
}
.ecs-sidebar-btn:focus-visible {
  outline: 2px solid rgba(13, 110, 253, 0.6);
  outline-offset: 2px;
}
.ecs-sidebar-btn.is-active {
  background: rgba(13, 110, 253, 0.22);
  border-color: rgba(13, 110, 253, 0.55);
  color: #ffffff;
}
.ecs-sidebar-btn-dashboard {
  background: rgba(255, 193, 7, 0.1);
  border-color: rgba(255, 193, 7, 0.32);
  color: #ffe69c;
}
.ecs-sidebar-btn-dashboard:hover {
  background: rgba(255, 193, 7, 0.18);
  border-color: rgba(255, 193, 7, 0.45);
  color: #fff3cd;
}
.ecs-sidebar-btn-dashboard.is-active {
  background: rgba(255, 193, 7, 0.22);
  border-color: rgba(255, 193, 7, 0.5);
  color: #fff;
}
.ecs-sidebar-btn-danger {
  background: rgba(220, 53, 69, 0.14);
  border-color: rgba(220, 53, 69, 0.38);
  color: #f1aeb5;
}
.ecs-sidebar-btn-danger:hover {
  background: rgba(220, 53, 69, 0.24);
  border-color: rgba(220, 53, 69, 0.52);
  color: #ffffff;
}
.ecs-sidebar-divider {
  height: 1px;
  background: rgba(255, 255, 255, 0.1);
  margin: 0.6rem 0;
  flex-shrink: 0;
}
.ecs-sidebar-footer {
  margin-top: auto;
  padding-top: 0.75rem;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}
@media (max-width: 767.98px) {
  .ecs-sidebar { min-height: auto; }
  .ecs-sidebar-inner { min-height: auto; max-height: none; }
}
.btn-ecs, .btn-primary, .btn-dark, .btn-outline-primary { border-radius: 6px; font-weight: 500; }
.btn-ecs-primary { background: var(--ecs-accent); border-color: var(--ecs-accent); color: #fff; }
.btn-ecs-primary:hover { background: #0b5ed7; color: #fff; }
.card { border-radius: var(--ecs-card-radius); border: 1px solid #e8ecef; }
.card.shadow, .card.shadow-sm { box-shadow: 0 2px 12px rgba(0,0,0,.06) !important; }

.table { font-size: 0.9rem; }
.table thead { background: #f1f3f5; }
.kpi, .kpi-card { border-left: 4px solid var(--ecs-accent); }
.chat-popup {

  box-shadow: none; width: auto;
}
.chat-ts { font-size: 0.7rem; color: #6c757d; }
.enterprise-feed { max-height: 180px; overflow-y: auto; font-size: 0.8rem; }
.notification-item { padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; }
.notification-item.success { background: #d1e7dd; }
.notification-item.danger { background: #f8d7da; }

.workflow-actions .btn { font-size: 0.75rem; padding: 0.2rem 0.45rem; }
.table-warning { --bs-table-bg: #fff3cd33; }
.table-danger { --bs-table-bg: #f8d7da33; }
.page-header { border-bottom: 1px solid #dee2e6; padding-bottom: 12px; margin-bottom: 20px; }
.ecs-nav-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 1.35rem; height: 1.35rem; padding: 0 0.35rem; margin-left: auto;
  font-size: 0.65rem; font-weight: 700; line-height: 1;
  background: rgba(255, 193, 7, 0.92); color: #1a252f;
  border-radius: 999px; flex-shrink: 0;
}
.ecs-sidebar-btn { position: relative; gap: 0.35rem; }
.ecs-table-wrap { overflow-x: auto; max-width: 100%; }
.ecs-workflow-table { font-size: 0.78rem; white-space: nowrap; }
.ecs-workflow-table td, .ecs-workflow-table th { vertical-align: middle; padding: 0.35rem 0.45rem; }
.ecs-sticky-actions { position: sticky; right: 0; background: #fff; box-shadow: -4px 0 8px rgba(0,0,0,.04); z-index: 2; min-width: 140px; }
.ecs-action-group { display: flex; flex-wrap: wrap; gap: 0.2rem; }
.ecs-badge-sm { font-size: 0.65rem; font-weight: 600; }
.ecs-cell-sm { font-size: 0.72rem; }
.ecs-cell-xs { font-size: 0.68rem; }
.row-approved { background-color: #d1e7dd !important; }
.row-rejected { background-color: #f8d7da55 !important; }
.row-pending { background-color: #fff3cd44 !important; }
.row-warning { background-color: #ffe69c33 !important; }
.ecs-workflow-card { border: 1px solid #e8ecef; }
.ecs-module-banner { background: linear-gradient(135deg, #f8f9fa 0%, #eef2f7 100%); border-left: 4px solid var(--ecs-accent) !important; }
.ecs-chat-copilot {
  display: flex; flex-direction: column;
  transition: opacity 0.25s ease, transform 0.25s ease, width 0.2s ease;
  font-family: inherit;
}
.ecs-chat-copilot.ecs-chat-dim { opacity: 0.88; }
.ecs-chat-copilot.ecs-chat-size-sm { width: 320px; }
.ecs-chat-copilot.ecs-chat-size-md { width: 400px; }
.ecs-chat-copilot.ecs-chat-size-lg { width: 520px; }
.ecs-chat-copilot.ecs-chat-maximized { width: min(560px, calc(100vw - 32px)) !important; }
.ecs-chat-copilot.ecs-chat-maximized .ecs-chat-panel { max-height: min(88vh, 820px) !important; }

.ecs-chat-panel {
  display: flex; flex-direction: column;
  background: #fff; border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,.16), 0 2px 8px rgba(0,0,0,.08);
  border: 1px solid #dee2e6;
  max-height: 72vh; overflow: hidden;
  transition: opacity 0.22s ease, transform 0.22s ease, max-height 0.22s ease;
}
.ecs-chat-body {
  padding: 0 14px 14px; overflow-y: auto; flex: 1 1 auto;
  max-height: calc(72vh - 52px);
}
.ecs-chat-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 8px; padding: 10px 12px 8px;
  border-bottom: 1px solid #e9ecef;
  background: linear-gradient(180deg, #f8fafc 0%, #fff 100%);
  border-radius: 14px 14px 0 0;
  flex-shrink: 0;
}
.ecs-chat-header-main { display: flex; align-items: flex-start; gap: 8px; min-width: 0; flex: 1; }
.ecs-chat-header-text { min-width: 0; }
.ecs-chat-title { font-size: 0.88rem; color: #1a252f; display: block; }
.ecs-chat-logo { color: var(--ecs-accent, #0d6efd); font-size: 1.1rem; line-height: 1; margin-top: 2px; }
.ecs-chat-logo-sm { color: var(--ecs-accent, #0d6efd); font-size: 0.95rem; }
.ecs-chat-header-controls {
  display: flex; align-items: center; gap: 2px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end;
}
.ecs-chat-ctrl-btn {
  border: none; background: transparent; color: #495057;
  width: 26px; height: 26px; border-radius: 6px; font-size: 0.75rem; line-height: 1;
  cursor: pointer; padding: 0; display: inline-flex; align-items: center; justify-content: center;
  transition: background 0.15s ease, color 0.15s ease;
}
.ecs-chat-ctrl-btn:hover { background: #e9ecef; color: #1a252f; }
.ecs-chat-close-btn:hover { background: #f8d7da; color: #842029; }
.ecs-chat-size-group .btn { padding: 0.1rem 0.35rem; font-size: 0.62rem; min-width: 24px; }
.ecs-chat-size-group .btn.active { background: var(--ecs-accent, #0d6efd); color: #fff; border-color: var(--ecs-accent, #0d6efd); }
.ecs-chat-role-badge { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.04em; flex-shrink: 0; }

.ecs-chat-collapsed-bar {
  display: none; align-items: center; gap: 8px;
  background: linear-gradient(135deg, #1a252f 0%, #2c3e50 100%);
  color: #fff; padding: 8px 12px; border-radius: 999px;
  box-shadow: 0 4px 20px rgba(0,0,0,.22); cursor: pointer;
  min-width: 200px; max-width: 340px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.ecs-chat-collapsed-bar:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,.28); }
.ecs-chat-collapsed-title { font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
.ecs-chat-unread-badge, .ecs-chat-alert-badge { font-size: 0.6rem; }
.ecs-chat-expand-btn { color: #fff !important; background: rgba(255,255,255,.15) !important; margin-left: auto; }
.ecs-chat-expand-btn:hover { background: rgba(255,255,255,.28) !important; }

.ecs-chat-fab {
  display: none; position: fixed; bottom: 20px; right: 20px;
  width: 52px; height: 52px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
  color: #fff; box-shadow: 0 4px 18px rgba(13,110,253,.45);
  cursor: pointer; z-index: 1050; align-items: center; justify-content: center;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.ecs-chat-fab:hover { transform: scale(1.06); box-shadow: 0 6px 22px rgba(13,110,253,.5); }
.ecs-chat-fab-icon { font-size: 1.25rem; }
.ecs-chat-fab-badge {
  position: absolute; top: -2px; right: -2px; font-size: 0.6rem;
  min-width: 1.1rem; height: 1.1rem; padding: 0 0.25rem;
}

.ecs-chat-copilot[data-state="expanded"] .ecs-chat-panel { display: flex; opacity: 1; transform: translateY(0); }
.ecs-chat-copilot[data-state="expanded"] .ecs-chat-collapsed-bar { display: none; }
.ecs-chat-copilot[data-state="expanded"] .ecs-chat-fab { display: none; }

.ecs-chat-copilot[data-state="minimized"] .ecs-chat-panel { display: none; }
.ecs-chat-copilot[data-state="minimized"] .ecs-chat-collapsed-bar { display: flex; }
.ecs-chat-copilot[data-state="minimized"] .ecs-chat-fab { display: none; }

.ecs-chat-copilot[data-state="closed"] .ecs-chat-panel { display: none; }
.ecs-chat-copilot[data-state="closed"] .ecs-chat-collapsed-bar { display: none; }
.ecs-chat-copilot[data-state="closed"] .ecs-chat-fab { display: inline-flex; }

.ecs-chat-resize-handle {
  position: absolute; top: 0; left: 0; width: 14px; height: 14px;
  cursor: nwse-resize; opacity: 0.35; border-top-left-radius: 14px;
  background: linear-gradient(135deg, #adb5bd 40%, transparent 40%);
}
.ecs-chat-panel { position: relative; }

.ecs-chat-history { max-height: 120px; overflow-y: auto; font-size: 0.75rem; margin-bottom: 0.35rem; }
.ecs-chat-msg { padding: 0.35rem 0.5rem; margin-bottom: 0.35rem; border-radius: 6px; }
.ecs-chat-msg-user { background: #e7f1ff; }
.ecs-chat-msg-bot { background: #f8f9fa; border: 1px solid #e9ecef; }
.ecs-chat-response { background: #fff !important; }
.ecs-suggest-btn { font-size: 0.68rem; padding: 0.15rem 0.4rem; }
.ecs-chat-response-html { white-space: normal; }

@media (max-width: 768px) {
  .ecs-chat-copilot.ecs-chat-size-sm,
  .ecs-chat-copilot.ecs-chat-size-md,
  .ecs-chat-copilot.ecs-chat-size-lg { width: calc(100vw - 24px); max-width: 420px; }

  .ecs-chat-header-controls .ecs-chat-size-group { display: none; }

}
.ecs-itpp-panel .ecs-kpi-card { border-left: 4px solid var(--ecs-accent); }
.ecs-itpp-table { font-size: 0.78rem; }
.ecs-itpp-action-btn { font-size: 0.65rem; padding: 0.12rem 0.35rem; margin: 0.1rem; }
.ecs-validation-panel .ecs-validation-table { font-size: 0.75rem; }
.ecs-val-badge { font-size: 0.62rem; }
.ecs-val-type { font-size: 0.62rem; font-weight: 500; }
.ecs-governance-panel .progress { background: #e9ecef; }
.ecs-itpp-domain .card-header { background: #f8f9fa; }
.ecs-grc-table { font-size: 0.78rem; }
.ecs-grc-kpi { min-height: 72px; }
.ecs-ops-intel-card { background: #fff; }
.ecs-ops-severity { font-size: 0.65rem; }
.ecs-ops-mode-select .btn { margin: 0.15rem 0.1rem 0 0; font-size: 0.68rem; }
.ecs-ops-timeline-item { padding: 0.25rem 0; border-bottom: 1px solid #eee; }
.ecs-ops-detail { font-size: 0.8rem; margin-top: 0.5rem; }
.ecs-ops-detail ul { margin-bottom: 0.5rem; padding-left: 1.1rem; }

.ecs-paginated-table thead th {
  position: sticky; top: 0; z-index: 2;
  background: #f1f3f5; box-shadow: 0 1px 0 #dee2e6;
}
.ecs-pagination-bar {
  display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
  gap: 0.5rem 1rem; padding: 0.65rem 0.75rem; margin-top: 0.5rem; margin-bottom: 0.75rem;
  background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; font-size: 0.78rem;
}
.ecs-pagination-summary { color: #495057; font-weight: 500; }
.ecs-pagination-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem 0.75rem; }
.ecs-pagination-size-label { margin: 0; font-size: 0.75rem; color: #6c757d; }
.ecs-pagination-nav .btn { min-width: 2rem; padding: 0.15rem 0.4rem; font-size: 0.72rem; }
.ecs-pagination-nav .btn.active { background: var(--ecs-accent, #0d6efd); color: #fff; border-color: var(--ecs-accent, #0d6efd); }
.ecs-pg-ellipsis { padding: 0 0.25rem; color: #adb5bd; }
.ecs-pagination-jump { font-size: 0.72rem; color: #6c757d; white-space: nowrap; }
@media (max-width: 576px) {
  .ecs-pagination-bar { flex-direction: column; align-items: stretch; }
  .ecs-pagination-controls { justify-content: center; }
}
</style>
