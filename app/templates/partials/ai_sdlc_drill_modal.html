<div class="modal fade" id="aisdlcDrillModal" tabindex="-1" aria-labelledby="aisdlcDrillTitle" aria-hidden="true">
<div class="modal-dialog modal-lg modal-dialog-scrollable">
<div class="modal-content">
<div class="modal-header py-2">
<h5 class="modal-title fs-6" id="aisdlcDrillTitle">Detail</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body" id="aisdlcDrillBody"><div class="text-muted small">Loading…</div></div>
<div class="modal-footer py-2">
<button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Close</button>
<a href="#" class="btn btn-sm btn-primary d-none" id="aisdlcDrillLink">Open related module</a>
</div>
</div></div></div>
<script>
(function () {
  var modalEl = document.getElementById('aisdlcDrillModal');
  if (!modalEl || typeof bootstrap === 'undefined') return;
  var modal = new bootstrap.Modal(modalEl);
  var titleEl = document.getElementById('aisdlcDrillTitle');
  var bodyEl = document.getElementById('aisdlcDrillBody');
  var linkEl = document.getElementById('aisdlcDrillLink');
  var q = '?role={{ role|urlencode }}&user={{ user|urlencode }}';

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderTable(rows, cols) {
    if (!rows || !rows.length) return '<p class="text-muted small">No records.</p>';
    var h = '<div class="table-responsive ecs-paginated-wrap ecs-fit-view"><table class="table table-sm aisdlc-table ecs-paginated-table ecs-compact-table mb-0"><thead><tr>';
    cols.forEach(function (c) { h += '<th>' + esc(c.label) + '</th>'; });
    h += '</tr></thead><tbody>';
    rows.forEach(function (r) {
      h += '<tr>';
      cols.forEach(function (c) {
        var v = r[c.key];
        if (v && typeof v === 'object') v = Array.isArray(v) ? v.join(', ') : JSON.stringify(v);
        h += '<td>' + esc(v) + '</td>';
      });
      h += '</tr>';
    });
    h += '</tbody></table></div>';
    return h;
  }

  function colsFromRows(rows, max) {
    if (!rows || !rows.length) return [];
    return Object.keys(rows[0]).slice(0, max || 8).map(function (k) {
      return { key: k, label: k.replace(/_/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); }) };
    });
  }

  function renderPayload(p) {
    if (!p) return '<p class="text-muted">No data.</p>';
    if (p.type === 'application' && p.data) {
      var d = p.data;
      var html = '<dl class="row small mb-2">' +
        ['name','application','owner','model','use_case','risk_tier','compliance_score','policy_compliance','model_status','users_daily','tokens_mtd','last_review']
        .map(function (k) { return '<dt class="col-sm-4">' + esc(k.replace(/_/g,' ')) + '</dt><dd class="col-sm-8">' + esc(d[k]) + '</dd>'; }).join('') +
        '</dl>';
      if (p.related_prompts && p.related_prompts.length) {
        html += '<p class="small fw-semibold mb-1">Related prompts (' + p.related_prompts.length + ')</p>';
        html += renderTable(p.related_prompts, colsFromRows(p.related_prompts, 6));
      }
      return html;
    }
    if (p.type === 'heatmap_cell' && p.data) {
      var c = p.data;
      return '<dl class="row small mb-0">' +
        ['application','dimension','score','risk','controls_reviewed','open_findings','last_assessed']
        .map(function (k) { return '<dt class="col-sm-4">' + esc(k.replace(/_/g,' ')) + '</dt><dd class="col-sm-8">' + esc(c[k]) + '</dd>'; }).join('') +
        '</dl>';
    }
    if ((p.type === 'prompt' || p.type === 'gap' || p.type === 'version' || p.type === 'framework') && p.data) {
      var d = p.data;
      return '<dl class="row small">' +
        Object.keys(d).filter(function (k) { return typeof d[k] !== 'object'; }).map(function (k) {
          return '<dt class="col-sm-4">' + esc(k) + '</dt><dd class="col-sm-8">' + esc(d[k]) + '</dd>';
        }).join('') +
        '</dl>' + (p.rows && p.rows.length ? renderTable(p.rows, colsFromRows(p.rows)) : '');
    }
    if (p.type === 'list' && p.rows) {
      return '<p class="small text-muted mb-2">' + esc(p.title || '') + '</p>' + renderTable(p.rows, colsFromRows(p.rows));
    }
    if (p.type === 'tokens' && p.data) {
      var t = p.data;
      var html = '<p class="small"><strong>By application (' + (t.by_application || []).length + ')</strong></p>' + renderTable(t.by_application, [
        {key:'application',label:'Application'},{key:'tokens',label:'Tokens'},{key:'cost_usd',label:'Cost USD'}
      ]);
      if (t.monthly_trend && t.monthly_trend.length) {
        html += '<p class="small mt-2"><strong>12-month trend</strong></p>' + renderTable(t.monthly_trend, [
          {key:'month',label:'Month'},{key:'tokens',label:'Tokens'}
        ]);
      }
      return html;
    }
    if (p.type === 'summary' && p.data) {
      var rows = p.rows || [];
      if (rows.length) return renderTable(rows, colsFromRows(rows));
      return '<pre class="small bg-light p-2 rounded">' + esc(JSON.stringify(p.data, null, 2)) + '</pre>';
    }
    if (p.workflow && p.workflow.length) {
      var wf = '<div class="aisdlc-workflow">';
      p.workflow.forEach(function (s) {
        var cls = s.status === 'Complete' ? 'is-done' : (s.status === 'In Progress' || s.status === 'Conditional' ? 'is-active' : '');
        wf += '<div class="aisdlc-wf-step ' + cls + '"><div class="step-n">' + esc(s.step) + '</div><div>' + esc(s.stage) + '</div><div class="text-muted">' + esc(s.actor || '') + '</div></div>';
      });
      wf += '</div>';
      var body = p.data ? renderPayload({ type: 'application', data: p.data }) : '';
      return body + wf;
    }
    if (p.data && typeof p.data === 'object') {
      return renderPayload({ type: 'list', title: p.title, rows: Array.isArray(p.data) ? p.data : [p.data] });
    }
    return '<p class="text-muted small">' + esc(p.title || 'Detail') + '</p>';
  }

  function setLink(href, text) {
    if (href) {
      linkEl.href = href + q;
      linkEl.textContent = text || 'Open related module';
      linkEl.classList.remove('d-none');
    } else {
      linkEl.classList.add('d-none');
    }
  }

  function openDrill(kind, metric, id, extra) {
    extra = extra || {};
    var url;
    if (kind === 'registry') {
      url = '/api/ai-sdlc/registry/drill?section=' + encodeURIComponent(metric || '') + '&item_id=' + encodeURIComponent(id || '');
    } else if (kind === 'sdlc') {
      url = '/api/ai-sdlc/sdlc/drill?metric=' + encodeURIComponent(metric || '') +
        '&release=' + encodeURIComponent(extra.release || '') +
        '&stage=' + encodeURIComponent(extra.stage || '') +
        '&item_id=' + encodeURIComponent(id || '');
    } else {
      url = '/api/ai-sdlc/posture/drill?metric=' + encodeURIComponent(metric || '') + '&item_id=' + encodeURIComponent(id || '');
    }
    titleEl.textContent = 'Loading…';
    bodyEl.innerHTML = '<div class="text-muted small">Loading…</div>';
    setLink(null);
    modal.show();
    fetch(url).then(function (r) { return r.json(); }).then(function (j) {
      var p = j.payload || j.data || {};
      titleEl.textContent = p.title || 'Detail';
      bodyEl.innerHTML = renderPayload(p);
      if (window.ecsRefreshPagination) window.ecsRefreshPagination();
      if (metric === 'application' || (metric === 'inventory' && id)) setLink('/mvp/ai-registry', 'Open Model & Prompt Registry');
      else if (kind === 'sdlc' && extra.stage) setLink('/mvp/sdlc-gates/' + extra.stage, 'Open stage detail');
      else if (metric === 'models' || kind === 'registry') setLink('/mvp/ai-governance', 'Open AI Governance Posture');
    }).catch(function () {
      bodyEl.innerHTML = '<p class="text-danger small">Failed to load drill-down.</p>';
    });
  }

  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-aisdlc-drill]');
    if (!el) return;
    e.preventDefault();
    openDrill(
      el.getAttribute('data-aisdlc-drill'),
      el.getAttribute('data-metric') || el.getAttribute('data-section'),
      el.getAttribute('data-id') || '',
      {
        release: el.getAttribute('data-release') || '',
        stage: el.getAttribute('data-stage') || ''
      }
    );
  });

  document.querySelectorAll('[data-aisdlc-drill]').forEach(function (el) {
    if (el.tabIndex < 0 && !el.href) el.tabIndex = 0;
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
    });
  });
})();
</script>
