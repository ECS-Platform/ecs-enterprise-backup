<style>
/* ── Executive Compact Charts (platform-wide) ── */
:root {
  --ecs-chart-navy: #1e3a5f;
  --ecs-chart-slate: #475569;
  --ecs-chart-blue: #3b6ea5;
  --ecs-chart-teal: #0d9488;
  --ecs-chart-green: #4a7c59;
  --ecs-chart-orange: #c27803;
  --ecs-chart-red: #b4534a;
  --ecs-chart-muted: #94a3b8;
  --ecs-chart-track: #eef2f6;
  --ecs-chart-max-h: 180px;
  --ecs-chart-bar-w: 14px;
}

.chart-card,
.executive-analytics-card,
.ecs-hub-chart,
.ecs-analytics-chart-card {
  background: var(--ecs-surface-elevated, #fff);
  border: 1px solid var(--ecs-border-soft, #e2e8f0);
  border-radius: 8px;
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
  padding: 0.55rem 0.65rem;
  margin-bottom: 0.5rem;
  max-width: 100%;
}

.chart-card-header,
.ecs-hub-chart-title {
  margin-bottom: 0.35rem;
}

.chart-card-title,
.ecs-hub-chart-title {
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ecs-chart-slate);
  line-height: 1.3;
}

.chart-card-subtitle {
  font-size: 0.58rem;
  color: var(--ecs-chart-muted);
  margin-top: 0.1rem;
  line-height: 1.35;
}

.chart-container-compact {
  max-height: var(--ecs-chart-max-h);
  width: 100%;
  max-width: 65%;
  min-width: 180px;
  overflow: hidden;
  padding: 0.15rem 0 0.25rem;
}

.compact-chart-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}

@media (max-width: 991px) {
  .compact-chart-grid { grid-template-columns: 1fr; }
  .chart-container-compact { max-width: 100%; }
}

/* Vertical mini bar charts */
.mini-bar-chart,
.ecs-bar-chart {
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
  gap: 5px;
  height: 72px;
  max-height: 72px;
  flex-wrap: nowrap;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 0.1rem 0 0.15rem;
  scrollbar-width: thin;
}

.ecs-bar-col {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 22px;
  max-width: 36px;
  width: var(--ecs-chart-bar-w);
}

.ecs-bar-fill {
  width: var(--ecs-chart-bar-w);
  max-width: var(--ecs-chart-bar-w);
  min-width: 8px;
  border-radius: 3px 3px 0 0;
  min-height: 3px;
  background: var(--ecs-chart-blue);
  opacity: 0.88;
  transition: opacity 0.15s ease, transform 0.15s ease;
  cursor: default;
}

.ecs-bar-fill:hover { opacity: 1; transform: translateY(-1px); }

.ecs-bar-fill[data-tone="success"],
.ecs-bar-fill.tone-success { background: var(--ecs-chart-green); }
.ecs-bar-fill[data-tone="warning"],
.ecs-bar-fill.tone-warning { background: var(--ecs-chart-orange); }
.ecs-bar-fill[data-tone="danger"],
.ecs-bar-fill.tone-danger { background: var(--ecs-chart-red); }
.ecs-bar-fill[data-tone="teal"],
.ecs-bar-fill.tone-teal { background: var(--ecs-chart-teal); }
.ecs-bar-fill[data-tone="navy"],
.ecs-bar-fill.tone-navy { background: var(--ecs-chart-navy); }
.ecs-bar-fill[data-tone="slate"],
.ecs-bar-fill.tone-slate { background: var(--ecs-chart-slate); }

.ecs-bar-val {
  font-size: 0.55rem;
  font-weight: 600;
  color: var(--ecs-chart-slate);
  margin-bottom: 2px;
  line-height: 1;
}

.ecs-bar-lbl {
  font-size: 0.5rem;
  color: var(--ecs-chart-muted);
  margin-top: 2px;
  text-align: center;
  line-height: 1.05;
  word-break: break-word;
  max-width: 36px;
}

/* Trends page — compact executive bars (replaces giant % height blocks) */
.trend-chart {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 80px;
  max-height: 80px;
  padding: 0.15rem 0 1.1rem;
  overflow-x: auto;
  overflow-y: hidden;
}

.trend-bar,
.ecs-trend-bar-v {
  flex: 0 0 auto;
  width: var(--ecs-chart-bar-w);
  max-width: var(--ecs-chart-bar-w);
  min-height: 4px;
  border-radius: 3px 3px 0 0;
  position: relative;
  background: var(--ecs-chart-blue);
  opacity: 0.9;
}

.trend-bar { background: var(--ecs-chart-green); }

.ecs-trend-bar-navy { background: var(--ecs-chart-navy); }
.ecs-trend-bar-blue { background: var(--ecs-chart-blue); }
.ecs-trend-bar-teal { background: var(--ecs-chart-teal); }
.ecs-trend-bar-green { background: var(--ecs-chart-green); }
.ecs-trend-bar-orange { background: var(--ecs-chart-orange); }
.ecs-trend-bar-red { background: var(--ecs-chart-red); }
.ecs-trend-bar-slate { background: var(--ecs-chart-slate); }

.trend-bar-label,
.ecs-trend-bar-lbl,
.ecs-trend-bar .ecs-trend-bar-lbl {
  position: absolute;
  bottom: -1rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.48rem;
  white-space: nowrap;
  color: var(--ecs-chart-muted);
  line-height: 1;
}

.trend-bar-val,
.ecs-trend-bar-val {
  position: absolute;
  top: -0.85rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.52rem;
  font-weight: 600;
  color: var(--ecs-chart-slate);
  white-space: nowrap;
}

/* Horizontal slim bars (insight widgets) */
.ecs-insight-bar-track,
.ecs-trend-bar-track {
  height: 5px;
  background: var(--ecs-chart-track);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 2px;
}

.ecs-insight-bar-fill {
  height: 100%;
  border-radius: 999px;
  background: var(--ecs-chart-blue);
  transition: width 0.4s ease;
}

.ecs-insight-bar-fill.tone-success { background: var(--ecs-chart-green) !important; }
.ecs-insight-bar-fill.tone-warning { background: var(--ecs-chart-orange) !important; }
.ecs-insight-bar-fill.tone-danger { background: var(--ecs-chart-red) !important; }
.ecs-insight-bar-fill.tone-blue { background: var(--ecs-chart-blue) !important; }
.ecs-insight-bar-fill.tone-teal { background: var(--ecs-chart-teal) !important; }
.ecs-insight-bar-fill.tone-navy { background: var(--ecs-chart-navy) !important; }
.ecs-insight-bar-fill.tone-orange { background: var(--ecs-chart-orange) !important; }

/* Sparkline / line micro charts */
.ecs-sparkline,
.ecs-ih-line-chart {
  width: 100%;
  max-width: 100%;
  height: 44px;
  max-height: 44px;
  display: block;
}

/* Donut micro */
.ecs-exec-donut {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}

.ecs-exec-donut-val {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.55rem;
  font-weight: 700;
  color: var(--ecs-chart-slate);
  z-index: 1;
}

/* Integration hub insight bars — align with system */
.ecs-ih-bar-row {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 56px;
  max-height: 56px;
  overflow-x: auto;
}

.ecs-ih-bar {
  width: 12px;
  max-width: 12px;
  background: var(--ecs-chart-blue);
  border-radius: 2px 2px 0 0;
  min-height: 3px;
  margin: 0 auto;
  opacity: 0.88;
}

.ecs-ih-bar-lbl { font-size: 0.48rem; color: var(--ecs-chart-muted); }

/* Cap legacy oversized module styles */
.ecs-cap-trends .trend-chart { height: 80px; max-height: 80px; }
.ecs-cap-upload .batch-progress-bar {
  background: var(--ecs-chart-blue) !important;
}
.ecs-cap-reuse .savings-banner {
  background: linear-gradient(135deg, #1e3a5f 0%, #3b6ea5 100%) !important;
}

.chart-legend-inline {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem 0.65rem;
  font-size: 0.52rem;
  color: var(--ecs-chart-muted);
  margin-top: 0.25rem;
}

.chart-legend-inline span::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 1px;
  margin-right: 3px;
  vertical-align: middle;
  background: var(--ecs-chart-blue);
}

.chart-kpi-inline {
  font-size: 0.58rem;
  color: var(--ecs-chart-slate);
  margin-top: 0.2rem;
}
</style>
<script>
(function(){
  'use strict';
  if (window.__ecsExecutiveChartsInit) return;
  window.__ecsExecutiveChartsInit = true;

  var PALETTE = {
    navy: '#1e3a5f', slate: '#475569', blue: '#3b6ea5', teal: '#0d9488',
    green: '#4a7c59', orange: '#c27803', red: '#b4534a', primary: '#3b6ea5'
  };

  function esc(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  }

  /**
   * Compact vertical bar chart — platform standard.
   * items: [{ label, value, tone?, tooltip? }]
   */
  window.ecsRenderCompactBarChart = function(target, items, opts) {
    opts = opts || {};
    var el = typeof target === 'string' ? document.getElementById(target) : target;
    if (!el) return;
    items = items || [];
    var maxH = opts.maxHeight || 64;
    var barW = opts.barWidth || 14;
    var suffix = opts.suffix || '';
    var labelKey = opts.labelKey || 'label';
    var valKey = opts.valKey || 'value';
    var toneKey = opts.toneKey || 'tone';
    var emptyMsg = opts.emptyMessage || 'No data for selected scope.';

    if (!items.length) {
      el.innerHTML = '<span class="small text-muted" style="font-size:0.62rem">' + esc(emptyMsg) + '</span>';
      el.classList.add('mini-bar-chart');
      return;
    }

    var vals = items.map(function(i) { return Number(i[valKey]) || 0; });
    var max = Math.max.apply(null, vals.concat([1]));

    el.className = (opts.className || 'mini-bar-chart ecs-bar-chart') + (opts.extraClass ? ' ' + opts.extraClass : '');
    el.innerHTML = items.map(function(i) {
      var v = Number(i[valKey]) || 0;
      var h = Math.max(3, Math.round((v / max) * maxH));
      var tone = i[toneKey] || opts.defaultTone || 'blue';
      var tip = i.tooltip || (i[labelKey] + ': ' + v + suffix);
      return '<div class="ecs-bar-col" style="width:' + barW + 'px;max-width:' + barW + 'px" title="' + esc(tip) + '">' +
        '<span class="ecs-bar-val">' + esc(String(v) + suffix) + '</span>' +
        '<div class="ecs-bar-fill tone-' + esc(tone) + '" data-tone="' + esc(tone) + '" style="height:' + h + 'px;width:' + barW + 'px;max-width:' + barW + 'px"></div>' +
        '<span class="ecs-bar-lbl">' + esc(i[labelKey]) + '</span></div>';
    }).join('');
  };

  /** Slim horizontal bar rows */
  window.ecsRenderHorizontalBars = function(target, items, opts) {
    opts = opts || {};
    var el = typeof target === 'string' ? document.getElementById(target) : target;
    if (!el || !items || !items.length) return;
    var max = Math.max.apply(null, items.map(function(i){ return Number(i.value)||0; }).concat([1]));
    el.innerHTML = items.map(function(i) {
      var pct = Math.round((Number(i.value)||0) / max * 100);
      var tone = i.tone || 'blue';
      return '<div class="ecs-insight-bar mb-1" title="' + esc(i.label + ': ' + i.value) + '">' +
        '<div class="ecs-insight-bar-label"><span>' + esc(i.label) + '</span><span>' + esc(i.value) + '</span></div>' +
        '<div class="ecs-insight-bar-track"><div class="ecs-insight-bar-fill tone-' + tone + '" style="width:' + pct + '%"></div></div></div>';
    }).join('');
  };

  /** SVG sparkline */
  window.ecsRenderSparkline = function(target, items, opts) {
    opts = opts || {};
    var el = typeof target === 'string' ? document.getElementById(target) : target;
    if (!el) return;
    items = items || [];
    if (!items.length) { el.innerHTML = ''; return; }
    var valKey = opts.valKey || 'value';
    var labelKey = opts.labelKey || 'label';
    var vals = items.map(function(i){ return Number(i[valKey])||0; });
    var min = Math.min.apply(null, vals);
    var max = Math.max.apply(null, vals);
    var range = max - min || 1;
    var w = opts.width || 200;
    var h = opts.height || 44;
    var pad = 4;
    var color = opts.color || PALETTE.blue;
    var pts = items.map(function(item, idx) {
      var x = pad + (idx / Math.max(items.length - 1, 1)) * (w - pad * 2);
      var y = pad + (1 - ((Number(item[valKey])||0) - min) / range) * (h - pad * 2);
      return x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
    el.innerHTML = '<svg class="ecs-sparkline" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" role="img" aria-label="Trend">' +
      '<polyline fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" points="' + pts + '"/></svg>';
  };

  window.ecsChartPalette = PALETTE;
})();
</script>
