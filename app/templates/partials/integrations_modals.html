{# Integration connector log modal #}
<div class="modal fade" id="integLogModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content">
<div class="modal-header py-2"><h6 class="modal-title" id="integLogTitle">Connector Logs</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body p-2"><div class="table-responsive"><table class="table table-sm table-bordered mb-0"><thead><tr><th>Time</th><th>Level</th><th>Message</th><th>Outcome</th></tr></thead><tbody id="integLogBody"></tbody></table></div></div>
</div></div></div>

<script type="application/json" id="integLogData">{{ module_view.event_logs|default([])|tojson }}</script>
<script>
(function(){
  var logs = JSON.parse(document.getElementById('integLogData').textContent || '[]');
  document.querySelectorAll('[data-integ-logs]').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.preventDefault();
      var conn = btn.getAttribute('data-integ-logs') || '';
      document.getElementById('integLogTitle').textContent = conn + ' — Event Logs';
      var filtered = logs.filter(function(l){ return !conn || l.connector.indexOf(conn) >= 0 || conn.indexOf(l.connector) >= 0; });
      if (!filtered.length) filtered = logs.slice(0, 8);
      var html = '';
      filtered.forEach(function(l){
        var cls = l.level === 'Error' ? 'table-danger' : (l.level === 'Warning' ? 'table-warning' : '');
        html += '<tr class="' + cls + '"><td class="small">' + l.timestamp + '</td><td>' + l.level + '</td><td class="small">' + l.message + '</td><td>' + l.outcome + '</td></tr>';
      });
      document.getElementById('integLogBody').innerHTML = html;
      new bootstrap.Modal(document.getElementById('integLogModal')).show();
    });
  });
})();
</script>
