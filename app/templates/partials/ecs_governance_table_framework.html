{# ECS Governance Table & Modal Framework — GovernanceDataTable, GovernanceModal, GovernanceDetailDrawer #}
<style>
.ecs-gov-table-shell { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.5rem; }
.ecs-gov-table-toolbar { display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
.ecs-gov-table-toolbar .ecs-gov-search { max-width: 14rem; }
.ecs-gov-table-toolbar .ecs-gov-filter { max-width: 9rem; }
.ecs-gov-table-scroll { overflow-x: auto; max-width: 100%; border: 1px solid #e2e8f0; border-radius: 0.35rem; background: #fff; }
.ecs-gov-data-table { width: 100%; margin-bottom: 0; border-collapse: separate; border-spacing: 0; font-size: 0.72rem; table-layout: fixed; min-width: 640px; }
.ecs-gov-data-table thead th { position: sticky; top: 0; z-index: 2; background: #f8fafc; border-bottom: 2px solid #e2e8f0; white-space: nowrap; user-select: none; padding: 0.35rem 0.5rem; vertical-align: middle; }
.ecs-gov-data-table thead th.is-sortable { cursor: pointer; }
.ecs-gov-data-table thead th.is-sortable:hover { background: #eef2ff; }
.ecs-gov-data-table thead th .ecs-gov-sort-icon { opacity: 0.35; margin-left: 0.2rem; font-size: 0.6rem; }
.ecs-gov-data-table thead th.is-sorted-asc .ecs-gov-sort-icon,
.ecs-gov-data-table thead th.is-sorted-desc .ecs-gov-sort-icon { opacity: 1; color: #4338ca; }
.ecs-gov-data-table tbody tr { height: auto; }
.ecs-gov-data-table tbody td { padding: 0.32rem 0.5rem; border-bottom: 1px solid #f1f5f9; vertical-align: top; line-height: 1.4; height: auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ecs-gov-data-table tbody td.ecs-gov-cell-wrap,
.ecs-gov-data-table tbody td.ecs-gov-wrap,
.ecs-gov-data-table tbody td.ecs-gov-rich-cell {
  white-space: normal !important;
  word-break: normal !important;
  overflow-wrap: break-word !important;
  text-overflow: unset;
  overflow: visible;
  max-width: none;
  height: auto;
}
.ecs-gov-data-table th.ecs-gov-col-applications,
.ecs-gov-data-table td.ecs-gov-col-applications { min-width: 350px; width: 38%; }
.ecs-gov-data-table th.ecs-gov-col-prompts,
.ecs-gov-data-table td.ecs-gov-col-prompts { min-width: 220px; width: 28%; }
.ecs-gov-app-cell { word-break: normal; overflow-wrap: break-word; white-space: normal; }
.ecs-gov-app-list { list-style: none; padding: 0; margin: 0; }
.ecs-gov-app-list li { margin: 0 0 0.28rem; white-space: normal; word-break: normal; overflow-wrap: break-word; }
.ecs-gov-app-list li:last-child { margin-bottom: 0; }
.ecs-gov-tag {
  display: inline-block;
  padding: 0.14rem 0.45rem;
  background: #f1f5f9;
  border: 1px solid #e2e8f0;
  border-radius: 0.3rem;
  font-size: 0.68rem;
  line-height: 1.35;
  white-space: normal;
  word-break: normal;
  overflow-wrap: break-word;
  max-width: 100%;
}
.ecs-gov-tag-list { display: flex; flex-wrap: wrap; gap: 0.28rem; }
.ecs-gov-data-table tbody tr.ecs-gov-row { cursor: pointer; }
.ecs-gov-data-table tbody tr.ecs-gov-row:hover { background: #f8fafc; }
.ecs-gov-data-table tbody tr.ecs-gov-row.is-expanded { background: #eef2ff; }
.ecs-gov-data-table tbody tr.ecs-gov-detail-row td { background: #fafbff; padding: 0.5rem 0.75rem; white-space: normal; border-bottom: 1px solid #e2e8f0; }
.ecs-gov-detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.35rem 0.75rem; font-size: 0.68rem; }
.ecs-gov-detail-grid dt { font-weight: 600; color: #64748b; margin: 0; }
.ecs-gov-detail-grid dd { margin: 0 0 0.25rem; word-break: normal; overflow-wrap: break-word; }
.ecs-gov-resize-handle { position: absolute; right: 0; top: 0; width: 5px; height: 100%; cursor: col-resize; }
.ecs-gov-data-table thead th { position: sticky; position: -webkit-sticky; }
.ecs-gov-data-table thead th .ecs-gov-th-inner { position: relative; padding-right: 6px; display: block; overflow: hidden; text-overflow: ellipsis; }
.ecs-gov-pagination-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; justify-content: space-between; font-size: 0.68rem; color: #64748b; padding: 0.25rem 0; }
.ecs-gov-pagination-controls { display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
.ecs-gov-tooltip { position: fixed; z-index: 1090; max-width: 420px; padding: 0.35rem 0.5rem; background: #1e293b; color: #f8fafc; font-size: 0.68rem; border-radius: 0.25rem; pointer-events: none; box-shadow: 0 4px 12px rgba(0,0,0,.2); word-break: normal; overflow-wrap: break-word; display: none; }
.ecs-gov-modal-full .modal-dialog { max-width: min(96vw, 1400px); width: 96vw; }
.ecs-gov-modal-full .modal-body { max-height: calc(100vh - 140px); overflow-y: auto; }
.ecs-gov-drawer .offcanvas-body { font-size: 0.78rem; }
.ecs-gov-data-table .aisdlc-badge { white-space: nowrap; }
</style>
<div class="ecs-gov-tooltip" id="ecsGovTooltip" role="tooltip"></div>
<div class="offcanvas offcanvas-end ecs-gov-drawer" tabindex="-1" id="ecsGovDetailDrawer" aria-labelledby="ecsGovDrawerTitle">
<div class="offcanvas-header py-2"><h6 class="offcanvas-title" id="ecsGovDrawerTitle">Record Detail</h6>
<button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div>
<div class="offcanvas-body" id="ecsGovDrawerBody"></div>
</div>
<script>
(function () {
  'use strict';
  var PAGE_SIZES = [10, 20, 50, 100];
  var tooltipEl = document.getElementById('ecsGovTooltip');

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function cellText(v) {
    if (v == null) return '';
    if (typeof v === 'object') return Array.isArray(v) ? v.join(', ') : JSON.stringify(v);
    return String(v);
  }

  function downloadBlob(filename, content, mime) {
    var blob = new Blob([content], { type: mime || 'text/csv;charset=utf-8;' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 500);
  }

  function rowsToCsv(columns, rows) {
    var header = columns.map(function (c) { return '"' + c.label.replace(/"/g, '""') + '"'; }).join(',');
    var body = rows.map(function (r) {
      return columns.map(function (c) {
        var v = cellText(r[c.key]).replace(/"/g, '""');
        return '"' + v + '"';
      }).join(',');
    }).join('\n');
    return '\ufeff' + header + '\n' + body;
  }

  function rowsToTsv(columns, rows) {
    var header = columns.map(function (c) { return c.label; }).join('\t');
    var body = rows.map(function (r) {
      return columns.map(function (c) { return cellText(r[c.key]).replace(/\t/g, ' '); }).join('\t');
    }).join('\n');
    return header + '\n' + body;
  }

  function inferColumnsFromTable(table) {
    var ths = table.querySelectorAll('thead th');
    if (!ths.length) return [];
    return Array.from(ths).map(function (th, i) {
      return { key: th.getAttribute('data-key') || ('col_' + i), label: th.textContent.trim(), sortable: true };
    });
  }

  function rowsFromTable(table, columns) {
    var trs = Array.from(table.querySelectorAll('tbody tr')).filter(function (tr) {
      return !tr.classList.contains('ecs-gov-detail-row') && tr.querySelector('td');
    });
    return trs.map(function (tr, ri) {
      var cells = tr.querySelectorAll('td');
      var row = { __rowIndex: ri, __el: tr };
      columns.forEach(function (c, ci) {
        var cell = cells[ci];
        if (!cell) {
          row[c.key] = '';
          return;
        }
        var rich = cell.classList.contains('ecs-gov-rich-cell') || cell.querySelector('.ecs-gov-app-cell, .ecs-gov-tag-list');
        if (rich || cell.classList.contains('ecs-gov-wrap')) {
          row[c.key + '__html'] = cell.innerHTML;
          row[c.key] = cell.textContent.trim();
        } else {
          row[c.key] = cell.textContent.trim();
        }
      });
      ['data-aisdlc-drill','data-metric','data-id','data-release','data-stage'].forEach(function (a) {
        if (tr.hasAttribute(a)) row['__' + a.replace('data-','').replace(/-/g,'_')] = tr.getAttribute(a);
      });
      return row;
    });
  }

  function GovernanceDataTable(host, options) {
    this.host = host;
    this.options = options || {};
    this.pageSize = this.options.pageSize || 10;
    this.page = 1;
    this.sortKey = '';
    this.sortDir = 'asc';
    this.search = '';
    this.filters = {};
    this.columns = this.options.columns || [];
    this.allRows = this.options.rows || [];
    this.filteredRows = this.allRows.slice();
    this.tableEl = null;
    this._render();
  }

  GovernanceDataTable.prototype._render = function () {
    var self = this;
    var id = this.host.id || ('govtbl' + Math.random().toString(36).slice(2, 8));
    this.host.id = id;
    this.host.classList.add('ecs-gov-table-shell');
    this.host.innerHTML =
      '<div class="ecs-gov-table-toolbar">' +
        '<input type="search" class="form-control form-control-sm ecs-gov-search" placeholder="Search records…">' +
        '<select class="form-select form-select-sm ecs-gov-filter ecs-gov-filter-col" style="max-width:8rem"><option value="">All columns</option></select>' +
        '<input type="search" class="form-control form-control-sm ecs-gov-filter ecs-gov-filter-val" placeholder="Column filter…" style="max-width:10rem">' +
        '<div class="btn-group btn-group-sm ms-auto">' +
          '<button type="button" class="btn btn-outline-secondary ecs-gov-export-csv">CSV</button>' +
          '<button type="button" class="btn btn-outline-secondary ecs-gov-export-xlsx">Excel</button>' +
        '</div>' +
      '</div>' +
      '<div class="ecs-gov-table-scroll"><table class="ecs-gov-data-table table table-sm mb-0"><thead></thead><tbody></tbody></table></div>' +
      '<div class="ecs-gov-pagination-bar"><div class="ecs-gov-summary"></div><div class="ecs-gov-pagination-controls"></div></div>';

    this.tableEl = this.host.querySelector('.ecs-gov-data-table');
    var colSel = this.host.querySelector('.ecs-gov-filter-col');
    this.columns.forEach(function (c) {
      colSel.innerHTML += '<option value="' + esc(c.key) + '">' + esc(c.label) + '</option>';
    });

    this.host.querySelector('.ecs-gov-search').addEventListener('input', function (e) {
      self.search = e.target.value || '';
      self.page = 1;
      self._applyFilters();
    });
    this.host.querySelector('.ecs-gov-filter-val').addEventListener('input', function (e) {
      var col = colSel.value;
      if (col) self.filters[col] = e.target.value || '';
      else self.filters = {};
      self.page = 1;
      self._applyFilters();
    });
    colSel.addEventListener('change', function () {
      self.filters = {};
      self.host.querySelector('.ecs-gov-filter-val').value = '';
      self._applyFilters();
    });
    this.host.querySelector('.ecs-gov-export-csv').addEventListener('click', function () {
      downloadBlob((self.options.exportName || 'governance-export') + '.csv', rowsToCsv(self.columns, self.filteredRows));
    });
    this.host.querySelector('.ecs-gov-export-xlsx').addEventListener('click', function () {
      downloadBlob((self.options.exportName || 'governance-export') + '.xls', rowsToTsv(self.columns, self.filteredRows), 'application/vnd.ms-excel');
    });

    this._applyFilters();
    this._initResize();
  };

  GovernanceDataTable.prototype._applyFilters = function () {
    var self = this;
    var q = (this.search || '').toLowerCase();
    var fkeys = Object.keys(this.filters).filter(function (k) { return self.filters[k]; });
    this.filteredRows = this.allRows.filter(function (row) {
      var text = self.columns.map(function (c) { return cellText(row[c.key]); }).join(' ').toLowerCase();
      if (q && text.indexOf(q) < 0) return false;
      for (var i = 0; i < fkeys.length; i++) {
        var fk = fkeys[i];
        if (cellText(row[fk]).toLowerCase().indexOf(String(self.filters[fk]).toLowerCase()) < 0) return false;
      }
      return true;
    });
    if (this.sortKey) this._sortRows();
    var pages = Math.max(1, Math.ceil(this.filteredRows.length / this.pageSize));
    if (this.page > pages) this.page = pages;
    this._renderTableBody();
    this._renderPagination();
  };

  GovernanceDataTable.prototype._sortRows = function () {
    var key = this.sortKey;
    var dir = this.sortDir === 'desc' ? -1 : 1;
    this.filteredRows.sort(function (a, b) {
      var av = cellText(a[key]).toLowerCase();
      var bv = cellText(b[key]).toLowerCase();
      var an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return (an - bn) * dir;
      return av < bv ? -dir : av > bv ? dir : 0;
    });
  };

  GovernanceDataTable.prototype._renderTableHead = function () {
    var self = this;
    var thead = this.tableEl.querySelector('thead');
    var tr = document.createElement('tr');
    this.columns.forEach(function (c) {
      var th = document.createElement('th');
      var colWidth = c.width || c.minWidth || 120;
      th.style.width = colWidth + 'px';
      if (c.minWidth) th.style.minWidth = c.minWidth + 'px';
      if (c.colClass) th.className = (th.className ? th.className + ' ' : '') + c.colClass;
      th.setAttribute('data-key', c.key);
      th.className = 'is-sortable' + (self.sortKey === c.key ? ' is-sorted-' + self.sortDir : '');
      th.innerHTML = '<span class="ecs-gov-th-inner">' + esc(c.label) + '<span class="ecs-gov-sort-icon">' + (self.sortKey === c.key ? (self.sortDir === 'asc' ? '▲' : '▼') : '↕') + '</span><span class="ecs-gov-resize-handle"></span></span>';
      th.addEventListener('click', function (e) {
        if (e.target.classList.contains('ecs-gov-resize-handle')) return;
        if (self.sortKey === c.key) self.sortDir = self.sortDir === 'asc' ? 'desc' : 'asc';
        else { self.sortKey = c.key; self.sortDir = 'asc'; }
        self._sortRows();
        self._renderTableBody();
        self._renderTableHead();
      });
      tr.appendChild(th);
    });
    thead.innerHTML = '';
    thead.appendChild(tr);
  };

  GovernanceDataTable.prototype._renderTableBody = function () {
    var self = this;
    this._renderTableHead();
    var tbody = this.tableEl.querySelector('tbody');
    tbody.innerHTML = '';
    var start = (this.page - 1) * this.pageSize;
    var slice = this.filteredRows.slice(start, start + this.pageSize);
    if (!slice.length) {
      tbody.innerHTML = '<tr><td colspan="' + this.columns.length + '" class="text-muted text-center py-3">No matching records.</td></tr>';
      return;
    }
    slice.forEach(function (row, idx) {
      var tr = document.createElement('tr');
      tr.className = 'ecs-gov-row';
      if (row.__el) {
        row.__drill = {};
        ['data-aisdlc-drill','data-metric','data-id','data-release','data-stage'].forEach(function (a) {
          var v = row.__el.getAttribute(a);
          if (v != null) row.__drill[a] = v;
        });
      }
      self.columns.forEach(function (c) {
        var td = document.createElement('td');
        var val = cellText(row[c.key]);
        var html = row[c.key + '__html'];
        if (html) {
          td.innerHTML = html;
          td.classList.add('ecs-gov-cell-wrap', 'ecs-gov-rich-cell');
        } else {
          td.textContent = val;
          td.title = val;
          td.setAttribute('data-full', val);
          if (c.wrap) td.classList.add('ecs-gov-cell-wrap');
        }
        if (c.colClass) td.classList.add(c.colClass);
        tr.appendChild(td);
      });
      tr.addEventListener('click', function (e) {
        if (e.target.closest('a,button')) return;
        self._toggleExpand(tr, row);
      });
      tr.addEventListener('dblclick', function () {
        if (window.GovernanceDetailDrawer) GovernanceDetailDrawer.open(row, self.columns);
      });
      tbody.appendChild(tr);
    });
    this._bindTooltips(tbody);
  };

  GovernanceDataTable.prototype._toggleExpand = function (tr, row) {
    var next = tr.nextElementSibling;
    if (next && next.classList.contains('ecs-gov-detail-row')) {
      next.remove();
      tr.classList.remove('is-expanded');
      return;
    }
    this.tableEl.querySelectorAll('.ecs-gov-detail-row').forEach(function (r) { r.remove(); });
    this.tableEl.querySelectorAll('.ecs-gov-row.is-expanded').forEach(function (r) { r.classList.remove('is-expanded'); });
    tr.classList.add('is-expanded');
    var detail = document.createElement('tr');
    detail.className = 'ecs-gov-detail-row';
    var td = document.createElement('td');
    td.colSpan = this.columns.length;
    var dl = '<dl class="ecs-gov-detail-grid">';
    this.columns.forEach(function (c) {
      dl += '<dt>' + esc(c.label) + '</dt><dd>' + esc(cellText(row[c.key])) + '</dd>';
    });
    dl += '</dl>';
    if (row.__drill && row.__drill['data-aisdlc-drill']) {
      dl += '<button type="button" class="btn btn-sm btn-outline-primary mt-2 ecs-gov-drill-btn">Open governance drill-down →</button>';
    }
    td.innerHTML = dl;
    detail.appendChild(td);
    tr.after(detail);
    var btn = td.querySelector('.ecs-gov-drill-btn');
    if (btn && row.__drill) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var d = row.__drill;
        if (typeof openDrill === 'function') {
          openDrill(d['data-aisdlc-drill'], d['data-metric'], d['data-id'] || '', {
            release: d['data-release'] || '', stage: d['data-stage'] || ''
          });
        } else {
          var fake = document.createElement('span');
          Object.keys(d).forEach(function (k) { fake.setAttribute(k, d[k]); });
          fake.dispatchEvent(new MouseEvent('click', { bubbles: true }));
        }
      });
    }
  };

  GovernanceDataTable.prototype._renderPagination = function () {
    var self = this;
    var total = this.filteredRows.length;
    var pages = Math.max(1, Math.ceil(total / this.pageSize));
    var from = total ? (this.page - 1) * this.pageSize + 1 : 0;
    var to = Math.min(this.page * this.pageSize, total);
    this.host.querySelector('.ecs-gov-summary').textContent =
      total ? ('Showing ' + from + '–' + to + ' of ' + total + ' records') : 'No records';
    var ctrl = this.host.querySelector('.ecs-gov-pagination-controls');
    ctrl.innerHTML =
      '<label class="small">Rows <select class="form-select form-select-sm d-inline-block ecs-gov-page-size" style="width:auto">' +
      PAGE_SIZES.map(function (n) {
        return '<option value="' + n + '"' + (n === self.pageSize ? ' selected' : '') + '>' + n + '</option>';
      }).join('') + '</select></label>' +
      '<div class="btn-group btn-group-sm">' +
        '<button type="button" class="btn btn-outline-secondary ecs-gov-pg-first"' + (this.page <= 1 ? ' disabled' : '') + '>&laquo;</button>' +
        '<button type="button" class="btn btn-outline-secondary ecs-gov-pg-prev"' + (this.page <= 1 ? ' disabled' : '') + '>&lsaquo;</button>' +
        '<span class="btn btn-outline-secondary disabled">Page ' + this.page + ' / ' + pages + '</span>' +
        '<button type="button" class="btn btn-outline-secondary ecs-gov-pg-next"' + (this.page >= pages ? ' disabled' : '') + '>&rsaquo;</button>' +
        '<button type="button" class="btn btn-outline-secondary ecs-gov-pg-last"' + (this.page >= pages ? ' disabled' : '') + '>&raquo;</button>' +
      '</div>';
    ctrl.querySelector('.ecs-gov-page-size').addEventListener('change', function (e) {
      self.pageSize = parseInt(e.target.value, 10) || 10;
      self.page = 1;
      self._applyFilters();
    });
    ctrl.querySelector('.ecs-gov-pg-first').addEventListener('click', function () { self.page = 1; self._applyFilters(); });
    ctrl.querySelector('.ecs-gov-pg-prev').addEventListener('click', function () { self.page = Math.max(1, self.page - 1); self._applyFilters(); });
    ctrl.querySelector('.ecs-gov-pg-next').addEventListener('click', function () { self.page = Math.min(pages, self.page + 1); self._applyFilters(); });
    ctrl.querySelector('.ecs-gov-pg-last').addEventListener('click', function () { self.page = pages; self._applyFilters(); });
  };

  GovernanceDataTable.prototype._bindTooltips = function (root) {
    root.querySelectorAll('td[data-full]').forEach(function (td) {
      td.addEventListener('mouseenter', function () {
        var full = td.getAttribute('data-full') || '';
        if (!full || !tooltipEl) return;
        if (td.scrollWidth <= td.clientWidth && full.length < 40) return;
        tooltipEl.textContent = full;
        tooltipEl.style.display = 'block';
        var r = td.getBoundingClientRect();
        tooltipEl.style.left = Math.min(r.left, window.innerWidth - 430) + 'px';
        tooltipEl.style.top = (r.bottom + 6) + 'px';
      });
      td.addEventListener('mouseleave', function () { if (tooltipEl) tooltipEl.style.display = 'none'; });
    });
  };

  GovernanceDataTable.prototype._initResize = function () {
    var table = this.tableEl;
    table.querySelectorAll('.ecs-gov-resize-handle').forEach(function (handle) {
      handle.addEventListener('mousedown', function (e) {
        e.preventDefault(); e.stopPropagation();
        var th = handle.closest('th');
        var startX = e.pageX;
        var startW = th.offsetWidth;
        function move(ev) {
          th.style.width = Math.max(60, startW + (ev.pageX - startX)) + 'px';
        }
        function up() {
          document.removeEventListener('mousemove', move);
          document.removeEventListener('mouseup', up);
        }
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', up);
      });
    });
  };

  function enhanceLegacyTable(table) {
    if (!table || table.dataset.govEnhanced) return null;
    if (table.closest('.ecs-gov-table-shell')) return null;
    table.dataset.govEnhanced = '1';
    var host = document.createElement('div');
    table.parentNode.insertBefore(host, table);
    var columns = inferColumnsFromTable(table);
    if (!columns.length) { table.remove(); return null; }
    columns.forEach(function (c, i) {
      var th = table.querySelectorAll('thead th')[i];
      var td = table.querySelector('tbody tr td:nth-child(' + (i + 1) + ')');
      if (th) {
        th.setAttribute('data-key', c.key);
        c.label = th.textContent.trim();
        var minW = th.getAttribute('data-min-width');
        var w = th.getAttribute('data-width');
        if (minW) c.minWidth = parseInt(minW, 10);
        if (w) c.width = parseInt(w, 10);
        if (th.classList.contains('ecs-gov-col-applications')) {
          c.colClass = 'ecs-gov-col-applications';
          c.minWidth = c.minWidth || 350;
          c.wrap = true;
        }
        if (th.classList.contains('ecs-gov-col-prompts')) {
          c.colClass = 'ecs-gov-col-prompts';
          c.minWidth = c.minWidth || 220;
          c.wrap = true;
        }
      }
      if (td && (td.classList.contains('ecs-gov-wrap') || td.classList.contains('ecs-gov-rich-cell') || td.querySelector('.ecs-gov-app-cell'))) {
        c.wrap = true;
      }
    });
    var rows = rowsFromTable(table, columns);
    var exportName = table.id || table.getAttribute('data-export-name') || 'governance-table';
    table.remove();
    var inst = new GovernanceDataTable(host, {
      columns: columns,
      rows: rows,
      exportName: exportName,
      pageSize: 10
    });
    host._govInstance = inst;
    return inst;
  }

  function enhance(root) {
    root = root || document;
    root.querySelectorAll('.ecs-gov-data-table:not([data-gov-enhanced]), .ecs-governance-shell .ecs-paginated-table:not([data-gov-enhanced]), #aisdlcDrillBody table.aisdlc-table:not([data-gov-enhanced])').forEach(function (table) {
      if (table.closest('.ecs-no-gov-enhance')) return;
      table.dataset.govEnhanced = '1';
      enhanceLegacyTable(table);
    });
  }

  function mount(host, options) {
    return new GovernanceDataTable(host, options);
  }

  function fromRows(columns, rows, opts) {
    var host = document.createElement('div');
    host.className = 'ecs-gov-table-shell';
    new GovernanceDataTable(host, Object.assign({ columns: columns, rows: rows }, opts || {}));
    return host.outerHTML;
  }

  var GovernanceModal = {
    setFullWidth: function (full) {
      var dialog = document.getElementById('aisdlcDrillDialog');
      if (dialog) dialog.classList.toggle('ecs-gov-modal-full', !!full);
      if (dialog) dialog.classList.toggle('modal-xl', !!full);
    },
    open: function (title, html, opts) {
      opts = opts || {};
      var titleEl = document.getElementById('aisdlcDrillTitle');
      var bodyEl = document.getElementById('aisdlcDrillBody');
      var modalEl = document.getElementById('aisdlcDrillModal');
      if (!modalEl || typeof bootstrap === 'undefined') return;
      GovernanceModal.setFullWidth(opts.fullWidth !== false);
      if (titleEl) titleEl.textContent = title || 'Detail';
      if (bodyEl) bodyEl.innerHTML = html || '';
      enhance(bodyEl);
      bootstrap.Modal.getOrCreateInstance(modalEl).show();
    }
  };

  var GovernanceDetailDrawer = {
    open: function (row, columns) {
      var drawerEl = document.getElementById('ecsGovDetailDrawer');
      if (!drawerEl || typeof bootstrap === 'undefined') return;
      var title = document.getElementById('ecsGovDrawerTitle');
      var body = document.getElementById('ecsGovDrawerBody');
      if (title) title.textContent = cellText(row[columns[0] && columns[0].key] || 'Record');
      var html = '<dl class="ecs-gov-detail-grid">';
      columns.forEach(function (c) {
        html += '<dt>' + esc(c.label) + '</dt><dd>' + esc(cellText(row[c.key])) + '</dd>';
      });
      html += '</dl>';
      if (body) body.innerHTML = html;
      bootstrap.Offcanvas.getOrCreateInstance(drawerEl).show();
    }
  };

  window.GovernanceDataTable = { mount: mount, enhance: enhance, fromRows: fromRows };
  window.GovernanceModal = GovernanceModal;
  window.GovernanceDetailDrawer = GovernanceDetailDrawer;

  function boot() { enhance(document); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();

  if (typeof MutationObserver !== 'undefined') {
    var obs = new MutationObserver(function () {
      clearTimeout(window.__ecsGovEnhanceTimer);
      window.__ecsGovEnhanceTimer = setTimeout(function () { enhance(document); }, 120);
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }

  window.ecsEnhanceGovTables = enhance;
})();
</script>
