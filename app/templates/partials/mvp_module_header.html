{% if module_view is defined and module_view.kpis %}
<div class="row g-3 mb-4">
{% for k in module_view.kpis %}
<div class="col-md-3 col-6">
<div class="ecs-kpi-modern ecs-kpi-{{ k.tone|default('primary') }}">
<div class="ecs-kpi-label">{{ k.label }}</div>
<div class="ecs-kpi-value">{{ k.value }}</div>
</div>
</div>
{% endfor %}
</div>
{% endif %}
