# ECS demo NGINX config — used by the nginx-demo container for predefined NGINX
# checks (NGX-001..NGX-008). Safe, minimal, non-production. No secrets.
server_tokens off;

server {
    listen 80;
    server_name localhost;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Demonstrative TLS hardening directives so the predefined checks
    # (ssl_protocols / ssl_ciphers) have something to report. These live here for
    # the demo; a real TLS server block would also configure certificates.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        return 200 "ECS demo nginx OK\n";
        add_header Content-Type text/plain;
    }
}
