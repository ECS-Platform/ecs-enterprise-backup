# ECS Kubernetes Secret (EXAMPLE, non-production) — SHAPE ONLY.
# =============================================================================
# ⚠️ DO NOT COMMIT REAL SECRETS. This file documents the SHAPE of the Secret only.
# Every value below is a placeholder. In production, DO NOT create the Secret from
# this file directly — instead source values from a secrets manager:
#   * External Secrets Operator / Sealed Secrets, or
#   * `kubectl create secret generic ecs-secret --from-env-file=.env.prod`
#     (where .env.prod is populated locally from the secret manager and NEVER
#      committed), or
#   * a CSI secrets-store driver.
#
# ECS never logs secret values (it only ever reports SET/MISSING).
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ecs-secret
  labels:
    app: ecs
type: Opaque
stringData:
  # Durable audit persistence (contains a credential).
  ECS_AUDIT_DB_URL: "<populate-from-secret-manager>"

  # ServiceNow CMDB (OAuth client-credentials).
  ECS_SERVICENOW_CLIENT_ID: "<populate-from-secret-manager>"
  ECS_SERVICENOW_CLIENT_SECRET: "<populate-from-secret-manager>"

  # Archer.
  ECS_ARCHER_API_TOKEN: "<populate-from-secret-manager>"

  # SharePoint / Microsoft Graph (OAuth client-credentials).
  ECS_GRAPH_TENANT_ID: "<populate-from-secret-manager>"
  ECS_GRAPH_CLIENT_ID: "<populate-from-secret-manager>"
  ECS_GRAPH_CLIENT_SECRET: "<populate-from-secret-manager>"

  # Jira / Confluence (API tokens).
  ECS_JIRA_API_TOKEN: "<populate-from-secret-manager>"
  ECS_CONFLUENCE_API_TOKEN: "<populate-from-secret-manager>"

  # AppSec / CSPM / FIM.
  ECS_SONARQUBE_TOKEN: "<populate-from-secret-manager>"
  ECS_CHECKMARX_CLIENT_ID: "<populate-from-secret-manager>"
  ECS_CHECKMARX_CLIENT_SECRET: "<populate-from-secret-manager>"
  ECS_PRISMA_CLOUD_ACCESS_KEY: "<populate-from-secret-manager>"
  ECS_PRISMA_CLOUD_SECRET_KEY: "<populate-from-secret-manager>"
  ECS_TRIPWIRE_PASSWORD: "<populate-from-secret-manager>"

  # Database service-account passwords (if ECS runs DB baselining directly).
  ECS_ORACLE_PASSWORD: "<populate-from-secret-manager>"
  ECS_PG_PASSWORD: "<populate-from-secret-manager>"
  ECS_MYSQL_PASSWORD: "<populate-from-secret-manager>"
  ECS_SQLSERVER_PASSWORD: "<populate-from-secret-manager>"
