# ECS Kubernetes Service (EXAMPLE, non-production).
# =============================================================================
# PLACEHOLDERS ONLY. Not for production until reviewed/approved by security.
# - ClusterIP service; front it with an Ingress/Route (TLS) per bank standards.
#   Do not expose ECS directly with a LoadBalancer without security review.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ecs-app
  labels:
    app: ecs
    component: app
spec:
  type: ClusterIP
  selector:
    app: ecs
    component: app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
