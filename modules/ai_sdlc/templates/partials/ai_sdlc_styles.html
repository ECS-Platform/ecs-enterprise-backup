{# AI & SDLC Governance — shared styles #}
<style>
.aisdlc-banner {
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);

}

.aisdlc-banner .sub { font-size: 0.72rem; opacity: 0.85; }

  background: rgba(255,255,255,0.15); padding: 0.15rem 0.55rem; border-radius: 12px;
  font-size: 0.65rem; font-weight: 600; letter-spacing: 0.03em;
}

  border-radius: 6px; padding: 0.5rem 0.65rem; cursor: pointer; position: relative;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}
.aisdlc-kpi:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,23,42,0.08); }
.aisdlc-kpi .v { font-size: 1.35rem; font-weight: 700; color: #0f172a; line-height: 1; }
.aisdlc-kpi .l { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.04em; color: #64748b; }
.aisdlc-kpi .h { font-size: 0.62rem; color: #94a3b8; margin-top: 0.1rem; }
.aisdlc-kpi::after { content: '↗'; position: absolute; top: 4px; right: 6px; opacity: 0.35; font-size: 0.65rem; }
.aisdlc-kpi.tone-primary { border-left-color: #2563eb; }
.aisdlc-kpi.tone-success { border-left-color: #16a34a; }
.aisdlc-kpi.tone-warning { border-left-color: #f59e0b; }
.aisdlc-kpi.tone-danger  { border-left-color: #dc2626; }
.aisdlc-kpi.tone-info    { border-left-color: #0891b2; }
.aisdlc-kpi.tone-teal    { border-left-color: #0d9488; }
.aisdlc-kpi.tone-navy    { border-left-color: #1e3a5f; }
.aisdlc-exec-grid { grid-template-columns: repeat(5, 1fr); }
.aisdlc-analytics-grid { grid-template-columns: repeat(6, 1fr); }
.aisdlc-reuse-grid { grid-template-columns: repeat(7, 1fr); }

@media (max-width: 768px) { .aisdlc-exec-grid { grid-template-columns: repeat(2, 1fr); } .aisdlc-analytics-grid { grid-template-columns: repeat(2, 1fr); } .aisdlc-reuse-grid { grid-template-columns: repeat(2, 1fr); } }
.aisdlc-kb-tabs .nav-link, .aisdlc-doc-tabs .nav-link { font-size: 0.68rem; padding: 0.25rem 0.5rem; }
.aisdlc-knowledge-repo { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 0.5rem 0.65rem; }
.aisdlc-kb-stats .badge { font-size: 0.62rem; }
.aisdlc-audit-kb { border-top: 1px solid #e2e8f0; padding-top: 0.5rem; }
.aisdlc-graph-flow { display: flex; flex-wrap: wrap; align-items: center; gap: 0.25rem; padding: 0.5rem; background: #f1f5f9; border-radius: 6px; overflow-x: auto; }
.aisdlc-graph-node { background: #fff; border: 1px solid #c7d2fe; border-radius: 6px; padding: 0.3rem 0.45rem; min-width: 72px; text-align: center; cursor: pointer; font-size: 0.62rem; }
.aisdlc-graph-node:hover { background: #eef2ff; box-shadow: 0 2px 6px rgba(67,56,202,0.12); }
.aisdlc-graph-node.type-framework { border-color: #4338ca; }
.aisdlc-graph-node.type-control { border-color: #2563eb; }
.aisdlc-graph-node.type-application { border-color: #16a34a; }
.aisdlc-graph-node.type-stage { border-color: #0891b2; }
.aisdlc-graph-node.type-evidence { border-color: #f59e0b; }
.aisdlc-graph-node.type-observation { border-color: #dc2626; }
.aisdlc-graph-node.type-closure { border-color: #64748b; }
.aisdlc-graph-node .gn-type { font-size: 0.55rem; text-transform: uppercase; color: #64748b; }
.aisdlc-graph-node .gn-label { font-weight: 600; color: #0f172a; }
.aisdlc-graph-arrow { color: #94a3b8; font-size: 0.75rem; }
.aisdlc-lifecycle-strip { flex-wrap: wrap; overflow-x: auto; max-width: 100%; }
.aisdlc-lc-step { min-width: 72px; font-size: 0.62rem; cursor: pointer; }
.aisdlc-lc-step .lc-label { font-weight: 600; font-size: 0.6rem; }
.aisdlc-lc-step .lc-meta { font-size: 0.55rem; line-height: 1.2; }
.aisdlc-history-acc .accordion-button { font-size: 0.72rem; padding: 0.35rem 0.65rem; }
.aisdlc-history-acc .accordion-body { max-height: none; }
.aisdlc-doc-viewer { font-size: 0.78rem; }
.aisdlc-doc-header { background: #f8fafc; border-radius: 6px; padding: 0.5rem 0.65rem; }
.aisdlc-doc-section { margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid #f1f5f9; }
.aisdlc-doc-section:last-child { border-bottom: none; }
.aisdlc-doc-h { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #4338ca; margin-bottom: 0.35rem; }

.aisdlc-section { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.65rem 0.85rem; margin-bottom: 0.65rem; }
.aisdlc-section-title {
  font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
  color: #475569; margin: 0 0 0.45rem; display: flex; align-items: baseline; gap: 0.4rem;
}
.aisdlc-section-title .meta { font-weight: 500; text-transform: none; letter-spacing: 0; color: #94a3b8; font-size: 0.62rem; }

.aisdlc-table { width: 100%; border-collapse: collapse; font-size: 0.72rem; table-layout: fixed; }
.aisdlc-table:not(.ecs-gov-data-table) th,
.aisdlc-table:not(.ecs-gov-data-table) td { padding: 0.35rem 0.5rem; border-bottom: 1px solid #f1f5f9; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.aisdlc-table.ecs-gov-data-table tbody td.ecs-gov-wrap,
.aisdlc-table.ecs-gov-data-table tbody td.ecs-gov-cell-wrap,
.aisdlc-table.ecs-gov-data-table tbody td.ecs-gov-rich-cell {
  white-space: normal !important;
  word-break: normal !important;
  overflow-wrap: break-word !important;
  overflow: visible;
  text-overflow: unset;
  height: auto;
}
.aisdlc-table.ecs-compact-table th, .aisdlc-table.ecs-compact-table td { padding: 0.28rem 0.4rem; font-size: 0.68rem; }
.aisdlc-section .ecs-paginated-wrap { max-height: none; overflow: visible; }
.aisdlc-table thead th { background: #f8fafc; color: #475569; font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.03em; }
.aisdlc-table tbody tr { cursor: pointer; }
.aisdlc-table tbody tr:hover { background: #f8fafc; }

.aisdlc-badge { display: inline-block; font-size: 0.62rem; padding: 0.1rem 0.4rem; border-radius: 10px; font-weight: 600; }
.aisdlc-badge.Approved, .aisdlc-badge.Complete, .aisdlc-badge.Passed, .aisdlc-badge-green { background: #dcfce7; color: #166534; }
.aisdlc-badge.NeedsRework, .aisdlc-badge.Needs { background: #ffedd5; color: #9a3412; }
.aisdlc-badge.InReview { background: #dbeafe; color: #1e40af; }
.aisdlc-badge.AwaitingUpload { background: #f1f5f9; color: #475569; }
.aisdlc-badge.Pending, .aisdlc-badge.Conditional, .aisdlc-badge-warning { background: #fef3c7; color: #92400e; }
.aisdlc-badge.Critical, .aisdlc-badge.Failed, .aisdlc-badge-danger { background: #fee2e2; color: #991b1b; }
.aisdlc-badge.High { background: #ffedd5; color: #c2410c; }
.aisdlc-badge.Medium, .aisdlc-badge.info { background: #dbeafe; color: #1e40af; }
.aisdlc-badge.Low { background: #f1f5f9; color: #475569; }

.aisdlc-app-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 0.5rem; }
.aisdlc-app-grid.ecs-paginated-blocks > .aisdlc-app-card { margin: 0; }
.aisdlc-app-card {
  background: #fff; border: 1px solid #e2e8f0; border-left: 3px solid #6366f1;
  border-radius: 6px; padding: 0.5rem 0.65rem; cursor: pointer; font-size: 0.72rem;
}
.aisdlc-app-card:hover { background: #f8fafc; box-shadow: 0 2px 8px rgba(15,23,42,0.06); }
.aisdlc-app-card.Critical { border-left-color: #dc2626; }
.aisdlc-app-card.High { border-left-color: #f59e0b; }
.aisdlc-app-card .name { font-weight: 700; color: #0f172a; font-size: 0.82rem; }
.aisdlc-app-card .meta { color: #64748b; font-size: 0.66rem; }

.aisdlc-heat-grid { display: grid; gap: 1px; background: #e2e8f0; border-radius: 6px; overflow-x: auto; }
.aisdlc-heat-row { display: flex; gap: 1px; }
.aisdlc-heat-label { flex: 0 0 160px; background: #f8fafc; padding: 0.3rem 0.45rem; font-size: 0.66rem; font-weight: 600; display: flex; align-items: center; }
.aisdlc-heat-cell {
  flex: 1; min-width: 52px; padding: 0.3rem; text-align: center; font-size: 0.62rem; color: #fff;
  cursor: pointer; min-height: 32px; display: flex; align-items: center; justify-content: center;
}
.aisdlc-heat-cell.tone-green { background: #16a34a; }
.aisdlc-heat-cell.tone-amber { background: #f59e0b; }
.aisdlc-heat-cell.tone-red   { background: #dc2626; }
.aisdlc-heat-header .aisdlc-heat-cell { background: #312e81; font-weight: 600; font-size: 0.58rem; }

.aisdlc-stage-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; }
@media (max-width: 1100px) { .aisdlc-stage-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 640px)  { .aisdlc-stage-grid { grid-template-columns: 1fr; } }
.aisdlc-stage-card {
  background: #fff; border: 1px solid #e2e8f0; border-top: 3px solid #6366f1;
  border-radius: 6px; padding: 0.55rem 0.65rem; cursor: pointer; text-decoration: none; color: inherit;
  display: block; transition: transform 0.12s ease, box-shadow 0.12s ease;
}
.aisdlc-stage-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(15,23,42,0.1); color: inherit; }
.aisdlc-stage-card .icon { font-size: 1.2rem; }
.aisdlc-stage-card .title { font-weight: 700; font-size: 0.78rem; color: #0f172a; margin: 0.2rem 0; }
.aisdlc-stage-card .score { font-size: 1.4rem; font-weight: 700; color: #4338ca; }
.aisdlc-stage-card .meta { font-size: 0.64rem; color: #64748b; }

.aisdlc-bar { display: inline-block; width: 64px; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; vertical-align: middle; margin-right: 0.25rem; }
.aisdlc-bar .fill { height: 100%; background: #16a34a; }
.aisdlc-bar .fill.warn { background: #f59e0b; }
.aisdlc-bar .fill.risk { background: #dc2626; }

.aisdlc-workflow { display: flex; gap: 0.35rem; flex-wrap: wrap; margin: 0.5rem 0; }
.aisdlc-wf-step {
  flex: 1; min-width: 100px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 0.4rem 0.5rem; font-size: 0.66rem; text-align: center;
}
.aisdlc-wf-step.is-done { background: #ecfdf5; border-color: #86efac; }
.aisdlc-wf-step.is-active { background: #eff6ff; border-color: #93c5fd; }
.aisdlc-wf-step .step-n { font-weight: 700; color: #4338ca; }

.aisdlc-chart-bar { display: flex; align-items: flex-end; gap: 4px; height: 80px; padding: 0.25rem 0; }
.aisdlc-chart-bar .bar { flex: 1; background: #6366f1; border-radius: 3px 3px 0 0; min-height: 4px; position: relative; }
.aisdlc-chart-bar .bar .lbl { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: 0.58rem; color: #64748b; white-space: nowrap; }
.aisdlc-evidence-trend-chart { padding: 0.25rem 0; }
.aisdlc-chart-legend .legend-item { margin-right: 0.75rem; }
.aisdlc-chart-legend .submitted { color: #6366f1; }
.aisdlc-chart-legend .approved { color: #16a34a; }
.aisdlc-chart-legend .rejected { color: #dc2626; }
.aisdlc-chart-legend .pending { color: #d97706; }
.aisdlc-chart-grouped { display: flex; align-items: flex-end; gap: 8px; height: 90px; overflow-x: auto; }
.aisdlc-chart-month { flex: 1; min-width: 48px; text-align: center; }
.aisdlc-chart-month .bars { display: flex; align-items: flex-end; justify-content: center; gap: 2px; height: 72px; }
.aisdlc-chart-month .bar { width: 8px; border-radius: 2px 2px 0 0; min-height: 4px; }
.aisdlc-chart-month .bar.submitted { background: #6366f1; }
.aisdlc-chart-month .bar.approved { background: #16a34a; }
.aisdlc-chart-month .bar.rejected { background: #dc2626; }
.aisdlc-chart-month .bar.pending { background: #d97706; }
.aisdlc-chart-month .lbl { display: block; font-size: 0.58rem; color: #64748b; margin-top: 4px; white-space: nowrap; }

.aisdlc-subnav { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.65rem; }

/* AI SDLC Control Tower */
.ecs-ct-shell .ecs-governance-workspace { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.ecs-ct-shell .ecs-governance-workspace-panels { flex: 1; min-height: 0; overflow: hidden; }
.ecs-ct-shell .ecs-workspace-pane.is-active { display: flex; flex-direction: column; min-height: 0; height: 100%; }
.ecs-ct-shell .ecs-gov-pane-inner { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; }
.aisdlc-pill-live { background: #2563eb; }
.ecs-ct-control-room { background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%); border: 1px solid #bfdbfe; border-radius: 8px; padding: 1rem; }
.ecs-ct-room-intro { color: #1e40af; font-size: 0.82rem; margin-bottom: 0.75rem; }
.ecs-ct-run-btn { background: #2563eb; border-color: #1d4ed8; font-weight: 600; padding: 0.45rem 1.25rem; }
.ecs-ct-exec-panel { margin-top: 1rem; background: #1e3a8a; color: #fff; border-radius: 6px; padding: 0.75rem; font-family: ui-monospace, monospace; font-size: 0.75rem; max-height: 220px; overflow-y: auto; }

.ecs-ct-summary-card .val { font-size: 1.1rem; font-weight: 700; color: #1e40af; }
.ecs-ct-pct-link { border: none; background: none; cursor: pointer; font-size: 0.68rem; font-weight: 600; padding: 0.15rem 0.35rem; border-radius: 4px; text-decoration: underline; }
.ecs-ct-pct-link.ecs-ct-green { background: #dcfce7; color: #166534; }
.ecs-ct-pct-link.ecs-ct-amber { background: #fef3c7; color: #92400e; }
.ecs-ct-pct-link.ecs-ct-red { background: #fee2e2; color: #991b1b; }
.ecs-ct-cell { display: inline-block; min-width: 2.5rem; padding: 0.15rem 0.35rem; border-radius: 4px; font-size: 0.68rem; font-weight: 600; }
.ecs-ct-green { background: #dcfce7; color: #166534; }
.ecs-ct-amber { background: #fef3c7; color: #92400e; }
.ecs-ct-red { background: #fee2e2; color: #991b1b; }
.ecs-ct-scheduler-log .log-time { font-family: ui-monospace, monospace; color: #2563eb; margin-right: 0.5rem; }
.ecs-ct-matrix th { background: #eff6ff; }

/* AI SDLC Application Onboarding execution workspace */
.ecs-ob-control-room { background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%); border: 1px solid #bfdbfe; border-radius: 8px; padding: 1rem; }
.ecs-ob-room-intro { color: #1e40af; font-size: 0.82rem; }
.ecs-ob-run-btn { background: #2563eb; border-color: #1d4ed8; font-weight: 600; padding: 0.55rem 1.5rem; font-size: 0.95rem; }
.ecs-ob-exec-panel { background: #1e3a8a; color: #fff; border-radius: 6px; padding: 0.75rem; font-size: 0.78rem; max-height: 320px; overflow-y: auto; }
.ecs-ob-step-block { opacity: 0; transform: translateY(6px); transition: opacity 0.3s, transform 0.3s; margin-bottom: 0.65rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
.ecs-ob-step-block.is-visible { opacity: 1; transform: translateY(0); }
.ecs-ob-step-head { color: #93c5fd; font-weight: 600; margin-bottom: 0.25rem; }
.ecs-ob-step-head .step-num { color: #fff; margin-right: 0.35rem; }
.ecs-ob-step-results { color: #bbf7d0; font-size: 0.72rem; padding-left: 1.1rem; }
.ecs-ob-summary-card { background: #fff; border: 1px solid #dbeafe; border-radius: 6px; padding: 0.5rem 0.65rem; }
.ecs-ob-summary-card .lbl { font-size: 0.62rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.03em; }
.ecs-ob-summary-card .val { font-size: 1.15rem; font-weight: 700; color: #1e40af; }
.aisdlc-subnav a {
  font-size: 0.72rem; padding: 0.3rem 0.65rem; border-radius: 6px; border: 1px solid #e2e8f0;
  background: #fff; color: #334155; text-decoration: none;
}
.aisdlc-subnav a:hover { background: #f8fafc; }
.aisdlc-subnav a.is-active { background: #4338ca; color: #fff; border-color: #4338ca; }

.aisdlc-trail { font-size: 0.68rem; }
.aisdlc-trail li { padding: 0.3rem 0; border-bottom: 1px solid #f1f5f9; list-style: none; cursor: pointer; }
.aisdlc-trail li:hover { background: #f8fafc; }
.aisdlc-trail .ts { color: #94a3b8; font-size: 0.62rem; }
.aisdlc-drill-link, [data-aisdlc-drill] { cursor: pointer; }
.aisdlc-table tbody tr[data-aisdlc-drill] { cursor: pointer; }
.aisdlc-table tbody tr[data-aisdlc-drill]:hover { background: #f8fafc; }
.ecs-how-calculated { font-size: 0.72rem; line-height: 1.35; }
.ecs-how-calculated .fw-semibold { color: #4338ca; }
.aisdlc-kpi .hint { font-size: 0.55rem; color: #94a3b8; margin-top: 0.1rem; }

.ecs-governance-shell .aisdlc-banner,
.ecs-governance-shell .aisdlc-kpi-grid,
.ecs-governance-shell .aisdlc-subnav { flex-shrink: 0; }
.ecs-governance-shell .aisdlc-subnav { margin-bottom: 0.35rem; }
.ecs-gov-pane-inner .aisdlc-trail li { padding: 0.35rem 0; }
.ecs-shell-header {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 0.45rem 0.65rem;
}
.ecs-breadcrumb-trail { font-size: 0.72rem; color: #64748b; }
.ecs-breadcrumb-trail a { color: #4338ca; text-decoration: none; }
.ecs-breadcrumb-trail a:hover { text-decoration: underline; }
.ecs-breadcrumb-sep { margin: 0 0.35rem; opacity: 0.5; }
.ecs-breadcrumb-current { color: #0f172a; font-weight: 600; }
.ecs-shell-context-bar .ecs-role-chip,
.ecs-shell-context-bar .ecs-release-chip {
  background: #f1f5f9; border-radius: 4px; padding: 0.15rem 0.45rem;
}

/* AI SDLC Home — My Applications table */
.aisdlc-home-apps-table {
  table-layout: auto !important;
  width: 100%;
  min-width: 720px;
}
.aisdlc-home-apps-table th,
.aisdlc-home-apps-table td {
  white-space: normal !important;
  word-break: normal !important;
  overflow-wrap: break-word !important;
  text-overflow: unset !important;
  overflow: visible !important;
  vertical-align: top;
  padding: 0.4rem 0.5rem;
}
.aisdlc-home-apps-table .aisdlc-col-criticality {
  width: 8%;
  max-width: 6.5rem;
  white-space: nowrap !important;
}
.aisdlc-home-apps-table .aisdlc-col-frameworks,
.aisdlc-home-apps-table .aisdlc-fw-cell {
  width: 35%;
  min-width: 12rem;
}
.aisdlc-fw-list {
  display: inline;
  white-space: normal;
  word-break: normal;
  overflow-wrap: break-word;
  line-height: 1.4;

/* Phase worklist — controlled document column */
.aisdlc-doc-col { min-width: 11rem; }

.aisdlc-table td .btn-link[data-aisdlc-drill="document"] {

}
</style>
