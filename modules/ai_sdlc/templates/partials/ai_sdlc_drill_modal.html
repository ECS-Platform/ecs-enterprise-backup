<div class="modal fade" id="aisdlcDrillModal" tabindex="-1" aria-labelledby="aisdlcDrillTitle" aria-hidden="true">
<div class="modal-dialog modal-lg" id="aisdlcDrillDialog">
<div class="modal-content" id="aisdlcDrillContent">
<div class="modal-header py-2">
<h5 class="modal-title fs-6" id="aisdlcDrillTitle">Detail</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body" id="aisdlcDrillBody"><div class="text-muted small">Loading…</div></div>
<div class="modal-footer py-2">
<button type="button" class="btn btn-sm btn-outline-secondary d-none" id="aisdlcDrillBack">Back</button>
<button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Close</button>
<a href="#" class="btn btn-sm btn-outline-primary d-none" id="aisdlcDrillStageLink">Open stage detail</a>
<a href="#" class="btn btn-sm btn-primary d-none" id="aisdlcDrillLink">Open related module</a>
</div>
</div></div></div>
{% include "partials/ecs_governance_table_framework.html" %}
<script>
(function () {
  var modalEl = document.getElementById('aisdlcDrillModal');
  if (!modalEl || typeof bootstrap === 'undefined') return;
  var modalContentEl = document.getElementById('aisdlcDrillContent');
  var modal = new bootstrap.Modal(modalEl);
  var titleEl = document.getElementById('aisdlcDrillTitle');
  var bodyEl = document.getElementById('aisdlcDrillBody');
  var linkEl = document.getElementById('aisdlcDrillLink');
  var stageLinkEl = document.getElementById('aisdlcDrillStageLink');
  var backBtn = document.getElementById('aisdlcDrillBack');
  var q = '?role={{ role|urlencode }}&user={{ user|urlencode }}';
  var lastDrill = { kind: 'sdlc', release: '', stage: '' };
  var drillOrigin = null;

  function cleanupModalArtifacts(force) {
    var backdrops = document.querySelectorAll('.modal-backdrop');
    if (force || !modalEl.classList.contains('show')) {
      backdrops.forEach(function (bd) { bd.remove(); });
    } else if (backdrops.length > 1) {
      for (var i = 0; i < backdrops.length - 1; i += 1) backdrops[i].remove();
    }
    if (!document.querySelector('.modal.show')) {
      document.body.classList.remove('modal-open');
      document.body.style.removeProperty('overflow');
      document.body.style.removeProperty('padding-right');
    }
  }

  function getNavModule() {
    return (document.body && document.body.dataset.navModule) || '';
  }

  function captureDrillOrigin() {
    if (drillOrigin) return;
    drillOrigin = { scrollY: window.scrollY || 0, url: window.location.href };
    try { sessionStorage.setItem('ecsDrillOrigin', JSON.stringify(drillOrigin)); } catch (e) {}
  }

  function restoreDrillOrigin() {
    var o = drillOrigin;
    if (!o) {
      try { o = JSON.parse(sessionStorage.getItem('ecsDrillOrigin') || 'null'); } catch (e) { o = null; }
    }
    drillOrigin = null;
    try { sessionStorage.removeItem('ecsDrillOrigin'); } catch (e) {}
    if (o && typeof o.scrollY === 'number') window.scrollTo(0, o.scrollY);
  }

  if (backBtn) {
    backBtn.addEventListener('click', function () {
      modal.hide();
    });
  }
  modalEl.addEventListener('hidden.bs.modal', function () {
    restoreDrillOrigin();
    if (backBtn) backBtn.classList.add('d-none');
    cleanupModalArtifacts(true);
    setTimeout(function () { cleanupModalArtifacts(true); }, 0);
  });

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderAppBanner(apps) {
    if (!apps) return '';
    var impacted = apps.applications_impacted || [];
    return '<div class="alert alert-light border py-2 px-2 mb-2 small">' +
      '<strong>Release:</strong> ' + esc(apps.release) + ' · ' +
      '<strong>Primary:</strong> ' + esc(apps.primary_application) + '<br>' +
      '<strong>Applications impacted:</strong> ' + esc(impacted.join(', ')) +
      '</div>';
  }

  function renderDetailDl(data, keys) {
    if (!data) return '';
    var useKeys = keys || Object.keys(data).filter(function (k) {
      return typeof data[k] !== 'object' && k.indexOf('_records') === -1 && k !== 'content_preview';
    });
    return '<dl class="row small mb-2">' +
      useKeys.map(function (k) {
        return '<dt class="col-sm-4">' + esc(k.replace(/_/g, ' ')) + '</dt><dd class="col-sm-8">' + esc(data[k]) + '</dd>';
      }).join('') + '</dl>';
  }

  function renderHowCalculated(opts) {
    opts = opts || {};
    var h = '<div class="ecs-how-calculated alert alert-light border py-2 px-2 mb-2 small">';
    h += '<div class="fw-semibold mb-1">How Calculated</div>';
    if (opts.formula) h += '<p class="mb-1">' + esc(opts.formula) + '</p>';
    if (opts.aggregate != null && opts.aggregate !== '') {
      h += '<p class="mb-1"><strong>Current value:</strong> ' + esc(opts.aggregate) + esc(opts.unit || '%') + '</p>';
    }
    (opts.steps || []).forEach(function (s) {
      h += '<p class="mb-0 text-muted">' + esc(s) + '</p>';
    });
    h += '</div>';
    return h;
  }

  function refreshModalPagination(root) {
    if (window.ecsRefreshPagination) window.ecsRefreshPagination(root || bodyEl);
  }

  function drillAttrs(kind, metric, id, extra) {
    extra = extra || {};
    var attrs = ' data-aisdlc-drill="' + esc(kind) + '" data-metric="' + esc(metric || '') + '"';
    if (id) attrs += ' data-id="' + esc(id) + '"';
    if (extra.release) attrs += ' data-release="' + esc(extra.release) + '"';
    if (extra.stage) attrs += ' data-stage="' + esc(extra.stage) + '"';
    attrs += ' tabindex="0" style="cursor:pointer"';
    return attrs;
  }

  function formatCellValue(v) {
    if (v == null || v === '') return '';
    if (Array.isArray(v)) {
      if (!v.length) return '—';
      if (typeof v[0] === 'object') return v.length + ' linked';
      return v.join(', ');
    }
    if (typeof v === 'object') return '—';
    return v;
  }

  function renderDrillTable(rows, cols, drillCfg) {
    if (!rows || !rows.length) return '<p class="text-muted small">No records.</p>';
    drillCfg = drillCfg || {};
    var h = '<div class="ecs-gov-table-scroll"><table class="table table-sm aisdlc-table ecs-gov-data-table mb-0"><thead><tr>';
    cols.forEach(function (c) { h += '<th>' + esc(c.label) + '</th>'; });
    if (drillCfg.actionLabel) h += '<th></th>';
    h += '</tr></thead><tbody>';
    rows.forEach(function (r) {
      var idField = drillCfg.idField || 'id';
      var id = r.drill_id || r[drillCfg.idKey || idField] || r.control_id || r.evidence_id || r.gap_id || r.doc_id || r.req_id || r.test_id || r.defect_id || r.obs_id || r.exception_id || r.item_id || r.design_id || r.policy || r.prompt_id || r.model_id || r.application_id;
      var trAttrs = drillCfg.metric ? drillAttrs(drillCfg.kind || 'sdlc', drillCfg.metric, id, { release: drillCfg.release, stage: drillCfg.stage }) : '';
      h += '<tr' + trAttrs + '>';
      cols.forEach(function (c) {
        h += '<td>' + esc(formatCellValue(r[c.key])) + '</td>';
      });
      if (drillCfg.actionLabel) {
        h += '<td><span class="aisdlc-drill-link small"' + drillAttrs(drillCfg.kind || 'posture', drillCfg.actionMetric || drillCfg.metric, id, {}) + '>' + esc(drillCfg.actionLabel) + '</span></td>';
      }
      h += '</tr>';
    });
    h += '</tbody></table></div>';
    return h;
  }

  function colsFromRows(rows, max, exclude) {
    if (!rows || !rows.length) return [];
    exclude = exclude || ['control_records', 'defect_records', 'gap_records', 'evidence_records', 'violation_records', 'content_preview', 'artifact', 'stage_key', 'prompts_using_model', 'applications_using_model', 'related_prompts', 'related_model', 'audit_history', 'evidence_rows'];
    return Object.keys(rows[0]).filter(function (k) { return exclude.indexOf(k) === -1; }).slice(0, max || 8).map(function (k) {
      return { key: k, label: k.replace(/_/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); }) };
    });
  }

  var CONTROL_COLS = [
    {key:'control_id',label:'Control ID'},{key:'application',label:'Application'},{key:'framework',label:'Framework'},
    {key:'control_description',label:'Description'},{key:'owner',label:'Owner'},{key:'status',label:'Status'},
    {key:'evidence_count',label:'Evidence'},{key:'findings_count',label:'Findings'},{key:'exceptions_count',label:'Exceptions'}
  ];

  var FRAMEWORK_CONTROL_COLS = [
    {key:'control_id',label:'Control ID'},{key:'control_name',label:'Control Name'},{key:'control_objective',label:'Objective'},
    {key:'framework',label:'Framework'},{key:'requirement_source',label:'Requirement'},{key:'design_source',label:'Design'},
    {key:'development_source',label:'Development'},{key:'testing_source',label:'Testing'},{key:'evidence_count',label:'Evidence'},
    {key:'observations',label:'Observations'},{key:'exceptions',label:'Exceptions'},{key:'audit_findings',label:'Findings'},
    {key:'reuse_count',label:'Reuse Count'}
  ];

  var EVIDENCE_COLS = [
    {key:'evidence_id',label:'Evidence ID'},{key:'application',label:'Application'},{key:'framework',label:'Framework'},
    {key:'control_id',label:'Control'},{key:'title',label:'Title'},{key:'type',label:'Type'},{key:'status',label:'Status'},
    {key:'collected_date',label:'Collected'}
  ];

  var HISTORY_SECTIONS = [
    { key: 'previous_observations', label: 'Previous Audit Observations', metric: 'history_observation', idKey: 'obs_id' },
    { key: 'previously_approved_designs', label: 'Previously Approved Designs', metric: 'history_design', idKey: 'design_id' },
    { key: 'previously_accepted_evidence', label: 'Previously Accepted Evidence', metric: 'history_evidence', idKey: 'evidence_id' },
    { key: 'similar_controls', label: 'Similar Controls in Other Applications', metric: 'history_similar', idKey: 'control_id' },
    { key: 'historical_closure_comments', label: 'Historical Closure Comments', metric: 'history_closure', idKey: 'comment_id' }
  ];

  function renderKnowledgeGraph(graph, drillExtra) {
    if (!graph || !graph.nodes || !graph.nodes.length) return '';
    var h = '<div class="aisdlc-knowledge-graph mb-2"><p class="small fw-semibold mb-1">Control Relationship Graph</p><div class="aisdlc-graph-flow">';
    graph.nodes.forEach(function (n) {
      var cls = 'aisdlc-graph-node type-' + esc(n.type || 'default');
      var attrs = '';
      if (n.drill_metric && n.drill_id) {
        attrs = drillAttrs('sdlc', n.drill_metric, n.drill_id, drillExtra);
      }
      h += '<div class="' + cls + '"' + attrs + '><div class="gn-type">' + esc(n.type) + '</div><div class="gn-label">' + esc(n.label) + '</div></div>';
      h += '<div class="aisdlc-graph-arrow">→</div>';
    });
    h = h.replace(/<div class="aisdlc-graph-arrow">→<\/div>$/, '');
    h += '</div><p class="text-muted small mb-0">Click any node to drill into linked governance artifact.</p></div>';
    return h;
  }

  function renderKbTabs(tabs, drillExtra) {
    if (!tabs) return '';
    var uid = 'kbt' + Math.random().toString(36).slice(2, 8);
    var keys = Object.keys(tabs);
    var h = '<ul class="nav nav-tabs nav-tabs-sm aisdlc-kb-tabs mb-2" role="tablist">';
    keys.forEach(function (k, i) {
      h += '<li class="nav-item"><button class="nav-link' + (i === 0 ? ' active' : '') + '" data-bs-toggle="tab" data-bs-target="#' + uid + '-' + k + '" type="button">' +
        esc(tabs[k].label || k.replace(/_/g, ' ')) + '</button></li>';
    });
    h += '</ul><div class="tab-content aisdlc-kb-tab-panels">';
    keys.forEach(function (k, i) {
      var tab = tabs[k];
      h += '<div class="tab-pane fade' + (i === 0 ? ' show active' : '') + '" id="' + uid + '-' + k + '">';
      h += renderDrillTable(tab.rows || [], [
        {key:'reference_id',label:'Reference'},{key:'application',label:'Application'},{key:'release',label:'Release'},
        {key:'status',label:'Status'},{key:'owner',label:'Owner'},{key:'closure_date',label:'Closure'},{key:'summary',label:'Summary'}
      ], { kind: 'sdlc', metric: 'control', idKey: 'reference_id', release: drillExtra.release, stage: drillExtra.stage });
      h += '</div>';
    });
    h += '</div>';
    return h;
  }

  function renderControlKnowledgeRepo(kb, drillExtra, controlId) {
    if (!kb) return '';
    var p = kb.profile || {};
    var sm = kb.summary || {};
    var h = '<div class="aisdlc-knowledge-repo mb-2">';
    h += '<p class="small fw-semibold mb-1">Enterprise Control Knowledge Repository</p>';
    h += '<dl class="row small mb-2">';
    ['control_id','control_name','control_category','risk_rating','control_owner','control_objective','regulatory_mapping','framework_mapping'].forEach(function (k) {
      if (p[k]) h += '<dt class="col-sm-4">' + esc(k.replace(/_/g, ' ')) + '</dt><dd class="col-sm-8">' + esc(p[k]) + '</dd>';
    });
    if (p.control_description) h += '<dt class="col-sm-4">control description</dt><dd class="col-sm-8">' + esc(p.control_description) + '</dd>';
    h += '</dl>';
    h += '<div class="aisdlc-kb-stats row g-1 mb-2 small">';
    h += '<div class="col"><span class="badge bg-primary">Apps: ' + esc(sm.total_applications) + '</span></div>';
    h += '<div class="col"><span class="badge bg-success">Closed Obs: ' + esc(sm.closed_observations) + '</span></div>';
    h += '<div class="col"><span class="badge bg-warning text-dark">Open Obs: ' + esc(sm.open_observations) + '</span></div></div>';
    h += '<p class="small mb-1"><strong>Used in:</strong> ' + esc((sm.apps_using || []).join(', ')) + '</p>';
    h += '<p class="small mb-1"><strong>Implementing:</strong> ' + esc((sm.apps_implementing || []).join(', ')) + '</p>';
    h += '<p class="small mb-1"><strong>Failed:</strong> ' + esc((sm.apps_failed || []).join(', ')) + '</p>';
    h += '<p class="small mb-2"><strong>Closed observations:</strong> ' + esc((sm.apps_closed_observations || []).join(', ')) + '</p>';
    h += renderKbTabs(kb.tabs, drillExtra);
    h += '<button type="button" class="btn btn-sm btn-outline-primary mt-1"' +
      drillAttrs('sdlc', 'control_graph', controlId, drillExtra) + '>View Control Relationship Graph</button>';
    h += '</div>';
    return h;
  }

  function renderAuditKnowledgeKb(audit, drillExtra) {
    if (!audit) return '';
    var h = '<div class="aisdlc-audit-kb mb-2"><p class="small fw-semibold mb-1">Audit Observation Knowledge Base</p>';
    var blocks = [
      ['Open Observations', audit.open_observations, 'history_observation', 'observation_id'],
      ['Closed Observations', audit.closed_observations, 'history_observation', 'observation_id'],
      ['Repeat Observations', audit.repeat_observations, 'history_observation', 'observation_id'],
    ];
    blocks.forEach(function (b) {
      if (b[1] && b[1].length) {
        h += '<p class="small fw-semibold mb-1 mt-1">' + esc(b[0]) + ' (' + b[1].length + ')</p>';
        h += renderDrillTable(b[1], [
          {key:'observation_id',label:'Observation ID'},{key:'application',label:'Application'},{key:'audit_year',label:'Audit Year'},
          {key:'severity',label:'Severity'},{key:'closure_status',label:'Status'},{key:'summary',label:'Summary'}
        ], { kind: 'sdlc', metric: b[2], idKey: b[3], release: drillExtra.release, stage: drillExtra.stage });
      }
    });
    if (audit.root_causes && audit.root_causes.length) {
      h += '<p class="small fw-semibold mb-1">Root Causes</p>' + renderDocTable([{key:'cause',label:'Cause'},{key:'frequency',label:'Frequency'}], audit.root_causes);
    }
    if (audit.compensating_controls && audit.compensating_controls.length) {
      h += '<p class="small fw-semibold mb-1">Compensating Controls</p>' + renderDocTable([{key:'control',label:'Control'},{key:'application',label:'Application'}], audit.compensating_controls);
    }
    if (audit.closure_packages && audit.closure_packages.length) {
      h += '<p class="small fw-semibold mb-1">Historical Closure Packages</p>';
      h += renderDocTable([{key:'observation_id',label:'Observation'},{key:'evidence_used',label:'Evidence'},{key:'owner',label:'Owner'},{key:'approver',label:'Approver'},{key:'closure_comments',label:'Comments'}], audit.closure_packages);
    }
    h += '</div>';
    return h;
  }

  function renderLifecycleStepDetail(d) {
    if (!d) return '';
    var h = renderDetailDl(d, ['stage_label','application','owner','reviewer','status','submission_date','approval_date','evidence_count','comments']);
    var sections = [
      ['Documents', d.documents, [{key:'doc_id',label:'Doc ID'},{key:'title',label:'Title'},{key:'status',label:'Status'}]],
      ['Evidence', d.evidence, [{key:'evidence_id',label:'Evidence ID'},{key:'title',label:'Title'},{key:'status',label:'Status'}]],
      ['Approvals', d.approvals, [{key:'approver',label:'Approver'},{key:'date',label:'Date'},{key:'status',label:'Status'}]],
      ['Observations', d.observations, [{key:'obs_id',label:'Obs ID'},{key:'severity',label:'Severity'},{key:'status',label:'Status'}]],
      ['Exceptions', d.exceptions, [{key:'exception_id',label:'Exception'},{key:'summary',label:'Summary'},{key:'status',label:'Status'}]],
    ];
    sections.forEach(function (sec) {
      if (sec[1] && sec[1].length) {
        h += '<p class="small fw-semibold mb-1">' + sec[0] + ' (' + sec[1].length + ')</p>';
        h += renderDocTable(sec[2], sec[1]);
      }
    });
    return h;
  }

  function renderHeatmap(data, kind) {
    if (!data || !data.rows) return '<p class="text-muted small">No heatmap data.</p>';
    var dims = data.dimensions || [];
    var h = '<div class="aisdlc-heat-grid mb-2"><div class="aisdlc-heat-row aisdlc-heat-header"><div class="aisdlc-heat-label">Application</div>';
    dims.forEach(function (d) { h += '<div class="aisdlc-heat-cell">' + esc(d) + '</div>'; });
    h += '</div>';
    data.rows.forEach(function (row) {
      h += '<div class="aisdlc-heat-row"><div class="aisdlc-heat-label">' + esc(row.application) + '</div>';
      (row.cells || []).forEach(function (cell) {
        var cellId = (row.application_id || row.application) + '::' + cell.dimension;
        h += '<div class="aisdlc-heat-cell tone-' + esc(cell.tone || 'amber') + '"' +
          drillAttrs(kind || 'posture', 'heatmap_cell', cellId) + '>' + esc(cell.score) + '</div>';
      });
      h += '</div>';
    });
    h += '</div><p class="text-muted small mb-0">Click any cell for application × dimension drill-down.</p>';
    return h;
  }

  function renderStageCard(data) {
    if (!data) return '';
    var h = '<div class="aisdlc-stage-card-drill">';
    h += renderDetailDl(data, ['stage_label','readiness_score','framework_coverage_pct','control_coverage_pct','evidence_coverage_pct','open_gaps','status','approval_status']);
    if (data.related_applications && data.related_applications.length) {
      h += '<p class="small mb-1"><strong>Related applications:</strong> ' + esc(data.related_applications.join(', ')) + '</p>';
    }
    if (data.historical_implementations) {
      h += '<p class="small fw-semibold mb-1">Historical Implementations</p>' + renderDocTable(
        [{key:'application',label:'Application'},{key:'release',label:'Release'},{key:'status',label:'Status'},{key:'closure_date',label:'Closure'}],
        data.historical_implementations);
    }
    if (data.reuse_candidates) {
      h += '<p class="small fw-semibold mb-1">Reuse Candidates</p>' + renderDocTable(
        [{key:'control_id',label:'Control'},{key:'application',label:'Application'},{key:'reuse_score',label:'Reuse Score'}],
        data.reuse_candidates);
    }
    if (data.reusable_patterns) {
      h += '<p class="small fw-semibold mb-1">Reusable Design Patterns</p>' + renderDocTable(
        [{key:'pattern',label:'Pattern'},{key:'used_in',label:'Used In'},{key:'approvals',label:'Approvals'}],
        data.reusable_patterns.map(function (p) { return { pattern: p.pattern, used_in: (p.used_in || []).join(', '), approvals: p.approvals }; }));
    }
    if (data.code_patterns) {
      h += '<p class="small fw-semibold mb-1">Reusable Code Patterns</p>' + renderDocTable(
        [{key:'pattern',label:'Pattern'},{key:'repo',label:'Repository'},{key:'apps',label:'Apps'}], data.code_patterns);
    }
    if (data.static_scan_history) {
      h += '<p class="small fw-semibold mb-1">Static Scan History</p>' + renderDocTable(
        [{key:'date',label:'Date'},{key:'critical',label:'Critical'},{key:'high',label:'High'},{key:'status',label:'Status'}], data.static_scan_history);
    }
    if (data.test_plans && data.test_plans.length) {
      h += '<p class="small fw-semibold mb-1">Test Plans (' + data.test_plans.length + ')</p>' + renderDrillTable(data.test_plans.slice(0, 8), colsFromRows(data.test_plans, 6), { kind: 'sdlc', metric: 'testing', idKey: 'test_id' });
    }
    if (data.reusable_packs) {
      h += '<p class="small fw-semibold mb-1">Reusable Test Packs</p>' + renderDocTable(
        [{key:'pack',label:'Pack'},{key:'pass_rate',label:'Pass Rate'},{key:'apps',label:'Apps'}], data.reusable_packs);
    }
    if (data.cab_approvals) {
      h += '<p class="small fw-semibold mb-1">CAB Approvals</p>' + renderDocTable(
        [{key:'id',label:'CAB ID'},{key:'date',label:'Date'},{key:'authority',label:'Authority'},{key:'status',label:'Status'}], data.cab_approvals);
    }
    if (data.historical_releases) {
      h += '<p class="small fw-semibold mb-1">Historical Releases</p>' + renderDocTable(
        [{key:'application',label:'Application'},{key:'release',label:'Release'},{key:'go_live_date',label:'Go-Live'},{key:'result',label:'Result'}], data.historical_releases);
    }
    h += '</div>';
    return h;
  }

  function renderReuseWizard(wizData) {
    if (!wizData) return '';
    var uid = 'rwiz' + Math.random().toString(36).slice(2, 8);
    var steps = [
      { n: 1, title: 'Select Applications', body: '<div class="d-flex flex-wrap gap-1">' + (wizData.available_applications || []).map(function (a) {
        return '<span class="badge bg-primary">' + esc(a) + '</span>';
      }).join('') + '</div>' },
      { n: 2, title: 'Select Frameworks', body: '<div class="d-flex flex-wrap gap-1">' + (wizData.available_frameworks || []).slice(0, 5).map(function (f) {
        return '<span class="badge bg-info text-dark">' + esc(f) + '</span>';
      }).join('') + '</div>' },
      { n: 3, title: 'Select Controls', body: renderDocTable([{key:'control',label:'Control ID'}], (wizData.suggested_controls || []).map(function (c) { return { control: c }; })) },
      { n: 4, title: 'Preview Mappings', body: renderDocTable(
        [{key:'application',label:'Application'},{key:'framework',label:'Framework'},{key:'control_id',label:'Control'},{key:'status',label:'Status'}],
        wizData.preview_mappings || []) },
      { n: 5, title: 'Generate Package', body: '<p class="small mb-1">Cloned requirement package ready:</p><p class="fw-semibold">' + esc(wizData.cloned_package_id) + '</p><p class="text-muted small">Mappings will be attached to target release governance workspace.</p>' }
    ];
    var h = '<div class="aisdlc-reuse-wizard" id="' + uid + '"><p class="small fw-semibold">Reuse Requirement Wizard — ' + esc(wizData.document_title || wizData.document_id) + '</p>';
    steps.forEach(function (s, i) {

  function bindModalWorkspace(root) {
    if (!root) return;
    root.querySelectorAll('.ecs-workspace-tab').forEach(function (btn) {
      if (btn.dataset.modalTabBound) return;
      btn.dataset.modalTabBound = '1';
      btn.addEventListener('click', function () {
        var tabId = btn.getAttribute('data-workspace-tab');
        root.querySelectorAll('.ecs-workspace-tab').forEach(function (b) {
          b.classList.toggle('is-active', b.getAttribute('data-workspace-tab') === tabId);
        });
        root.querySelectorAll('.ecs-workspace-pane').forEach(function (pane) {
          pane.classList.toggle('is-active', pane.getAttribute('data-workspace-pane') === tabId);
        });
        refreshModalPagination(root);
      });
    });
    bindGapsDrillControls(root);
  }

  function bindGapsDrillControls(root) {
    root.querySelectorAll('.ecs-gaps-drill-toolbar').forEach(function (wrap) {
      if (wrap.dataset.gapsBound) return;
      wrap.dataset.gapsBound = '1';
      var release = wrap.getAttribute('data-release') || '';
      var stage = wrap.getAttribute('data-stage') || '';
      var state = {
        page: parseInt(wrap.getAttribute('data-page') || '1', 10) || 1,
        severity: wrap.getAttribute('data-severity') || '',
        search: wrap.getAttribute('data-search') || ''
      };
      function reload() {
        openDrill('sdlc', 'gaps_drill', '', { release: release, stage: stage }, {
          page: state.page, severity: state.severity, search: state.search
        });
      }
      wrap.querySelectorAll('.ecs-gaps-sev-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          state.severity = btn.getAttribute('data-sev') || '';
          state.page = 1;
          reload();
        });
      });
      var searchInput = wrap.querySelector('.ecs-gaps-search');
      if (searchInput && !searchInput.dataset.gapsSearchBound) {
        searchInput.dataset.gapsSearchBound = '1';
        var searchTimer;
        searchInput.addEventListener('input', function () {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(function () {
            state.search = searchInput.value || '';
            state.page = 1;
            reload();
          }, 350);
        });
      }
      wrap.querySelectorAll('[data-gaps-page]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var pg = parseInt(btn.getAttribute('data-gaps-page'), 10);
          if (!pg || pg < 1) return;
          state.page = pg;
          reload();
        });
      });
    });
  }

      return html;
    }

    if (p.type === 'exec_ranking' && p.rows) {
      html += renderDrillTable(p.rows, [
        {key:'application',label:'Application'},{key:'total_gaps',label:'Total Gaps'},{key:'high_gaps',label:'High'},{key:'stages_affected',label:'Stages'},{key:'owner',label:'Owner'}
      ], { kind: 'sdlc', metric: 'exec_gap_applications', idKey: 'application', release: drillExtra.release });
      return html;
    }

    if (p.type === 'exec_matrix' && p.rows) {
      html += renderDrillTable(p.rows, [
        {key:'application',label:'Application'},{key:'framework',label:'Framework'},{key:'compliance_pct',label:'Compliance %'},{key:'controls_covered',label:'Covered'},{key:'controls_total',label:'Total'}
      ], { kind: 'sdlc', metric: 'exec_framework_by_app', idKey: 'drill_id', release: drillExtra.release });
      return html;
    }

    if (p.type === 'exec_dashboard' && p.rows) {
      html += renderDrillTable(p.rows, [
        {key:'label',label:'Stage'},{key:'completion_pct',label:'Completion %'},{key:'readiness_score',label:'Readiness'},{key:'open_gaps',label:'Gaps'},{key:'evidence_collected',label:'Evidence'}
      ], { kind: 'sdlc', metric: 'exec_stage_completion', idKey: 'stage', release: drillExtra.release });
      return html;
    }

    if (p.type === 'exec_exceptions' && p.rows) {
      html += renderDrillTable(p.rows, colsFromRows(p.rows, 7), { kind: 'sdlc', metric: 'exec_exceptions', idKey: 'exception_id', release: drillExtra.release, stage: 'go-live' });
      return html;
    }

    if (p.type === 'exec_gap_app' || p.type === 'exec_stage' || p.type === 'exec_fw_cell') {
      html += renderDetailDl(p.data);
      return html;
    }

    if ((p.type === 'prompt' || p.type === 'gap' || p.type === 'version' || p.type === 'requirement' ||
         p.type === 'design' || p.type === 'development' || p.type === 'testing' || p.type === 'defect' ||
         p.type === 'observation' || p.type === 'exception' || p.type === 'checklist_item' || p.type === 'release') && p.data) {
      html += renderDetailDl(p.data);
      if (p.rows && p.rows.length) {
        var subMetric = 'evidence';
        var subIdKey = 'evidence_id';
        if (p.type === 'requirement') { subMetric = 'control'; subIdKey = 'control_id'; }
        else if (p.type === 'testing') { subMetric = 'defects'; subIdKey = 'defect_id'; }
        html += renderDrillTable(p.rows, colsFromRows(p.rows, 6), { kind: 'sdlc', metric: subMetric, idKey: subIdKey, release: drillExtra.release, stage: drillExtra.stage });
      }
      return html;
    }

    if (p.type === 'stage_summary' && p.data) {
      html += renderDetailDl(p.data);
      if (p.rows && p.rows.length) {
        html += '<p class="small fw-semibold mb-1">Framework rows (' + p.rows.length + ')</p>';
        html += renderDrillTable(p.rows, colsFromRows(p.rows, 8, ['control_records','evidence_records','gap_records']), { kind: 'sdlc', metric: 'framework', idKey: 'framework', release: drillExtra.release, stage: drillExtra.stage });
      }
      return html;
    }

    if (p.type === 'list' && p.rows) {
      html += '<p class="small text-muted mb-2">' + esc(p.title || '') + '</p>';
      var listKind = p.list_kind || '';
      var listKindPosture = listKind.indexOf('posture_') === 0 || listKind === 'posture_inventory';
      var listKindRegistry = listKind.indexOf('registry_') === 0;
      var listKindName = listKindPosture ? 'posture' : (listKindRegistry ? 'registry' : 'sdlc');
      var listMetric = 'gaps';
      var listIdKey = 'gap_id';
      if (listKind === 'posture_inventory' || (p.title && p.title.indexOf('Application Inventory') >= 0)) {
        listMetric = 'application'; listIdKey = 'id';
        html += renderDrillTable(p.rows, [
          {key:'name',label:'Application'},{key:'owner',label:'Owner'},{key:'model',label:'Model'},{key:'use_case',label:'Use Case'},
          {key:'risk_tier',label:'Risk Tier'},{key:'compliance_score',label:'Compliance'},{key:'policy_compliance',label:'Policy %'}
        ], { kind: 'posture', metric: listMetric, idKey: listIdKey });
        return html;
      }
      if (listKind === 'posture_models' || (p.title && p.title.indexOf('Model Approval') >= 0)) {
        listMetric = 'models'; listIdKey = 'application_id';
        html += renderDrillTable(p.rows, [
          {key:'model',label:'Model'},{key:'application',label:'Application'},{key:'status',label:'Status'},{key:'risk_tier',label:'Risk'},{key:'expiry',label:'Expiry'}
        ], { kind: 'posture', metric: listMetric, idKey: listIdKey });
        return html;
      }
      if (listKind === 'posture_prompts' || listKind === 'posture_hallucinations' || listKind === 'posture_unsafe' || (p.title && p.title.indexOf('Prompt') >= 0 && p.title.indexOf('Version') < 0)) {
        listMetric = 'prompts'; listIdKey = 'prompt_id';
        html += renderDrillTable(p.rows, [
          {key:'prompt_id',label:'Prompt ID'},{key:'application',label:'Application'},{key:'model',label:'Model'},{key:'risk_score',label:'Risk'},{key:'review_status',label:'Status'}
        ], { kind: listKindName, metric: listMetric, idKey: listIdKey });
        return html;
      }
      if (listKindRegistry && listKind.indexOf('models') >= 0) {
        html += renderDrillTable(p.rows, [
          {key:'model_id',label:'Model ID'},{key:'name',label:'Model'},{key:'applications_count',label:'Apps'},{key:'prompts_count',label:'Prompts'},
          {key:'owner',label:'Owner'},{key:'status',label:'Status'},{key:'risk_tier',label:'Risk'},{key:'expiry',label:'Expiry'}
        ], { kind: 'registry', metric: 'models', idKey: 'model_id' });
        return html;
      }
      if (listKindRegistry && listKind.indexOf('prompts') >= 0) {
        html += renderDrillTable(p.rows, [
          {key:'prompt_id',label:'Prompt ID'},{key:'name',label:'Prompt'},{key:'application',label:'Application'},{key:'use_case',label:'Use Case'},
          {key:'model',label:'Model'},{key:'owner',label:'Owner'},{key:'risk_score',label:'Risk'},{key:'status',label:'Status'}
        ], { kind: 'registry', metric: 'prompts', idKey: 'prompt_id' });
        return html;
      }
      if (p.title && p.title.indexOf('Requirement') >= 0) { listMetric = 'requirements'; listIdKey = 'req_id'; }
      else if (p.title && p.title.indexOf('Design') >= 0) { listMetric = 'designs'; listIdKey = 'design_id'; }
      else if (p.title && p.title.indexOf('Development') >= 0) { listMetric = 'development'; listIdKey = 'item_id'; }
      else if (p.title && p.title.indexOf('Test') >= 0) { listMetric = 'testing'; listIdKey = 'test_id'; }
      else if (p.title && p.title.indexOf('Observation') >= 0) { listMetric = 'observations'; listIdKey = 'obs_id'; }
      else if (p.title && p.title.indexOf('Exception') >= 0) { listMetric = 'exceptions'; listIdKey = 'exception_id'; }
      else if (p.title && p.title.indexOf('Checklist') >= 0) { listMetric = 'checklist'; listIdKey = 'item_id'; }
      else if (p.title && p.title.indexOf('Framework') >= 0) { listMetric = 'framework'; listIdKey = 'framework'; }
      else if (p.title && p.title.indexOf('Readiness') >= 0 || p.title && p.title.indexOf('Stage') >= 0) { listMetric = 'readiness'; listIdKey = 'key'; }
      html += renderDrillTable(p.rows, colsFromRows(p.rows, 8, ['control_records','evidence_records','gap_records','violation_records']), { kind: listKindName, metric: listMetric, idKey: listIdKey, release: drillExtra.release, stage: drillExtra.stage });
      return html;
    }

    if (p.type === 'tokens' && p.data) {
      var t = p.data;
      var analytics = t.analytics || {};
      html += '<p class="small"><strong>By application (' + (t.by_application || []).length + ')</strong></p>' + renderDrillTable(t.by_application, [
        {key:'application',label:'Application'},{key:'tokens',label:'Tokens'},{key:'cost_usd',label:'Cost USD'},{key:'prompt_volume',label:'Prompt Volume'}
      ], { kind: 'posture', metric: 'tokens' });
      if (analytics.monthly_trends && analytics.monthly_trends.length) {
        html += '<p class="small mt-2 fw-semibold">Trend Analytics</p>' + renderDocTable([
          {key:'month',label:'Month'},{key:'tokens',label:'Tokens'},{key:'cost_usd',label:'Cost USD'},
          {key:'hallucinations',label:'Hallucinations'},{key:'policy_violations',label:'Policy Violations'},
          {key:'exceptions',label:'Exceptions'},{key:'approvals',label:'Approvals'}
        ], analytics.monthly_trends.slice(-12));
      }
      if (t.monthly_trend && t.monthly_trend.length) {
        html += '<p class="small mt-2"><strong>12-month token trend</strong></p>' + renderDrillTable(t.monthly_trend, [
          {key:'month',label:'Month'},{key:'tokens',label:'Tokens'}
        ], { kind: 'posture', metric: 'tokens', idKey: 'month_key' });
      }
      return html;
    }

    if (p.type === 'summary' && p.data) {
      html += renderDetailDl(p.data);
      var rows = p.rows || [];
      if (rows.length) html += renderDrillTable(rows, colsFromRows(rows, 8), { kind: 'sdlc', metric: 'readiness', idKey: 'key', release: drillExtra.release, stage: drillExtra.stage });
      return html;
    }

    if (p.workflow && p.workflow.length) {
      var wf = '<div class="aisdlc-workflow">';
      p.workflow.forEach(function (s) {
        var cls = s.status === 'Complete' ? 'is-done' : (s.status === 'In Progress' || s.status === 'Conditional' ? 'is-active' : '');
        wf += '<div class="aisdlc-wf-step ' + cls + '"><div class="step-n">' + esc(s.step) + '</div><div>' + esc(s.stage) + '</div><div class="text-muted">' + esc(s.actor || '') + '</div></div>';
      });
      wf += '</div>';
      html += p.data ? renderDetailDl(p.data) : '';
      html += wf;
      return html;
    }

    if (p.data && typeof p.data === 'object') {
      html += renderDetailDl(p.data);
      return html;
    }
    return html + '<p class="text-muted small">' + esc(p.title || 'Detail') + '</p>';
  }

  var STAGE_SLUGS = { requirement: 'requirements', design: 'design', development: 'development', testing: 'testing', 'go-live': 'golive' };

  function stageWorkspaceHref(stageKey, releaseId, tab) {
    var slug = STAGE_SLUGS[stageKey] || stageKey;
    var url = '/sdlc/' + slug + '?release=' + encodeURIComponent(releaseId || '');
    if (tab) url += '&tab=' + encodeURIComponent(tab);
    return url;
  }

  function resolveFooterLink(kind, metric, id) {
    var mod = getNavModule();
    if (metric === 'models' || metric === 'models_approved') {
      if (kind === 'posture' && mod === 'ai_governance') return { href: '/mvp/ai-registry', text: 'Open Model Registry' };
      if (kind === 'registry' && mod === 'ai_registry') return id ? { href: '/mvp/ai-registry', text: 'View in Model Registry' } : null;
      return { href: '/mvp/ai-registry', text: 'Open Model Registry' };
    }
    if ((metric === 'prompts' || metric === 'prompts_pending') && kind === 'posture' && mod === 'ai_governance') {
      return { href: '/mvp/ai-registry', text: 'Open Prompt Registry' };
    }
    if (metric === 'inventory' && kind === 'posture') return { href: '/mvp/ai-registry', text: 'Open Model & Prompt Registry' };
    if (metric === 'application' && kind === 'posture') return { href: '/mvp/ai-registry', text: 'Open Model & Prompt Registry' };
    if (kind === 'registry' && mod !== 'ai_registry') return { href: '/mvp/ai-registry', text: 'Open Model & Prompt Registry' };
    if (kind === 'posture' && mod !== 'ai_governance') return { href: '/mvp/ai-governance', text: 'Open AI Governance Posture' };
    if (kind === 'sdlc' && mod !== 'sdlc_gates') return { href: '/mvp/sdlc-gates', text: 'Open SDLC Gates' };
    return null;
  }

  function applyDrillLinks(p, kind, metric, id, extra, stageHref) {
    var footer = p.footer_link || resolveFooterLink(kind, metric, id);
    if (stageHref && window.ecsGovernanceSetStageLink) {
      window.ecsGovernanceSetStageLink(stageLinkEl, stageHref, p.stage_key || extra.stage || '', p.navigation_context);
      if (footer && footer.href) setLink(footer.href, footer.text);
      else setLink(null);
    } else if (stageHref) {
      if (footer && footer.href) setLink(footer.href, footer.text, stageHref);
      else setLink(null, null, stageHref);
    } else if (footer && footer.href) {
      setLink(footer.href, footer.text);
    } else if (metric === 'application' || (metric === 'inventory' && id)) {
      setLink('/mvp/ai-registry', 'Open Model & Prompt Registry');
    } else if (kind === 'sdlc' && p.stage_key) {
      setLink(null, null, stageWorkspaceHref(p.stage_key, p.release_id || ''));
    } else if (kind === 'sdlc') {
      setLink('/mvp/sdlc-gates', 'Open SDLC Gates');
    } else {
      setLink(null);
    }
  }

  function setLink(href, text, stageHref) {
    if (stageHref) {
      stageLinkEl.href = stageHref + (stageHref.indexOf('?') >= 0 ? '&' : '?') + q.slice(1);
      stageLinkEl.classList.remove('d-none');
    } else {
      stageLinkEl.classList.add('d-none');
    }
    if (href) {
      linkEl.href = href + (href.indexOf('?') >= 0 ? '&' : '?') + q.slice(1);
      linkEl.textContent = text || 'Open related module';
      linkEl.classList.remove('d-none');
    } else {
      linkEl.classList.add('d-none');
    }
  }

  function openDrill(kind, metric, id, extra, queryOpts) {
    extra = extra || {};
    queryOpts = queryOpts || {};
    captureDrillOrigin();
    if (backBtn) backBtn.classList.remove('d-none');
    lastDrill = { kind: kind || 'sdlc', release: extra.release || '', stage: extra.stage || '' };
    var originMod = getNavModule();
    var url;
    if (kind === 'registry') {
      url = '/api/ai-sdlc/registry/drill?section=' + encodeURIComponent(metric || '') + '&item_id=' + encodeURIComponent(id || '') +
        '&origin_module=' + encodeURIComponent(originMod);
    } else if (kind === 'sdlc') {
      url = '/api/ai-sdlc/sdlc/drill?metric=' + encodeURIComponent(metric || '') +
        '&release=' + encodeURIComponent(extra.release || '') +
        '&stage=' + encodeURIComponent(extra.stage || '') +
        '&item_id=' + encodeURIComponent(id || '') +
        '&origin_module=' + encodeURIComponent(originMod);
      if (queryOpts.page) url += '&page=' + encodeURIComponent(queryOpts.page);
      if (queryOpts.severity != null && queryOpts.severity !== undefined) url += '&severity=' + encodeURIComponent(queryOpts.severity);
      if (queryOpts.search) url += '&search=' + encodeURIComponent(queryOpts.search);
    } else {
      url = '/api/ai-sdlc/posture/drill?metric=' + encodeURIComponent(metric || '') + '&item_id=' + encodeURIComponent(id || '') +
        '&origin_module=' + encodeURIComponent(originMod);
    }
    titleEl.textContent = 'Loading…';
    bodyEl.innerHTML = '<div class="text-muted small">Loading…</div>';
    setLink(null);
    cleanupModalArtifacts(false);
    modal.show();
    fetch(url).then(function (r) { return r.json(); }).then(function (j) {
      var p = j.payload || j.data || {};
      titleEl.textContent = p.title || 'Detail';
      var dialogEl = document.getElementById('aisdlcDrillDialog');
      if (dialogEl) {
        dialogEl.classList.toggle('modal-xl', p.type === 'knowledge_graph' || p.type === 'control' || p.type === 'document_viewer' || p.type === 'framework' || p.type === 'stage_card' || p.type === 'heatmap' || true);
        dialogEl.classList.toggle('ecs-gov-modal-full', true);
        dialogEl.classList.toggle('modal-dialog-scrollable', !(p.type === 'control' || p.type === 'document_viewer'));
      }
      if (modalContentEl) {
        modalContentEl.classList.toggle('ecs-modal-workspace', p.type === 'control' || p.type === 'document_viewer');
      }
      bodyEl.innerHTML = renderPayload(p);
      bindModalWorkspace(bodyEl);
      if (window.ecsEnhanceGovTables) window.ecsEnhanceGovTables(bodyEl);
      if (window.GovernanceModal) window.GovernanceModal.setFullWidth(true);
      bodyEl.querySelectorAll('.aisdlc-reuse-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var wrap = bodyEl.querySelector('.aisdlc-reuse-wizard-wrap');
          if (wrap) {
            wrap.classList.toggle('d-none');
            wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        });
      });
      if (window.ecsEnhanceGovTables) window.ecsEnhanceGovTables(bodyEl);
      var stageHref = p.stage_link || '';
      if (!stageHref && extra.stage) {
        var tabMap = { framework: 'framework-coverage', framework_coverage_drill: 'framework-coverage', controls: 'control-coverage', control_coverage_drill: 'control-coverage', control: 'control-coverage', evidence: 'evidence-coverage', evidence_coverage_drill: 'evidence-coverage', gaps: 'open-gaps', gaps_drill: 'open-gaps', documents: 'knowledge-reuse', document: 'knowledge-reuse', audit: 'audit-trail', readiness_breakdown: 'readiness', status_timeline: 'status', approvals_drill: 'approvals', historical_lineage: 'knowledge-reuse', knowledge_reuse: 'knowledge-reuse', control_reuse_repo: 'knowledge-reuse' };
        stageHref = stageWorkspaceHref(extra.stage, extra.release || p.release_id || '', tabMap[metric] || 'overview');
      }
      if (!stageHref && p.stage_key) {
        stageHref = stageWorkspaceHref(p.stage_key, p.release_id || extra.release || '', 'overview');
      }
      applyDrillLinks(p, kind, metric, id, extra, stageHref);
    }).catch(function () {
      bodyEl.innerHTML = '<p class="text-danger small">Failed to load drill-down.</p>';
    });
  }

  window.openDrill = openDrill;

  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-aisdlc-drill]');
    if (!el) return;
    e.preventDefault();
    openDrill(
      el.getAttribute('data-aisdlc-drill'),
      el.getAttribute('data-metric') || el.getAttribute('data-section'),
      el.getAttribute('data-id') || '',
      {
        release: el.getAttribute('data-release') || '',
        stage: el.getAttribute('data-stage') || ''
      }
    );
  });

  document.querySelectorAll('[data-aisdlc-drill]').forEach(function (el) {
    if (el.tabIndex < 0 && !el.href) el.tabIndex = 0;
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
    });
  });
})();
</script>
