<style>
/* EP-UI-001 — platform-wide layout, tables, tabs, copilot dock */
.ecs-sidebar-role-line {
  font-size: 0.72rem;
  color: rgba(255, 255, 255, 0.72);
  font-weight: 500;
  letter-spacing: 0.02em;
  text-transform: none;
  margin-top: -0.5rem;
}
.ecs-sidebar-profile {
  padding: 0.55rem 0.5rem 0.65rem;
  margin-bottom: 0.5rem;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.04);
  border-radius: 8px;
}
.ecs-sidebar-profile-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: #f1f5f9;
  line-height: 1.3;
}
.ecs-sidebar-profile-title {
  font-size: 0.68rem;
  color: rgba(255, 255, 255, 0.55);
  margin-top: 0.15rem;
  line-height: 1.35;
}

.ecs-persona-tabs {
  border-bottom: 2px solid #e2e8f0;
  gap: 0.15rem;
  flex-wrap: nowrap;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
}
.ecs-persona-tabs .nav-link {
  font-size: 0.8125rem;
  font-weight: 600;
  color: #64748b;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  padding: 0.55rem 0.85rem;
  white-space: nowrap;
  border-radius: 0;
  background: transparent;
}
.ecs-persona-tabs .nav-link:hover { color: #1e293b; }
.ecs-persona-tabs .nav-link.active {
  color: var(--ecs-accent, #2563eb);
  border-bottom-color: var(--ecs-accent, #2563eb);
  background: transparent;
}
.ecs-persona-tab-pane { padding-top: 1rem; }

.ecs-escalation-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.65rem;
  margin-bottom: 1rem;
}
.ecs-escalation-kpi {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 0.65rem 0.75rem;
  min-height: 72px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.ecs-escalation-kpi-val { font-size: 1.35rem; font-weight: 700; line-height: 1.1; color: #1e293b; }
.ecs-escalation-kpi-lbl { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: #64748b; margin-top: 0.2rem; }
.ecs-escalation-kpi.danger { border-left: 4px solid #dc3545; }
.ecs-escalation-kpi.warning { border-left: 4px solid #ffc107; }
.ecs-escalation-kpi.primary { border-left: 4px solid #2563eb; }

.ecs-risk-table-wrap {
  overflow-x: hidden;
  max-width: 100%;
}
.ecs-risk-table {
  width: 100%;
  table-layout: fixed;
  font-size: 0.78rem;
  margin-bottom: 0;
}
.ecs-risk-table th,
.ecs-risk-table td {
  padding: 0.45rem 0.55rem;
  vertical-align: middle;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.ecs-risk-table th { background: #f1f5f9; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.03em; }
.ecs-risk-table .col-control { width: 28%; }
.ecs-risk-table .col-app { width: 18%; }
.ecs-risk-table .col-fw { width: 14%; }
.ecs-risk-table .col-risk { width: 12%; }
.ecs-risk-table .col-age { width: 10%; }
.ecs-risk-table .col-status { width: 12%; }
.ecs-risk-table .col-expand { width: 6%; text-align: center; }
.ecs-cell-tip { cursor: help; border-bottom: 1px dotted #94a3b8; }
.ecs-risk-table tr.ecs-risk-detail-row td {
  white-space: normal;
  background: #f8fafc;
  font-size: 0.72rem;
  padding: 0.65rem 0.75rem;
  border-top: none;
}
.ecs-risk-expand-btn {
  border: none;
  background: #e2e8f0;
  color: #475569;
  width: 26px;
  height: 26px;
  border-radius: 6px;
  font-size: 0.75rem;
  line-height: 1;
  cursor: pointer;
  padding: 0;
}
.ecs-risk-expand-btn[aria-expanded="true"] { background: #2563eb; color: #fff; }

.ecs-framework-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.65rem;
}
.ecs-framework-tile {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 0.65rem 0.75rem;
}

.ecs-main-content { overflow-x: hidden; }
.ecs-page-content { max-width: 100%; overflow-x: hidden; }
.ecs-kpi-modern .ecs-kpi-value { word-break: break-word; overflow-wrap: anywhere; }

/* Copilot dock modes */
.ecs-chat-copilot[data-dock="bottom"] {
  left: 0;
  right: 0;
  bottom: 0;
  width: auto !important;
  max-width: none;
}
.ecs-chat-copilot[data-dock="bottom"] .ecs-chat-panel {
  width: min(960px, calc(100vw - 32px));
  margin: 0 auto 12px;
  max-height: min(55vh, 520px);
}
.ecs-chat-copilot[data-dock="bottom"][data-state="minimized"] .ecs-chat-collapsed-bar {
  margin: 0 auto 12px;
  max-width: min(960px, calc(100vw - 32px));
}
.ecs-chat-copilot[data-dock="right"] {
  right: 20px;
  left: auto;
  bottom: 20px;
}
.ecs-chat-dock-group .btn { font-size: 0.62rem; padding: 0.1rem 0.35rem; min-width: 28px; }
.ecs-chat-dock-group .btn.active { background: var(--ecs-accent, #2563eb); color: #fff; border-color: var(--ecs-accent, #2563eb); }

@media (max-width: 991.98px) {
  .ecs-risk-table .col-control { width: 24%; }
  .ecs-risk-table .col-app { width: 20%; }
}
@media (max-width: 767.98px) {
  .ecs-escalation-strip { grid-template-columns: repeat(2, 1fr); }
  .ecs-risk-table th:nth-child(n+4):not(.col-expand),
  .ecs-risk-table td:nth-child(n+4):not(.col-expand) { display: none; }
  .ecs-risk-table .col-control { width: 42%; }
  .ecs-risk-table .col-app { width: 38%; }
}
</style>
<script>
(function(){
  function bindRiskTables(root) {
    (root || document).querySelectorAll('.ecs-risk-table').forEach(function(table) {
      if (table._ecsRiskBound) return;
      table._ecsRiskBound = true;
      table.querySelectorAll('.ecs-risk-expand-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var tr = btn.closest('tr');
          var detail = tr && tr.nextElementSibling;
          if (!detail || !detail.classList.contains('ecs-risk-detail-row')) return;
          var open = detail.hidden;
          detail.hidden = !open;
          btn.setAttribute('aria-expanded', open ? 'true' : 'false');
          btn.textContent = open ? '−' : '+';
        });
      });
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ bindRiskTables(document); });
  } else {
    bindRiskTables(document);
  }
  window.ecsBindRiskTables = bindRiskTables;
})();
</script>
