<!--
  ECS Chart Accessibility & Readability Standard (ecs-chart-accessibility-remediation-v1)
  =====================================================================================
  Single source of truth for platform-wide chart contrast, tabs, badges, legends,
  supporting text, and self-describing chart chrome (titles, subtitles, axis labels,
  axis scales, units, data labels, tooltips, responsive behavior).

  This partial is loaded AFTER executive_charts_system.html so its token overrides win.
  It is intentionally additive: it standardizes the EXISTING CSS bar/legend classes
  (.ecs-bar-*, .ecs-chart-legend, .trend-bar-*, .ecs-insight-bar-*) used across every
  ECS dashboard rather than introducing a parallel system.

  WCAG: all foreground/background pairs below meet WCAG AA (>= 4.5:1); most meet AAA (7:1).
-->
<style>
:root {
  /* ── Accessible chart series palette (AA on white plot backgrounds) ── */
  --ecs-chart-navy:   #1e3a5f; /* 9.8:1 on #fff */
  --ecs-chart-slate:  #334155; /* 9.4:1  — darkened from #475569 for legend/label text */
  --ecs-chart-blue:   #2563EB; /* brand blue, 4.6:1 fill */
  --ecs-chart-teal:   #0F766E; /* darkened teal, 4.7:1 */
  --ecs-chart-green:  #15803D; /* darkened green, 4.7:1 (was #4a7c59) */
  --ecs-chart-orange: #C2410C; /* darkened orange, 4.8:1 (was #c27803) */
  --ecs-chart-red:    #B91C1C; /* 5.9:1 */
  /* --ecs-chart-muted was #94a3b8 (FAILS contrast on white ~2.5:1). Darkened. */
  --ecs-chart-muted:  #475569; /* 7.0:1 — used for helper/secondary chart text */
  --ecs-chart-track:  #e2e8f0;
  --ecs-chart-benchmark: #4338CA; /* darkened indigo, 7.6:1 */
  --ecs-chart-up:     #15803D;
  --ecs-chart-down:   #B91C1C;

  /* ── Standardized supporting text (WCAG AA/AAA on white) ── */
  --ecs-axis-label:   #0F172A; /* axis labels — 16.7:1 */
  --ecs-legend-text:  #0F172A; /* legend text — 16.7:1 */
  --ecs-subtitle:     #334155; /* chart subtitles — 9.4:1 */
  --ecs-helper-text:  #475569; /* helper text — 7.0:1 */

  /* ── Standardized tabs ── */
  --ecs-tab-bg:        #1E293B;
  --ecs-tab-text:      #E2E8F0;
  --ecs-tab-bg-active: #2563EB;
  --ecs-tab-text-active:#FFFFFF;
  --ecs-tab-bg-hover:  #1D4ED8;

  /* ── Standardized KPI badges ──
     NOTE: The brief's white-on-#16A34A (3.3:1) and white-on-#F97316 (2.8:1)
     fall BELOW WCAG AA for normal text, which the same brief forbids
     ("Never allow any color combination below WCAG AA"). To honour the
     non-negotiable AA rule while preserving the requested hues we:
       - darken green to #15803D (white -> 5.0:1, AA),
       - use dark ink #111827 on the requested orange #F97316 (-> 7.9:1, AAA),
       - keep the requested yellow with dark ink (as the brief specifies).
     Blue and red meet AA with white as requested and are unchanged. */
  --ecs-badge-blue-bg:   #2563EB; --ecs-badge-blue-fg:   #FFFFFF; /* 5.2:1 */
  --ecs-badge-green-bg:  #15803D; --ecs-badge-green-fg:  #FFFFFF; /* 5.0:1 */
  --ecs-badge-red-bg:    #DC2626; --ecs-badge-red-fg:    #FFFFFF; /* 4.5:1 */
  --ecs-badge-orange-bg: #F97316; --ecs-badge-orange-fg: #111827; /* 7.9:1 */
  --ecs-badge-yellow-bg: #EAB308; --ecs-badge-yellow-fg: #111827; /* 9.3:1 */

  --ecs-chart-min-font: 12px;
}

/* ───────────────────────────── Supporting text ───────────────────────────── */
/* Standardize the existing chart text classes to the accessible palette + min size.
   These selectors target the real classes used across the platform today. */
.chart-card-subtitle,
.chart-def,
.ecs-chart-subtitle {
  color: var(--ecs-subtitle) !important;
  font-size: 0.75rem !important;   /* >= 12px */
  font-weight: 500;
  line-height: 1.35;
}
.chart-kpi-inline,
.chart-legend-inline,
.ecs-chart-helper {
  color: var(--ecs-helper-text) !important;
  font-size: 0.75rem !important;   /* >= 12px */
}
/* Data value labels on bars: dark, bold, readable. */
.ecs-bar-val,
.trend-bar-val,
.ecs-trend-bar-val,
.roi-bar-val {
  color: var(--ecs-axis-label) !important;
  font-weight: 700 !important;
  font-size: 0.75rem !important;   /* >= 12px (was 0.48–0.72rem) */
}
/* Category (x) labels under bars. */
.ecs-bar-lbl,
.trend-bar-label,
.ecs-trend-bar-lbl,
.roi-bar-x {
  color: var(--ecs-axis-label) !important;
  font-weight: 600 !important;
  font-size: 0.72rem !important;   /* ~11.5px, bold for legibility */
}

/* ───────────────────────────── Legends ───────────────────────────── */
.ecs-chart-legend,
.ecs-obs-legend,
.chart-legend-inline,
.ecs-legend {
  color: var(--ecs-legend-text) !important;
  font-weight: 600 !important;
  font-size: 0.75rem !important;   /* >= 12px */
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem 1rem;
  align-items: center;
}
.ecs-chart-legend .lg,
.ecs-obs-legend-item,
.ecs-legend-item { display: inline-flex; align-items: center; gap: 0.35rem; }
.ecs-chart-legend .sw,
.ecs-obs-swatch,
.ecs-legend-swatch {
  width: 12px; height: 12px; border-radius: 2px; display: inline-block; flex: 0 0 auto;
  border: 1px solid rgba(15,23,42,0.18);
}
.ecs-obs-swatch.tone-blue   { background: var(--ecs-chart-blue); }
.ecs-obs-swatch.tone-green  { background: var(--ecs-chart-green); }
.ecs-obs-swatch.tone-red    { background: var(--ecs-chart-red); }
.ecs-obs-swatch.tone-orange { background: var(--ecs-chart-orange); }
.ecs-obs-swatch.tone-teal   { background: var(--ecs-chart-teal); }
.ecs-obs-swatch.tone-navy   { background: var(--ecs-chart-navy); }

/* ───────────────────────────── Tabs ───────────────────────────── */
/* Standardized, high-contrast sub-navigation tabs. Two visual families share the
   same WCAG palette:
     (a) .ecs-tab  — explicit standard pill (light slate inactive / blue active)
     (b) Bootstrap .nav-pills/.nav-tabs .nav-link used by AI-SDLC, framework drills
         and other drilldown pages — globally hardened so no light-blue-on-white
         or light-blue-on-light-blue active state survives anywhere in ECS.
   (.ecs-workspace-tab is styled in mvp_workspace_styles.html with the same palette.) */
.ecs-tab {
  background: #E2E8F0;
  color: #0F172A !important;
  font-weight: 600;
  border: 1px solid #CBD5E1;
  border-radius: 8px;
  padding: 0.4rem 0.9rem;
  cursor: pointer;
}
.ecs-tab:hover, .ecs-tab:focus-visible {
  background: var(--ecs-tab-bg-hover);
  color: var(--ecs-tab-text-active) !important;
  border-color: var(--ecs-tab-bg-hover);
  outline: none;
}
.ecs-tab.active, .ecs-tab.is-active, .ecs-tab[aria-selected="true"] {
  background: var(--ecs-tab-bg-active);
  color: var(--ecs-tab-text-active) !important;
  border-color: var(--ecs-tab-bg-active);
  font-weight: 700;
}
.ecs-tab:disabled, .ecs-tab[disabled], .ecs-tab.is-disabled {
  background: #F1F5F9; color: #475569 !important; border-color: #E2E8F0; cursor: not-allowed;
}

/* Global Bootstrap pill/tab hardening (covers AI-SDLC kb/doc tabs, framework
   drill tabs, and any future Bootstrap nav). Scoped to nav-pills/nav-tabs so it
   does not affect sidebars or other .nav usages. */
.nav-pills .nav-link,
.nav-tabs .nav-link {
  background: #E2E8F0;
  color: #0F172A !important;
  font-weight: 600;
  border: 1px solid #CBD5E1;
  border-radius: 6px;
  margin: 0 0.15rem 0.15rem 0;
}
.nav-pills .nav-link:hover,
.nav-tabs .nav-link:hover,
.nav-pills .nav-link:focus-visible,
.nav-tabs .nav-link:focus-visible {
  background: #1D4ED8;
  color: #FFFFFF !important;
  border-color: #1D4ED8;
  outline: none;
}
.nav-pills .nav-link.active,
.nav-pills .show > .nav-link,
.nav-tabs .nav-link.active {
  background: #2563EB !important;
  color: #FFFFFF !important;
  border-color: #2563EB !important;
  font-weight: 700;
}
.nav-pills .nav-link.disabled,
.nav-tabs .nav-link.disabled,
.nav-pills .nav-link:disabled,
.nav-tabs .nav-link:disabled {
  background: #F1F5F9; color: #475569 !important; border-color: #E2E8F0;
}

/* ───────────────────────────── KPI badges ───────────────────────────── */
.ecs-badge { font-weight: 700; border-radius: 999px; padding: 0.1rem 0.55rem; font-size: 0.72rem; display: inline-flex; align-items: center; }
.ecs-badge-blue   { background: var(--ecs-badge-blue-bg);   color: var(--ecs-badge-blue-fg) !important; }
.ecs-badge-green  { background: var(--ecs-badge-green-bg);  color: var(--ecs-badge-green-fg) !important; }
.ecs-badge-red    { background: var(--ecs-badge-red-bg);    color: var(--ecs-badge-red-fg) !important; }
.ecs-badge-orange { background: var(--ecs-badge-orange-bg); color: var(--ecs-badge-orange-fg) !important; }
.ecs-badge-yellow { background: var(--ecs-badge-yellow-bg); color: var(--ecs-badge-yellow-fg) !important; }

/* ───────────────────── Self-describing chart chrome ───────────────────── */
/* A standardized framed plot: optional Y-axis label (rotated), Y-scale ticks,
   gridlines, plot area, and X-axis label. Injected by ecsRenderCompactBarChart
   when opts.yLabel / opts.xLabel are supplied, and rendered by the
   .ecs-chart-frame wrapper markup. */
.ecs-chart-frame { display: grid; grid-template-columns: auto 1fr; grid-template-rows: 1fr auto; gap: 2px 6px; width: 100%; }
.ecs-chart-yaxis-label {
  grid-row: 1; grid-column: 1;
  writing-mode: vertical-rl; transform: rotate(180deg);
  color: var(--ecs-axis-label); font-weight: 700; font-size: 0.72rem;
  align-self: center; justify-self: center; white-space: nowrap;
}
.ecs-chart-plot { grid-row: 1; grid-column: 2; position: relative; min-width: 0; }
.ecs-chart-xaxis-label {
  grid-row: 2; grid-column: 2;
  color: var(--ecs-axis-label); font-weight: 700; font-size: 0.72rem;
  text-align: center; padding-top: 0.2rem;
}
/* Y-axis scale ticks overlaid on the plot's left edge. */
.ecs-chart-yscale {
  position: absolute; top: 0; bottom: 1.1rem; left: 0; width: 100%;
  pointer-events: none; z-index: 1;
}
.ecs-chart-yscale .ecs-ytick {
  position: absolute; left: 0; right: 0;
  border-top: 1px dashed rgba(15,23,42,0.10);
}
.ecs-chart-yscale .ecs-ytick > span {
  position: absolute; left: 0; transform: translateY(-50%);
  background: rgba(255,255,255,0.85); padding: 0 3px;
  font-size: 0.66rem; font-weight: 600; color: var(--ecs-axis-label);
}
.ecs-chart-units { color: var(--ecs-helper-text); font-weight: 600; font-size: 0.7rem; }

/* ─────────────── Executive chart sizing (authoritative) ───────────────
   Loaded last in the chart include chain, so these win over any legacy
   `max-height` constraints (e.g. the old 72px/180px crushers) that made bars
   overflow upward and appear top-anchored. Vertical bar charts must grow upward
   from a bottom baseline inside a tall-enough plot, with room for value labels,
   axis labels and the X-axis tick row. Minimum executive chart height = 240px. */
.chart-container-compact {
  min-height: 240px !important;
  max-height: none !important;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;   /* anchor plot to the baseline */
}
.chart-container-compact > .ecs-bar-chart,
.chart-container-compact .ecs-chart-frame .ecs-bar-chart {
  height: 200px !important;
  max-height: 200px !important;
  min-height: 200px !important;
  align-items: flex-end;       /* bars sit on the baseline and grow up */
}
.chart-container-compact .ecs-chart-plot { min-height: 200px; }
/* Aging tab keeps its own taller flex sizing; do not force a fixed height there. */
.chart-container-aging > .ecs-bar-chart,
.ecs-evidence-aging-grid .ecs-aging-bar-chart {
  max-height: none !important;
}

/* ───────────────────────────── Responsive ───────────────────────────── */
/* Prevent axis clipping, hidden labels, truncated values, legend/tooltip overflow. */
.chart-container-compact,
.chart-container-aging { overflow: visible !important; }
.ecs-bar-chart, .mini-bar-chart, .trend-chart {
  overflow-x: auto; overflow-y: visible;
}
.ecs-chart-legend, .ecs-obs-legend { overflow: visible; }
@media (max-width: 991px) {
  .ecs-chart-yaxis-label { font-size: 0.66rem; }
  .ecs-bar-lbl, .trend-bar-label { font-size: 0.66rem !important; }
}

/* ───── Demo dark-theme parity: keep axis/legend readable on dark panels ───── */
.ecs-demo-dark .ecs-chart-legend,
.ecs-demo-dark .ecs-obs-legend,
.ecs-demo-dark .ecs-bar-val,
.ecs-demo-dark .ecs-bar-lbl,
.ecs-demo-dark .ecs-chart-yaxis-label,
.ecs-demo-dark .ecs-chart-xaxis-label,
.ecs-demo-dark .ecs-chart-yscale .ecs-ytick > span {
  color: #F1F5F9 !important;
}
.ecs-demo-dark .ecs-chart-yscale .ecs-ytick > span { background: rgba(15,23,42,0.65); }
</style>
