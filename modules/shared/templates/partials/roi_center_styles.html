{# Executive ROI & Value Realization Center — animation-first styling.
   Pure CSS (keyframes/transitions), no external libraries. #}
<style>
:root{
  --roi-navy:#0b1f3a; --roi-navy2:#13315c; --roi-accent:#2bc4a3; --roi-accent2:#36d3ff;
  --roi-gold:#f5b301; --roi-danger:#e2483f; --roi-ink:#0b1f3a; --roi-muted:#6b7a90;
}
.roi-main{padding:0 18px 40px;}
.roi-header{margin:14px 0 8px;}
.roi-title{font-size:1.5rem;font-weight:800;color:var(--roi-navy);margin:0;letter-spacing:-.02em;}
.roi-subtitle{font-size:.82rem;color:var(--roi-muted);margin:.15rem 0 0;}
.roi-accent{color:var(--roi-accent);}
.roi-danger{color:var(--roi-danger);}

/* mode toggle + buttons */
.roi-toggle{display:inline-flex;background:#eef2f7;border-radius:999px;padding:3px;}
.roi-toggle-btn{border:0;background:transparent;border-radius:999px;padding:5px 16px;font-size:.78rem;font-weight:700;color:var(--roi-muted);cursor:pointer;transition:all .2s;}
.roi-toggle-btn.is-active{background:var(--roi-navy);color:#fff;box-shadow:0 2px 8px rgba(11,31,58,.25);}
.btn-roi-primary{background:linear-gradient(135deg,var(--roi-accent),var(--roi-accent2));color:#06281f;border:0;font-weight:800;border-radius:999px;padding:7px 18px;}
.btn-roi-primary:hover{filter:brightness(1.05);}

/* sidebar ROI accent */
.ecs-sidebar-btn-roi{background:linear-gradient(135deg,var(--roi-accent),var(--roi-accent2))!important;color:#06281f!important;font-weight:800!important;box-shadow:0 2px 10px rgba(43,196,163,.35);}
.ecs-sidebar-btn-roi.is-active{outline:2px solid #fff;}

/* ticker */
.roi-ticker{display:flex;align-items:center;gap:10px;background:var(--roi-navy);color:#fff;border-radius:12px;padding:8px 12px;margin:10px 0;overflow:hidden;}
.roi-ticker-label{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;background:var(--roi-accent);color:#06281f;padding:3px 8px;border-radius:6px;white-space:nowrap;}
.roi-ticker-track{display:flex;gap:26px;white-space:nowrap;animation:roi-ticker 28s linear infinite;}
.roi-ticker:hover .roi-ticker-track{animation-play-state:paused;}
.roi-ticker-item{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;}
.roi-ticker-item strong{color:var(--roi-accent);}
.roi-ticker-item em{color:#9fb3cc;font-style:normal;font-size:.7rem;}
.roi-ticker-dot{width:7px;height:7px;border-radius:50%;background:var(--roi-gold);box-shadow:0 0 8px var(--roi-gold);animation:roi-pulse 1.6s infinite;}
@keyframes roi-ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes roi-pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* stage + screens */
.roi-stage{position:relative;min-height:460px;border-radius:18px;overflow:hidden;background:linear-gradient(160deg,#f7fafc,#eef3f9);box-shadow:inset 0 0 0 1px #e3ebf3;}
.roi-screen{position:absolute;inset:0;display:none;padding:26px 30px;opacity:0;}
.roi-screen.is-active{display:flex;opacity:1;animation:roi-fade .55s ease both;}
.roi-screen-inner{margin:auto;width:100%;max-width:1000px;text-align:center;}
@keyframes roi-fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.roi-screen-kicker{font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--roi-muted);}
.roi-screen-h{font-size:2rem;font-weight:800;color:var(--roi-navy);margin:.2rem 0 1rem;letter-spacing:-.02em;}
.roi-screen-note{font-size:.85rem;color:var(--roi-muted);margin-top:1rem;}
.roi-screen-red{background:linear-gradient(160deg,#fff1f0,#ffe2df);}
.roi-screen-red .roi-screen-h{color:var(--roi-danger);}
.roi-screen-summary{background:linear-gradient(160deg,var(--roi-navy),var(--roi-navy2));}
.roi-screen-summary .roi-screen-h,.roi-screen-summary .roi-screen-kicker{color:#fff;}

/* flow (screen 1) */
.roi-flow{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;margin:8px 0 18px;}
.roi-flow-node{background:#fff;border:1px solid #f3c6c2;border-radius:10px;padding:10px 16px;font-weight:700;color:var(--roi-danger);box-shadow:0 3px 10px rgba(226,72,63,.12);animation:roi-pop .5s both;}
.roi-flow-arrow{color:var(--roi-danger);font-weight:800;animation:roi-pulse 1.4s infinite;}
@keyframes roi-pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

/* counters */
.roi-counter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:8px;}
.roi-counter{background:#fff;border-radius:14px;padding:16px 12px;box-shadow:0 4px 16px rgba(11,31,58,.08);}
.roi-counter-val{font-size:1.9rem;font-weight:800;color:var(--roi-navy);line-height:1;}
.roi-counter-lbl{font-size:.72rem;color:var(--roi-muted);margin-top:6px;text-transform:uppercase;letter-spacing:.04em;}
.roi-counter-red .roi-counter-val{color:var(--roi-danger);}
.roi-counter-money .roi-counter-val{color:var(--roi-accent);}
.roi-counter-roi .roi-counter-val{color:var(--roi-gold);}

/* onboarding (screen 2) */
.roi-onboard-count{font-size:4rem;font-weight:900;color:var(--roi-accent);line-height:1;}
.roi-onboard-lbl{font-size:.9rem;color:var(--roi-muted);margin-bottom:14px;}
.roi-pillars{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
.roi-pillar{background:var(--roi-navy);color:#fff;border-radius:12px;padding:18px 22px;font-weight:700;opacity:.25;transform:translateY(10px);animation:roi-light .6s var(--d,0s) forwards;}
@keyframes roi-light{to{opacity:1;transform:none;box-shadow:0 0 22px rgba(43,196,163,.5)}}

/* framework grid (screen 6) */
.roi-fw-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
.roi-fw-card{background:#fff;border-radius:14px;padding:16px;text-align:left;box-shadow:0 4px 16px rgba(11,31,58,.08);border-top:4px solid var(--roi-accent);opacity:0;transform:translateY(16px);animation:roi-fade .5s var(--d,0s) forwards;}
.roi-fw-name{font-weight:800;color:var(--roi-navy);font-size:1.05rem;}
.roi-fw-cost{font-size:1.5rem;font-weight:800;color:var(--roi-accent);margin:.2rem 0 .5rem;}
.roi-fw-stats{list-style:none;margin:0;padding:0;font-size:.78rem;}
.roi-fw-stats li{display:flex;justify-content:space-between;padding:3px 0;border-top:1px dashed #eef2f7;color:var(--roi-muted);}
.roi-fw-stats li b{color:var(--roi-navy);}

/* reuse (screen 7) */
.roi-reuse-anim{display:flex;align-items:center;justify-content:center;gap:18px;margin:10px 0 18px;}
.roi-reuse-source{background:var(--roi-navy);color:#fff;border-radius:14px;padding:18px 20px;font-weight:800;}
.roi-reuse-rays{display:flex;gap:6px;}
.roi-reuse-ray{width:30px;height:4px;background:var(--roi-accent);border-radius:4px;transform:scaleX(0);transform-origin:left;animation:roi-ray .5s var(--d,0s) forwards;}
@keyframes roi-ray{to{transform:scaleX(1)}}
.roi-reuse-targets{font-size:.95rem;color:var(--roi-muted);}
.roi-reuse-targets b{color:var(--roi-accent);font-size:1.2rem;}

/* vs (screen 8) */
.roi-vs{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:16px;}
.roi-vs-side{background:#fff;border-radius:14px;padding:14px 22px;box-shadow:0 4px 16px rgba(11,31,58,.08);}
.roi-vs-without{border-top:4px solid var(--roi-danger);}
.roi-vs-with{border-top:4px solid var(--roi-accent);}
.roi-vs-h{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--roi-muted);}
.roi-vs-num{font-size:2rem;font-weight:800;color:var(--roi-navy);}
.roi-vs-with .roi-vs-num{color:var(--roi-accent);}
.roi-vs-without .roi-vs-num{color:var(--roi-danger);}
.roi-vs-mid{font-weight:800;color:var(--roi-muted);}

/* projection chart */
.roi-proj-chart{display:flex;align-items:flex-end;justify-content:center;gap:18px;height:180px;margin:10px 0;}
.roi-proj-col{display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;}
.roi-proj-bar{width:54px;height:0;background:linear-gradient(180deg,var(--roi-accent2),var(--roi-accent));border-radius:8px 8px 0 0;position:relative;animation:roi-grow .8s var(--d,0s) cubic-bezier(.2,.8,.2,1) forwards;}
@keyframes roi-grow{to{height:var(--h)}}
.roi-proj-val{position:absolute;top:-20px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.68rem;font-weight:800;color:var(--roi-navy);}
.roi-proj-x{font-size:.72rem;color:var(--roi-muted);margin-top:6px;text-align:center;}

/* variance (screen 9) */
.roi-variance{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.roi-variance-card{background:#fff;border-radius:16px;padding:20px 28px;box-shadow:0 6px 20px rgba(11,31,58,.1);min-width:170px;}
.roi-variance-lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--roi-muted);}
.roi-variance-num{font-size:1.9rem;font-weight:800;color:var(--roi-navy);}
.roi-variance-actual{border-top:4px solid var(--roi-accent);}
.roi-variance-up{border-top:4px solid var(--roi-accent);}
.roi-variance-down{border-top:4px solid var(--roi-gold);}
.roi-variance-sub{font-size:.78rem;color:var(--roi-muted);}

/* summary (screen 10) */
.roi-summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
.roi-summary-cell{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:16px;}
.roi-summary-val{font-size:2rem;font-weight:900;color:#fff;line-height:1;}
.roi-summary-lbl{font-size:.72rem;color:#aebfd6;margin-top:6px;text-transform:uppercase;letter-spacing:.04em;}
.roi-summary-money .roi-summary-val{color:var(--roi-accent);}
.roi-summary-hero{grid-column:1/-1;background:linear-gradient(135deg,var(--roi-accent),var(--roi-accent2));}
.roi-summary-hero .roi-summary-val{color:#06281f;font-size:2.6rem;}
.roi-summary-hero .roi-summary-lbl{color:#06402f;}
.roi-cta{color:#cfe;font-weight:600;}

/* nav */
.roi-nav{display:flex;align-items:center;gap:10px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.roi-nav-btn{border:1px solid #d6e0ec;background:#fff;border-radius:999px;padding:6px 14px;font-size:.78rem;font-weight:700;color:var(--roi-navy);cursor:pointer;transition:all .15s;}
.roi-nav-btn:hover{background:var(--roi-navy);color:#fff;}
.roi-dots{display:flex;gap:6px;}
.roi-dot{width:9px;height:9px;border-radius:50%;background:#cdd8e6;cursor:pointer;transition:all .2s;}
.roi-dot.is-active{background:var(--roi-accent);transform:scale(1.35);}

/* detail dashboard */
.roi-detail{margin-top:22px;}
.roi-detail-h{font-size:1.05rem;font-weight:800;color:var(--roi-navy);margin-bottom:10px;}
.roi-detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;}
.roi-detail-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 4px 16px rgba(11,31,58,.07);}
.roi-detail-wide{grid-column:1/-1;}
.roi-detail-title{font-weight:800;color:var(--roi-navy);margin-bottom:8px;}
.roi-detail-list{list-style:none;margin:0;padding:0;font-size:.82rem;}
.roi-detail-list li{display:flex;justify-content:space-between;padding:5px 0;border-top:1px dashed #eef2f7;color:var(--roi-muted);}
.roi-detail-list li b{color:var(--roi-navy);}
.roi-detail-money b{color:var(--roi-accent);font-size:1rem;}
.roi-battle-table{width:100%;border-collapse:collapse;font-size:.82rem;}
.roi-battle-table th,.roi-battle-table td{padding:7px 10px;text-align:left;border-bottom:1px solid #eef2f7;}
.roi-battle-table th{font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--roi-muted);}
.roi-battle-imp{color:var(--roi-accent);font-weight:800;}

/* presentation/fullscreen mode */
.roi-main.is-presenting .roi-detail,.roi-main.is-presenting .roi-header,
.roi-main.is-presenting .roi-ticker{display:none!important;}
.roi-main.is-presenting{background:var(--roi-navy);}
.roi-main.is-presenting .roi-stage{min-height:78vh;}
:fullscreen .roi-stage{min-height:86vh;}

/* ---- executive takeaways ---- */
.roi-takeaways{margin-top:22px;}
.roi-takeaway-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
.roi-takeaway-card{background:linear-gradient(160deg,#fff,#f4f9f8);border-radius:14px;padding:16px;border-left:4px solid var(--roi-accent);box-shadow:0 4px 16px rgba(11,31,58,.07);opacity:0;transform:translateY(14px);animation:roi-fade .5s var(--d,0s) forwards;}
.roi-takeaway-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--roi-muted);}
.roi-takeaway-value{font-size:1.5rem;font-weight:800;color:var(--roi-navy);margin:.15rem 0;}
.roi-takeaway-sub{font-size:.76rem;color:var(--roi-accent);font-weight:600;}

/* ---- rollout simulator ---- */
.roi-simulator{margin-top:22px;background:#fff;border-radius:16px;padding:18px;box-shadow:0 4px 16px rgba(11,31,58,.08);}
.roi-sim-caption{font-size:.8rem;color:var(--roi-muted);margin:0 0 10px;}
.roi-sim-slider{width:100%;accent-color:var(--roi-accent);height:6px;cursor:pointer;}
.roi-sim-ticks{display:flex;justify-content:space-between;font-size:.72rem;color:var(--roi-muted);margin-top:4px;font-weight:700;}
.roi-sim-readout{margin-top:14px;text-align:center;}
.roi-sim-apps{font-size:1.1rem;font-weight:800;color:var(--roi-navy);margin-bottom:10px;}
.roi-sim-apps span{font-size:1.6rem;color:var(--roi-accent);}
.roi-sim-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;}
.roi-sim-metric{background:#f7fafc;border-radius:12px;padding:12px;}
.roi-sim-val{font-size:1.5rem;font-weight:800;color:var(--roi-navy);transition:color .2s;}
.roi-sim-money .roi-sim-val{color:var(--roi-accent);}
.roi-sim-lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--roi-muted);margin-top:4px;}
.roi-sim-val.is-bumped{animation:roi-bump .35s;}
@keyframes roi-bump{0%{transform:scale(1)}40%{transform:scale(1.16);color:var(--roi-gold)}100%{transform:scale(1)}}

/* ---- waterfall ---- */
.roi-waterfall-wrap{margin-top:22px;}
.roi-waterfall{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;height:220px;background:#fff;border-radius:16px;padding:16px 14px 6px;box-shadow:0 4px 16px rgba(11,31,58,.07);}
.roi-wf-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;}
.roi-wf-bar{width:80%;max-width:80px;height:0;background:linear-gradient(180deg,var(--roi-accent2),var(--roi-accent));border-radius:8px 8px 0 0;position:relative;animation:roi-grow .7s var(--d,0s) cubic-bezier(.2,.8,.2,1) forwards;}
.roi-wf-total .roi-wf-bar{background:linear-gradient(180deg,var(--roi-gold),#e09c00);}
.roi-wf-val{position:absolute;top:-20px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.66rem;font-weight:800;color:var(--roi-navy);}
.roi-wf-x{font-size:.68rem;color:var(--roi-muted);text-align:center;margin-top:6px;line-height:1.2;}
.roi-wf-total .roi-wf-x{color:var(--roi-navy);font-weight:800;}

/* ---- aging reduction ---- */
.roi-aging{margin-top:22px;}
.roi-aging-row{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;background:#fff;border-radius:16px;padding:18px;box-shadow:0 4px 16px rgba(11,31,58,.07);}
.roi-aging-card{text-align:center;min-width:150px;}
.roi-aging-lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--roi-muted);}
.roi-aging-num{font-size:2.4rem;font-weight:800;color:var(--roi-danger);}
.roi-aging-after .roi-aging-num{color:var(--roi-accent);}
.roi-aging-sub{font-size:.74rem;color:var(--roi-muted);}
.roi-aging-bar-wrap{flex:1;min-width:160px;text-align:center;}
.roi-aging-bar{height:14px;background:#ffd9d6;border-radius:8px;overflow:hidden;}
.roi-aging-fill{display:block;height:100%;width:var(--w,40%);background:linear-gradient(90deg,var(--roi-accent),var(--roi-accent2));border-radius:8px;animation:roi-aging-grow 1s ease forwards;transform-origin:left;}
@keyframes roi-aging-grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.roi-aging-arrow{font-size:.82rem;font-weight:800;color:var(--roi-accent);margin-top:6px;}

/* ---- framework analytics table ---- */
.roi-fw-analytics{margin-top:22px;}
.roi-fw-table{width:100%;border-collapse:collapse;font-size:.82rem;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(11,31,58,.07);}
.roi-fw-table th,.roi-fw-table td{padding:9px 12px;text-align:left;border-bottom:1px solid #eef2f7;white-space:nowrap;}
.roi-fw-table th{font-size:.66rem;text-transform:uppercase;letter-spacing:.05em;color:var(--roi-muted);background:#f7fafc;}
.roi-fw-td-name{font-weight:800;color:var(--roi-navy);}
.roi-fw-td-money{color:var(--roi-accent);font-weight:700;}
.roi-fw-contrib{display:inline-block;width:70px;height:8px;background:#eef2f7;border-radius:6px;overflow:hidden;vertical-align:middle;margin-right:6px;}
.roi-fw-contrib-fill{display:block;height:100%;width:var(--w,0%);background:var(--roi-accent);border-radius:6px;}
.roi-fw-contrib-num{font-size:.74rem;color:var(--roi-muted);font-weight:700;}

/* ---- scenario toggle ---- */
.roi-scenario-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:14px 0 6px;padding:10px 14px;background:linear-gradient(90deg,#0b1f3a,#143a6b);border-radius:14px;color:#fff;box-shadow:0 6px 20px rgba(11,31,58,.18);}
.roi-scenario-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;font-weight:800;opacity:.85;}
.roi-scenario-toggle{display:inline-flex;background:rgba(255,255,255,.12);border-radius:999px;padding:4px;}
.roi-scenario-btn{border:0;background:transparent;color:#cfe0f5;font-weight:700;font-size:.84rem;padding:7px 18px;border-radius:999px;cursor:pointer;transition:all .2s ease;}
.roi-scenario-btn:hover{color:#fff;}
.roi-scenario-btn.is-active{background:linear-gradient(90deg,var(--roi-accent),var(--roi-accent2));color:#0b1f3a;box-shadow:0 3px 10px rgba(0,0,0,.2);}
.roi-scenario-hint{font-size:.72rem;opacity:.75;margin-left:auto;}

/* ---- narrative bullets ---- */
.roi-narrative{list-style:none;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0;margin:14px 0 6px;}
.roi-narrative.roi-narrative-center{justify-content:center;}
.roi-narrative li{font-size:.82rem;font-weight:700;padding:6px 14px;border-radius:999px;background:#f1f5fb;color:var(--roi-navy);}
.roi-narrative-red li{background:rgba(214,40,40,.12);color:#b21f1f;}
.roi-narrative-green li{background:rgba(20,160,90,.14);color:#0f7a47;}
.roi-narrative-gold li{background:rgba(214,158,46,.16);color:#9a6a10;}

/* ---- value drivers ---- */
.roi-drivers{margin-top:22px;}
.roi-driver-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
.roi-driver-card{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 4px 16px rgba(11,31,58,.07);opacity:0;transform:translateY(12px);animation:roi-rise .5s ease forwards;animation-delay:var(--d,0s);}
@keyframes roi-rise{to{opacity:1;transform:none;}}
.roi-driver-top{display:flex;align-items:center;justify-content:space-between;}
.roi-driver-name{font-weight:800;color:var(--roi-navy);font-size:.92rem;}
.roi-driver-trend{font-size:.8rem;font-weight:800;}
.roi-trend-up{color:#0f7a47;}.roi-trend-down{color:#b21f1f;}.roi-trend-flat{color:var(--roi-muted);}
.roi-driver-bar{height:10px;background:#eef2f7;border-radius:6px;overflow:hidden;margin:10px 0 4px;}
.roi-driver-fill{display:block;height:100%;width:var(--w,0%);background:linear-gradient(90deg,var(--roi-accent),var(--roi-accent2));border-radius:6px;animation:roi-aging-grow .9s ease forwards;transform-origin:left;}
.roi-driver-pct{font-size:1.1rem;font-weight:800;color:var(--roi-accent);}
.roi-driver-stats{list-style:none;padding:0;margin:8px 0 0;font-size:.78rem;}
.roi-driver-stats li{display:flex;justify-content:space-between;padding:3px 0;border-top:1px solid #f0f3f8;}

/* ---- payback ---- */
.roi-payback{margin-top:22px;}
.roi-payback-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;}
.roi-payback-card{background:#fff;border-radius:14px;padding:16px;text-align:center;box-shadow:0 4px 16px rgba(11,31,58,.07);}
.roi-payback-lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--roi-muted);}
.roi-payback-val{font-size:1.5rem;font-weight:800;color:var(--roi-navy);margin-top:4px;}
.roi-payback-hero{background:linear-gradient(135deg,#0b1f3a,#143a6b);color:#fff;}
.roi-payback-hero .roi-payback-lbl{color:#cfe0f5;}
.roi-payback-hero .roi-payback-val{color:var(--roi-accent);}

/* ---- team investment ---- */
.roi-invest{margin-top:22px;}
.roi-invest-summary{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px;}
.roi-invest-pill{display:flex;flex-direction:column;background:#fff;border-radius:12px;padding:10px 18px;box-shadow:0 4px 16px rgba(11,31,58,.07);min-width:150px;}
.roi-invest-pill span{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--roi-muted);}
.roi-invest-pill b{font-size:1.25rem;color:var(--roi-navy);}
.roi-invest-pill-hero b{color:var(--roi-accent);}
.roi-invest-pill-mult{background:linear-gradient(135deg,#0b1f3a,#143a6b);}
.roi-invest-pill-mult span{color:#cfe0f5;}.roi-invest-pill-mult b{color:#fff;}

/* ---- framework ranking ---- */
.roi-fw-ranking{margin-top:22px;}
.roi-rank-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
.roi-rank-card{position:relative;background:#fff;border-radius:14px;padding:18px 16px;text-align:center;box-shadow:0 4px 16px rgba(11,31,58,.07);opacity:0;transform:translateY(12px);animation:roi-rise .5s ease forwards;animation-delay:var(--d,0s);}
.roi-rank-top{background:linear-gradient(135deg,#fff7e6,#ffe9b8);box-shadow:0 8px 24px rgba(214,158,46,.25);border:1px solid #f2d99a;}
.roi-rank-badge{font-size:1.4rem;font-weight:900;color:var(--roi-accent);}
.roi-rank-name{font-weight:800;color:var(--roi-navy);font-size:1.05rem;margin-top:2px;}
.roi-rank-cost{font-size:1.3rem;font-weight:800;color:var(--roi-accent2);margin:4px 0;}
.roi-rank-sub{font-size:.74rem;color:var(--roi-muted);}

/* Light executive page background behind the ROI deck. */
body.ecs-cap-roi{background:#EEF5FF!important;}
.roi-main{background:#EEF5FF;}

/* ===================== BOARDROOM ROI MOVIE (7-slide deck) ================= */
/* LIGHT EXECUTIVE THEME — McKinsey/BCG/Deloitte board style. High contrast,    */
/* readable from 15-20 ft. 16:9, one slide at a time, no scrolling.             */
/*   bg #EEF5FF · cards #FFFFFF · headings #0F172A · secondary #334155          */
/* Phase 6 — DARK EXECUTIVE THEME (matches the left navigation).               */
/*   bg #0B1220 · cards #111827 · panels #1E293B · text #F8FAFC / #CBD5E1      */
/*   accent #38BDF8 · positive #22C55E · ROI highlight #F59E0B                 */
.roi-deck{margin:16px 0;--exec-bg:#0B1220;--exec-card:#111827;--exec-panel:#1E293B;
  --exec-h:#F8FAFC;--exec-sub:#CBD5E1;--exec-accent:#38BDF8;--exec-pos:#22C55E;
  --exec-gold:#F59E0B;--exec-red:#F87171;}
.roi-deck-stage{position:relative;width:100%;max-width:1280px;margin:0 auto;aspect-ratio:16/9;
  background:radial-gradient(120% 120% at 50% 0%,#13203a 0%,var(--exec-bg) 60%);
  border-radius:18px;overflow:hidden;
  box-shadow:0 18px 50px rgba(0,0,0,.5);color:var(--exec-h);
  border:1px solid #1E293B;}
.roi-slide{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:4% 6%;gap:2.4vh;box-sizing:border-box;}
.roi-slide.is-active{display:flex;animation:roi-slide-in .45s ease;}
@keyframes roi-slide-in{from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:none;}}
.roi-slide-kicker{font-size:clamp(.78rem,1.5vw,1.1rem);text-transform:uppercase;letter-spacing:.2em;color:var(--exec-accent);font-weight:800;}
.roi-slide-h{font-size:clamp(1.8rem,4vw,3.4rem);font-weight:900;line-height:1.06;margin:0;letter-spacing:-.02em;color:var(--exec-h);}
.roi-slide-note{font-size:clamp(.9rem,1.7vw,1.25rem);color:var(--exec-sub);margin:0;font-weight:500;}
.roi-slide .roi-accent{color:var(--exec-accent);}
.roi-slide-3up{display:flex;gap:clamp(16px,4vw,56px);justify-content:center;flex-wrap:nowrap;}
.roi-slide-3up-sm .roi-big-v{font-size:clamp(1.4rem,3.2vw,2.4rem);}
/* white KPI cards: soft shadow, rounded */
.roi-big{display:flex;flex-direction:column;gap:.6vh;background:var(--exec-card);
  border-radius:18px;padding:clamp(14px,2.4vh,26px) clamp(18px,2.6vw,34px);
  box-shadow:0 10px 30px rgba(0,0,0,.35);border:1px solid #243049;min-width:clamp(120px,16vw,210px);}
.roi-big-v{font-size:clamp(1.9rem,5vw,4rem);font-weight:900;line-height:1;color:var(--exec-h);}
.roi-big-l{font-size:clamp(.72rem,1.4vw,1.02rem);color:var(--exec-sub);text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
.roi-big-gold .roi-big-v{color:var(--exec-gold);}
.roi-big-pos .roi-big-v{color:var(--exec-pos);}
.roi-slide-hero{background:radial-gradient(120% 100% at 50% 0%,#16243f 0%,transparent 60%);}
/* slide sub-line (kept short; ≤30 words) */
.roi-slide-sub{font-size:clamp(.95rem,1.9vw,1.4rem);color:var(--exec-sub);margin:0;font-weight:500;max-width:80%;}
.roi-slide .roi-bad{color:var(--exec-red);}
.roi-chart-unit{color:var(--exec-sub);font-weight:700;font-size:.6em;}
/* audit-reality chain (slide 2) */
.roi-chain{display:flex;flex-wrap:wrap;gap:1.2vw;align-items:center;justify-content:center;}
.roi-chain-node{background:var(--exec-card);color:var(--exec-h);border:1px solid #E6EEF9;
  border-radius:14px;padding:1.6vh 2vw;font-size:clamp(.95rem,2vw,1.5rem);font-weight:800;
  box-shadow:0 6px 18px rgba(15,23,42,.08);}
.roi-chain-bad{background:var(--exec-red);color:#fff;border-color:var(--exec-red);
  box-shadow:0 10px 28px rgba(220,38,38,.28);}
.roi-chain-arr{font-size:clamp(1rem,2vw,1.7rem);color:var(--exec-accent);font-weight:900;}
/* solution cards */
.roi-solution-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:clamp(12px,2.5vw,28px);}
.roi-sol{background:var(--exec-card);color:var(--exec-h);border:1px solid #E6EEF9;border-radius:16px;
  padding:2.6vh 2vw;font-size:clamp(1rem,2.2vw,1.6rem);font-weight:800;box-shadow:0 8px 24px rgba(15,23,42,.08);}
/* scale-up */
.roi-scaleup{display:flex;flex-direction:column;gap:1.2vh;}
.roi-scaleup-step{display:flex;align-items:center;justify-content:center;gap:1.5vw;font-weight:900;
  font-size:clamp(1.3rem,3vw,2.5rem);opacity:.22;transition:opacity .3s ease;}
.roi-scaleup-step.is-shown{opacity:1;}
.roi-scaleup-apps{color:var(--exec-h);}.roi-scaleup-arr{color:var(--exec-accent);}.roi-scaleup-val{color:var(--exec-gold);}
/* deck mini trend */
.roi-deck-trend{display:flex;gap:clamp(10px,3vw,40px);align-items:flex-end;justify-content:center;height:32vh;}
.roi-dt-col{display:flex;flex-direction:column;align-items:center;gap:.6vh;height:100%;justify-content:flex-end;}
.roi-dt-bar{width:clamp(28px,5vw,64px);height:var(--h,4%);background:linear-gradient(180deg,#3B82F6,#1D4ED8);
  border-radius:8px 8px 0 0;display:flex;align-items:flex-start;justify-content:center;position:relative;min-height:24px;
  box-shadow:0 6px 16px rgba(29,78,216,.22);}
.roi-dt-net{position:absolute;top:-2.8vh;font-size:clamp(.74rem,1.4vw,1.05rem);font-weight:800;color:var(--exec-h);white-space:nowrap;}
.roi-dt-x{font-size:clamp(.7rem,1.2vw,.9rem);color:var(--exec-sub);text-align:center;font-weight:600;}
/* ---- Phase 5: Value Growth Over Time bar chart (slide 4) ---- */
.roi-slide-chart{padding:3% 5%;}
.roi-chart{display:flex;align-items:flex-end;justify-content:center;gap:clamp(14px,4vw,64px);
  width:min(92%,1080px);height:54vh;margin-top:1vh;}
.roi-bar-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  height:100%;flex:1 1 0;max-width:160px;}
.roi-bar-val{font-size:clamp(1rem,2.2vw,1.9rem);font-weight:900;color:var(--exec-gold);
  margin-bottom:.8vh;white-space:nowrap;}
.roi-bar-track{width:100%;height:100%;display:flex;align-items:flex-end;justify-content:center;}
.roi-bar-fill{width:clamp(36px,7vw,96px);height:var(--h,4%);
  background:linear-gradient(180deg,#38BDF8 0%,#0EA5E9 100%);
  border-radius:10px 10px 0 0;box-shadow:0 0 24px rgba(56,189,248,.35);
  min-height:8px;transition:height .5s ease;}
.roi-bar-x{font-size:clamp(.82rem,1.6vw,1.25rem);font-weight:800;color:var(--exec-sub);
  margin-top:1.2vh;}

/* five-year value realization table (appendix) */
.roi-deck-table{width:min(94%,1040px);border-collapse:collapse;font-size:clamp(.8rem,1.7vw,1.15rem);background:var(--exec-card);border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35);}
.roi-deck-table th,.roi-deck-table td{padding:clamp(6px,1.4vh,12px) clamp(8px,1.4vw,18px);text-align:center;border-bottom:1px solid #243049;}
.roi-deck-table th{background:#1E293B;color:#F8FAFC;font-size:clamp(.66rem,1.2vw,.92rem);text-transform:uppercase;letter-spacing:.04em;font-weight:800;}
.roi-deck-table td{color:var(--exec-h);font-weight:600;}
.roi-deck-net{color:var(--exec-pos);font-weight:800;}
.roi-deck-tr-total td{background:#1E293B;font-weight:900;}
.roi-deck-tr-total .roi-deck-net{color:var(--exec-gold);}

/* hero summary */
.roi-hero-number{font-size:clamp(3rem,11vw,8rem);font-weight:900;color:var(--exec-pos);line-height:.95;text-shadow:0 0 32px rgba(34,197,94,.25);}
.roi-hero-label{font-size:clamp(1rem,2.4vw,1.8rem);font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--exec-sub);margin-bottom:1.5vh;}
/* ECS Business Impact (slide 1): 6 executive outcome cards + impact strip */
.roi-slide-impact{justify-content:flex-start;padding:3.2% 4%;gap:1.6vh;}
.roi-impact-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));
  gap:clamp(10px,1.6vw,20px);width:min(96%,1180px);}
.roi-impact-card{background:var(--exec-card);border:1px solid #243049;border-radius:16px;
  padding:clamp(12px,2vh,20px) clamp(14px,1.8vw,24px);text-align:left;
  box-shadow:0 10px 28px rgba(0,0,0,.35);border-top:3px solid var(--exec-accent);}
.roi-impact-t{font-size:clamp(.95rem,1.7vw,1.35rem);font-weight:800;color:var(--exec-h);line-height:1.1;}
.roi-impact-d{font-size:clamp(.8rem,1.3vw,1.05rem);color:var(--exec-sub);font-weight:500;margin-top:.5vh;line-height:1.25;}
.roi-impact-strip{width:min(96%,1180px);background:linear-gradient(90deg,#13203a,#16243f);
  border:1px solid #2b3a57;border-radius:14px;padding:clamp(12px,2vh,22px) clamp(16px,2.4vw,30px);
  font-size:clamp(1rem,1.9vw,1.5rem);font-weight:700;color:var(--exec-h);text-align:center;line-height:1.3;
  box-shadow:0 10px 30px rgba(0,0,0,.4);}
.roi-impact-strip b{color:var(--exec-accent);}
.roi-impact-strip .roi-impact-gold{color:var(--exec-gold);}
@media (max-width:900px){.roi-impact-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
/* approval recommendation (slide 6) */
.roi-slide-approve{background:radial-gradient(120% 110% at 50% 0%,#16243f 0%,transparent 65%);}
.roi-approve-line{display:flex;gap:clamp(14px,3vw,36px);flex-wrap:wrap;justify-content:center;margin-top:1vh;}
.roi-approve-pill{background:var(--exec-panel);color:var(--exec-h);border:1px solid #2b3a57;
  border-radius:999px;padding:1.6vh 2.6vw;font-size:clamp(1rem,2.2vw,1.6rem);font-weight:800;
  box-shadow:0 8px 24px rgba(0,0,0,.35);}
.roi-approve-pill b{color:var(--exec-accent);}
.roi-approve-pill-gold b{color:var(--exec-gold);}
/* ============================================================= */
/* EXECUTIVE 3-SLIDE STORYBOARD (Framework / FTE / Dashboard)    */
/* ============================================================= */
/* slides that hold dense data align to top, not centre */
.roi-slide-fw,.roi-slide-fte,.roi-slide-dash{justify-content:flex-start;padding:2.6% 3.2%;gap:1.4vh;}
.roi-slide-fw .roi-slide-h,.roi-slide-fte .roi-slide-h,.roi-slide-dash .roi-slide-h{font-size:clamp(1.4rem,3vw,2.4rem);}
.roi-slide-fw .roi-slide-sub,.roi-slide-fte .roi-slide-sub,.roi-slide-dash .roi-slide-sub{font-size:clamp(.82rem,1.5vw,1.1rem);max-width:none;}

/* executive KPI row */
.roi-kpi-row{display:flex;gap:clamp(8px,1.3vw,16px);justify-content:center;width:100%;flex-wrap:nowrap;}
.roi-kpi{flex:1 1 0;background:var(--exec-card);border:1px solid #243049;border-top:3px solid var(--exec-accent);
  border-radius:14px;padding:clamp(8px,1.4vh,16px) clamp(8px,1vw,16px);text-align:center;box-shadow:0 8px 22px rgba(0,0,0,.32);min-width:0;}
.roi-kpi-v{font-size:clamp(1.1rem,2.4vw,2rem);font-weight:900;color:var(--exec-h);line-height:1;white-space:nowrap;}
.roi-kpi-l{font-size:clamp(.6rem,1vw,.82rem);color:var(--exec-sub);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-top:.6vh;}
.roi-kpi-gold{border-top-color:var(--exec-gold);}.roi-kpi-gold .roi-kpi-v{color:var(--exec-gold);}
.roi-kpi-accent .roi-kpi-v{color:var(--exec-accent);}

/* executive table — dark header, dark rows, light text, striped, hover */
.roi-exec-table{width:100%;border-collapse:collapse;font-size:clamp(.62rem,1.05vw,.92rem);
  background:var(--exec-card);border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35);
  table-layout:auto!important;}
.roi-exec-table th,.roi-exec-table td{padding:clamp(3px,.7vh,8px) clamp(5px,.8vw,12px);
  border-bottom:1px solid #243049!important;text-align:left;color:var(--exec-h)!important;}
.roi-exec-table thead th,.roi-exec-table th{background:#1E293B!important;color:#F8FAFC!important;text-transform:uppercase;letter-spacing:.03em;
  font-weight:800!important;font-size:clamp(.56rem,.95vw,.8rem);position:sticky;top:0;z-index:2;}
.roi-exec-table tbody td{background:var(--exec-card)!important;color:var(--exec-h)!important;}
.roi-exec-table td.num,.roi-exec-table th.num{text-align:right;font-variant-numeric:tabular-nums;}
.roi-exec-table tbody tr:nth-child(even) td{background:#162133!important;}
.roi-exec-table tbody tr:hover td{background:rgba(56,189,248,.12)!important;color:var(--exec-h)!important;}
.roi-cell-gold{color:var(--exec-gold)!important;font-weight:800;}
.roi-cell-ok{color:var(--exec-pos)!important;font-weight:800;}

/* slide 1: framework table + horizontal bar chart side by side */
.roi-fw-split{display:grid;grid-template-columns:1.25fr 1fr;gap:clamp(12px,2vw,26px);width:100%;
  flex:1 1 auto;min-height:0;align-items:stretch;}
.roi-fw-tablewrap{overflow:auto;max-height:46vh;border-radius:12px;}
.roi-exec-table.roi-fw-table td:first-child,.roi-exec-table.roi-fw-table th:first-child{white-space:nowrap!important;font-weight:700;}
.roi-fw-chart{display:flex;flex-direction:column;min-height:0;}
.roi-hbar-title{font-size:clamp(.78rem,1.4vw,1.05rem);font-weight:800;color:var(--exec-sub);margin-bottom:1vh;text-align:left;}
.roi-hbar{display:flex;flex-direction:column;gap:clamp(3px,.5vh,7px);overflow:auto;max-height:42vh;padding-right:4px;}
.roi-hbar-row{display:grid;grid-template-columns:96px 1fr 56px;align-items:center;gap:8px;}
.roi-hbar-lbl{font-size:clamp(.58rem,1vw,.82rem);font-weight:700;color:var(--exec-h);text-align:right;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.roi-hbar-track{background:rgba(255,255,255,.06);border-radius:6px;height:clamp(11px,1.6vh,18px);overflow:hidden;}
.roi-hbar-fill{height:100%;background:linear-gradient(90deg,#38BDF8,#0EA5E9);border-radius:6px;min-width:3px;
  box-shadow:0 0 14px rgba(56,189,248,.35);}
.roi-hbar-val{font-size:clamp(.58rem,1vw,.82rem);font-weight:800;color:var(--exec-gold);white-space:nowrap;text-align:left;}

/* slide 2: FTE comparison + statement */
.roi-fte-mid{display:grid;grid-template-columns:1.1fr 1fr;gap:clamp(14px,2.6vw,40px);width:100%;align-items:center;flex:1 1 auto;min-height:0;}
.roi-fte-compare{display:flex;align-items:stretch;justify-content:center;gap:clamp(10px,1.6vw,22px);}
.roi-fte-side{flex:1 1 0;background:var(--exec-card);border:1px solid #243049;border-radius:16px;
  padding:clamp(12px,2.2vh,24px);text-align:center;box-shadow:0 8px 22px rgba(0,0,0,.32);}
.roi-fte-side-h{font-size:clamp(.74rem,1.4vw,1.05rem);font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--exec-sub);}
.roi-fte-side-v{font-size:clamp(2.2rem,6vw,4.4rem);font-weight:900;line-height:1;margin:.6vh 0;}
.roi-fte-side-l{font-size:clamp(.66rem,1.2vw,.92rem);color:var(--exec-sub);font-weight:700;}
.roi-fte-bad{border-top:3px solid var(--exec-red);}.roi-fte-bad .roi-fte-side-v{color:var(--exec-red);}
.roi-fte-good{border-top:3px solid var(--exec-pos);}.roi-fte-good .roi-fte-side-v{color:var(--exec-pos);}
.roi-fte-vs{align-self:center;font-size:clamp(1rem,2vw,1.6rem);font-weight:900;color:var(--exec-accent);}
.roi-fte-chart{display:flex;align-items:flex-end;justify-content:center;gap:clamp(14px,3vw,44px);height:30vh;}
.roi-fte-statement{width:100%;text-align:center;background:linear-gradient(90deg,#13203a,#16243f);
  border:1px solid #2b3a57;border-radius:14px;padding:clamp(10px,1.8vh,20px) clamp(16px,2.4vw,30px);
  font-size:clamp(1rem,2vw,1.6rem);font-weight:800;color:var(--exec-h);box-shadow:0 10px 30px rgba(0,0,0,.4);}

/* slide 3: dashboard table + chart + callout */
.roi-dash-split{display:grid;grid-template-columns:1.35fr 1fr;gap:clamp(12px,2vw,28px);width:100%;flex:1 1 auto;min-height:0;align-items:stretch;}
.roi-dash-tablewrap{overflow:auto;max-height:44vh;border-radius:12px;}
.roi-exec-table.roi-dash-table td:first-child,.roi-exec-table.roi-dash-table th:first-child{white-space:nowrap!important;font-weight:700;min-width:160px;width:160px;}
.roi-dash-chart{display:flex;flex-direction:column;min-height:0;}
.roi-dash-chart .roi-chart{width:100%;height:auto;flex:1 1 auto;margin-top:0;gap:clamp(8px,2vw,28px);}
/* slide 3 callout — the strongest visual element: centered, very large type */
.roi-dash-callout{display:flex;gap:clamp(14px,2.6vw,44px);width:100%;justify-content:center;align-items:stretch;
  flex-wrap:nowrap;text-align:center;
  background:linear-gradient(90deg,#0e1b33,#16243f 50%,#0e1b33);
  border:1px solid #2b3a57;border-radius:18px;
