(function(){

  function esc(s) {

  }

  /** Executive trend bar presets — Evidence Aging tab and similar panels. */
  window.ecsExecutiveTrendBarOpts = function(chartId, page, overrides) {
    var base = {
      maxHeight: 96,
      barWidth: 16,
      extraClass: 'ecs-aging-bar-chart',
      labelEvery: 'auto',
      axes: false,
      drill: { page: page || 'trends', chartId: chartId || 'trend' }

    if (!overrides) return base;
    var out = {};
    Object.keys(base).forEach(function(k) { out[k] = base[k]; });
    Object.keys(overrides).forEach(function(k) { out[k] = overrides[k]; });
    return out;
  };

  /** "Nice" axis ceiling + tick step for a given max (e.g. 83 -> 100 by 20). */
  function niceScale(maxVal, desiredTicks) {
    var ticks = desiredTicks || 5;
    if (!(maxVal > 0)) return { max: 1, step: 1, ticks: [0, 1] };
    var rawStep = maxVal / ticks;
    var mag = Math.pow(10, Math.floor(Math.log(rawStep) / Math.LN10));
    var norm = rawStep / mag;
    var niceNorm = norm <= 1 ? 1 : (norm <= 2 ? 2 : (norm <= 5 ? 5 : 10));
    var step = niceNorm * mag;
    var niceMax = Math.ceil(maxVal / step) * step;
    var out = [];
    for (var t = 0; t <= niceMax + 1e-9; t += step) out.push(Math.round(t * 100) / 100);
    return { max: niceMax, step: step, ticks: out };
  }

  /** Build a rich, self-describing tooltip string. */
  function richTip(item, opts, avg, suffix) {
    if (item.tooltip) return item.tooltip;
    var name = opts.metricName || opts.seriesLabel || 'Value';
    var parts = [name];
    parts.push((item.label != null ? item.label + ': ' : '') + item.value + suffix);
    if (item.period) parts.push('Period: ' + item.period);
    if (item.previous != null) {
      parts.push('Previous: ' + item.previous + suffix);
      var prev = Number(item.previous), cur = Number(item.value);
      if (prev) {
        var ch = Math.round((cur - prev) / Math.abs(prev) * 1000) / 10;
        parts.push('Change: ' + (ch > 0 ? '+' : '') + ch + '%');
      }
    }
    if (avg) parts.push('Avg: ' + (Math.round(avg * 10) / 10) + suffix);
    if (item.context || opts.context) parts.push(item.context || opts.context);
    return parts.join(' | ');
  }

  /**
   * Compact vertical bar chart — platform standard.
   * items: [{ label, value, tone?, tooltip?, previous?, period?, context? }]
   * Accessibility opts (self-describing charts):
   *   yLabel, xLabel, units, subtitle, metricName, context
   * When yLabel/xLabel are provided the chart is framed with a rotated Y-axis
   * label, an auto-scaled Y-axis (niceScale ticks), and an X-axis label.

    opts = opts || {};
    var el = typeof target === 'string' ? document.getElementById(target) : target;
    if (!el) return;
    items = items || [];
    // Executive footprint defaults (larger, readable). Callers can still override.
    var maxH = opts.maxHeight || 150;
    var barW = opts.barWidth || 26;
    var suffix = opts.suffix || opts.units || '';
    var labelKey = opts.labelKey || 'label';
    var valKey = opts.valKey || 'value';
    var toneKey = opts.toneKey || 'tone';
    var emptyMsg = opts.emptyMessage || 'No data for selected scope.';
    var drill = opts.drill;
    // Accessibility / self-describing chrome.
    // Every executive chart is self-describing by default: it shows a Y-axis label,
    // an auto-scaled Y-axis with units, and an X-axis label. Callers may override any
    // label, or opt out entirely with `axes: false` for sparkline-style micro charts.
    var axesEnabled = opts.axes !== false;
    var unitWord = opts.units || (suffix === '%' ? '%' : (suffix ? suffix : ''));
    var yLabel = opts.yLabel || (axesEnabled
      ? (opts.metricName || opts.seriesLabel || (suffix === '%' ? 'Value (%)' : 'Value'))
      : '');
    var xLabel = opts.xLabel || (axesEnabled ? (opts.categoryLabel || 'Category') : '');
    var showAxes = axesEnabled && !!(yLabel || xLabel || opts.yScale);
    // Executive chrome toggles (default ON unless explicitly disabled).
    var showBenchmark = opts.benchmark !== false;
    var showLegend = opts.legend !== false;
    var showTrend = opts.trend !== false;
    var labelEvery = opts.labelEvery;
    if (labelEvery === 'auto') {

    } else {

    if (!items.length) {
      el.innerHTML = '<span class="small text-muted" style="font-size:0.66rem">' + esc(emptyMsg) + '</span>';
      el.classList.add('mini-bar-chart');
      return;
    }

    var vals = items.map(function(i) { return Number(i[valKey]) || 0; });
    var dataMax = Math.max.apply(null, vals.concat([1]));

    var max = showAxes ? scale.max : dataMax;
    // Trend = last vs first (month-over-month / period-over-period direction).
    var first = vals[0], last = vals[vals.length - 1];
    var deltaPct = first ? Math.round((last - first) / Math.abs(first) * 100) : 0;
    var trendDir = deltaPct > 1 ? 'up' : (deltaPct < -1 ? 'down' : 'flat');
    var trendArrow = trendDir === 'up' ? '\u25B2' : (trendDir === 'down' ? '\u25BC' : '\u25AC');

    var barsHtml = items.map(function(i, idx) {
      var v = Number(i[valKey]) || 0;

      var tone = i[toneKey] || opts.defaultTone || 'blue';

        ' data-ecs-universal-chart-id="' + esc(drill.chartId || 'trend') + '"' +
        ' data-ecs-universal-element="' + esc(i[labelKey]) + '"' +

        '<div class="ecs-bar-fill tone-' + esc(tone) + '" data-tone="' + esc(tone) + '" style="height:' + h + 'px;width:' + barW + 'px;max-width:' + barW + 'px"></div>' +

    if (showAxes && el.parentNode) {
      var frameId = el.id + '__frame';
      var prevFrame = document.getElementById(frameId);
      var frame = document.createElement('div');
      frame.id = frameId;
      frame.className = 'ecs-chart-frame';
      var plot = document.createElement('div');
      plot.className = 'ecs-chart-plot';
      var refNode = prevFrame || el;
      refNode.parentNode.insertBefore(frame, refNode);
      if (yLabel) {
        var yl = document.createElement('div');
        yl.className = 'ecs-chart-yaxis-label';
        var yUnit = (opts.units && yLabel.indexOf(opts.units) < 0) ? ' (' + opts.units + ')'
          : ((unitWord === '%' && yLabel.indexOf('%') < 0) ? ' (%)' : '');
        yl.textContent = yLabel + yUnit;
        frame.appendChild(yl);
      } else {
        frame.appendChild(document.createElement('div'));
      }
      frame.appendChild(plot);
      // spacer under Y-axis label column
      frame.appendChild(document.createElement('div'));
      if (xLabel) {
        var xl = document.createElement('div');
        xl.className = 'ecs-chart-xaxis-label';
        xl.textContent = xLabel;
        frame.appendChild(xl);
      } else {
        frame.appendChild(document.createElement('div'));
      }
      plot.appendChild(el);
      if (prevFrame && prevFrame !== frame) prevFrame.remove();
    }

    // Legend + trend strip rendered just above the chart (sibling node).
    // When framed, anchor the legend above the entire frame; else above the chart.
    var legendAnchor = (showAxes ? document.getElementById(el.id + '__frame') : null) || el;

    // Title fallback: ensure every chart has a visible title. If the enclosing card
    // already provides one (.chart-card-title / .ecs-hub-chart-title) we leave it; only
    // when none exists do we inject a title (from opts.title or the metric name).
    var titleText = opts.title || opts.chartTitle ||
      (opts.metricName ? opts.metricName + ' by ' + (opts.categoryLabel || 'category') : '');
    var card = el.closest ? el.closest('.chart-card, .executive-analytics-card, .ecs-analytics-chart-card, .ecs-hub-chart') : null;
    var existingTitleEl = card && card.querySelector ? card.querySelector('.chart-card-title, .ecs-hub-chart-title, .ecs-chart-title') : null;
    var hasCardTitle = !!(existingTitleEl && existingTitleEl.textContent && existingTitleEl.textContent.trim());
    if (titleText && !hasCardTitle && legendAnchor.parentNode) {
      var titleId = el.id + '__title';
      var oldTitle = document.getElementById(titleId);
      if (oldTitle) oldTitle.remove();
      var t = document.createElement('div');
      t.id = titleId;
      t.className = 'chart-card-title ecs-chart-title';
      t.textContent = titleText;
      legendAnchor.parentNode.insertBefore(t, legendAnchor);
    }

    if ((showLegend || showTrend) && legendAnchor.parentNode) {
      var stripId = el.id + '__legend';
      var old = document.getElementById(stripId);
      if (old) old.remove();
      var strip = document.createElement('div');
      strip.id = stripId;
      strip.className = 'ecs-chart-legend';
      var html = '';
      if (showLegend) {
        html += '<span class="lg"><span class="sw" style="background:var(--ecs-chart-' +
          esc(opts.defaultTone || (items[0] && items[0][toneKey]) || 'blue') + ')"></span>' +
          esc(opts.seriesLabel || 'Value') + '</span>';
        if (showBenchmark && avg > 0) html += '<span class="lg"><span class="sw bm"></span>Average</span>';
      }
      if (showTrend && items.length >= 2) {
        html += '<span class="ecs-trend-pill ' + trendDir + '">' + trendArrow + ' ' +
          (deltaPct > 0 ? '+' : '') + deltaPct + '% vs start</span>';
      }
      // Surface the chart subtitle/units inline with the legend when supplied.
      if (opts.subtitle) {
        html = '<span class="ecs-chart-helper" style="flex-basis:100%;color:var(--ecs-subtitle)">' +
          esc(opts.subtitle) + (opts.units ? ' \u00b7 ' + esc(opts.units) : '') + '</span>' + html;
      }
      strip.innerHTML = html;
      legendAnchor.parentNode.insertBefore(strip, legendAnchor);
    }
  };

  /** Slim horizontal bar rows. opts: { units, metricName, subtitle, xLabel } */
  window.ecsRenderHorizontalBars = function(target, items, opts) {
    opts = opts || {};
    var el = typeof target === 'string' ? document.getElementById(target) : target;
    if (!el || !items || !items.length) return;
    var suffix = opts.units || opts.suffix || '';
    var max = Math.max.apply(null, items.map(function(i){ return Number(i.value)||0; }).concat([1]));
    var rows = items.map(function(i) {
      var pct = Math.round((Number(i.value)||0) / max * 100);
      var tone = i.tone || 'blue';
      var tip = richTip({ label: i.label, value: i.value, previous: i.previous, period: i.period, context: i.context, tooltip: i.tooltip }, opts, 0, suffix);
      return '<div class="ecs-insight-bar mb-1" title="' + esc(tip) + '">' +
        '<div class="ecs-insight-bar-label"><span>' + esc(i.label) + '</span><span>' + esc(String(i.value) + suffix) + '</span></div>' +
        '<div class="ecs-insight-bar-track"><div class="ecs-insight-bar-fill tone-' + tone + '" style="width:' + pct + '%"></div></div></div>';
    }).join('');
    var head = '';
    if (opts.subtitle || opts.xLabel) {
      head = '<div class="ecs-chart-helper" style="color:var(--ecs-subtitle);margin-bottom:0.25rem">' +
        esc(opts.subtitle || '') + (opts.xLabel ? (opts.subtitle ? ' \u00b7 ' : '') + esc(opts.xLabel) + (suffix ? ' (' + esc(suffix) + ')' : '') : '') + '</div>';
    }
    el.innerHTML = head + rows;
  };

  /** SVG sparkline */
  window.ecsRenderSparkline = function(target, items, opts) {
    opts = opts || {};
    var el = typeof target === 'string' ? document.getElementById(target) : target;
    if (!el) return;
    items = items || [];
    if (!items.length) { el.innerHTML = ''; return; }
    var valKey = opts.valKey || 'value';
    var labelKey = opts.labelKey || 'label';
    var vals = items.map(function(i){ return Number(i[valKey])||0; });
    var min = Math.min.apply(null, vals);
    var max = Math.max.apply(null, vals);
    var range = max - min || 1;
    var w = opts.width || 200;
    var h = opts.height || 44;
    var pad = 4;
    var color = opts.color || PALETTE.blue;
    var pts = items.map(function(item, idx) {
      var x = pad + (idx / Math.max(items.length - 1, 1)) * (w - pad * 2);
      var y = pad + (1 - ((Number(item[valKey])||0) - min) / range) * (h - pad * 2);
      return x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
    el.innerHTML = '<svg class="ecs-sparkline" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" role="img" aria-label="Trend">' +
      '<polyline fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" points="' + pts + '"/></svg>';
  };

  window.ecsChartPalette = PALETTE;
})();
</script>
