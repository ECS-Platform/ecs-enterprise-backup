# Phase-1 predefined query registry — configuration-first MVP subset.
# Query text remains in the Excel workbook + supplementary_query_catalog.py.
# This file selects which controls are enabled for Phase-1 delivery only.

phase_label: Phase1

technologies:
  - PostgreSQL
  - YugabyteDB
  - Aurora MySQL
  - Oracle
  - Linux
  - Red Hat Enterprise Linux 8.x
  - Red Hat Enterprise Linux 9.x
  - NGINX
  - Apache HTTPD
  - Tomcat
  - SonarQube
  - Trivy
  - GitLeaks
  - Kubernetes
  - OpenShift

deferred_technologies:
  - Windows
  - SQL Server
  - MongoDB
  - Redis
  - Aerospike
  - Unknown

technology_connectors:
  PostgreSQL:
    connector: postgresql_connector
    execution_mode: sql
    target_key: postgresql
    target_required: true
  YugabyteDB:
    connector: yugabyte_connector
    execution_mode: sql
    target_key: yugabyte
    target_required: true
  Aurora MySQL:
    connector: mysql_connector
    execution_mode: sql
    target_key: aurora_mysql
    target_required: true
  Oracle:
    connector: oracle_connector
    execution_mode: sql
    target_key: oracle
    target_required: true
  Linux:
    connector: linux_connector
    execution_mode: shell
    target_key: linux
    target_required: true
  Red Hat Enterprise Linux 8.x:
