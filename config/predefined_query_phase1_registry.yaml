    execution_mode: shell
    target_key: nginx
    target_required: true
  Apache HTTPD:
    connector: linux_connector
    execution_mode: shell
    target_key: apache
    target_required: true
  Tomcat:
    connector: linux_connector
    execution_mode: shell
    target_key: tomcat
    target_required: true
  SonarQube:
    connector: sonarqube_connector
    execution_mode: rest_api
    target_key: sonarqube
    target_required: true
  Trivy:
    connector: trivy_connector
    execution_mode: scanner
    target_key: trivy
    target_required: true
  GitLeaks:
    connector: gitleaks_connector
    execution_mode: scanner
    target_key: gitleaks
    target_required: true
  Kubernetes:
    connector: kubernetes_connector
    execution_mode: cli
    target_key: kubernetes
    target_required: true
  OpenShift:
    connector: openshift_connector
    execution_mode: cli
    target_key: openshift
    target_required: true

