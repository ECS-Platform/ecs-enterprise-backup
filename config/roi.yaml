# ECS Executive ROI & Value Realization Center — configuration.
#
# DETERMINISTIC, NON-LLM. Every number shown in the ROI Center is computed by the
# app/roi engine from the assumptions below — there are NO hardcoded values in the
# UI. Changing these values changes ROI OUTPUT only; never workflow/RBAC/audit/
# observation/schema.
#
# The whole module is DISABLED by default. Enable with ROI_CENTER_ENABLED=true.

roi:
  enabled: ${ROI_CENTER_ENABLED:-false}

  # ---- Currency / display -------------------------------------------------- #
  currency:
    symbol: "₹"
    code: "INR"
    # Indian scale: 1 Lakh = 100,000 ; 1 Crore = 10,000,000.
    lakh: 100000
    crore: 10000000

  # ---- Bank-wide baseline assumptions (all editable) ----------------------- #
  assumptions:
    applications_in_bank: 905          # total applications across the bank
    vapt_applications: 600             # applications in scope for VAPT
    observations_per_application: 2.5  # average observations raised per application
    emails_per_observation: 7          # average emails exchanged to resolve one observation
    hours_per_observation: 8           # average manual effort (hours) per observation
    hours_per_email: 0.25              # effort per email (read + write + follow-up)
    hours_per_audit: 160              # manual effort for one audit cycle
    hours_per_framework_onboarding: 80 # manual effort to onboard one framework manually
    cost_per_hour: 1500                # blended ₹/hour for compliance/audit effort
    working_hours_per_fte_year: 1800   # productive hours per FTE per year
    # Baseline anchor: ₹4.5 Cr saved per 25 onboarded applications.
    baseline_savings_per_25_apps_cr: 4.5

  # ---- ECS efficiency factors (how much ECS removes) ----------------------- #
  efficiency:
    email_reduction_pct: 0.85          # share of observation emails ECS eliminates
    observation_effort_reduction_pct: 0.6  # manual effort removed per observation
    observation_prevention_pct: 0.3    # share of observations ECS prevents outright
    audit_effort_reduction_pct: 0.55   # audit effort removed by ECS readiness
    framework_onboarding_reduction_pct: 0.7
    evidence_reuse_factor: 4           # average times one evidence artifact is reused
    reuse_hours_saved_each: 1.5        # hours saved each time evidence is reused
    closure_acceleration_pct: 0.65     # reduction in observation closure time
    # Implementation/run cost used as the ROI denominator (₹ per onboarded app/yr).
    cost_per_app_per_year: 60000

  # ---- Executive scenario profiles ----------------------------------------- #
  # Each scenario overrides a subset of assumptions/efficiency. The engine merges
  # the active scenario's overrides on top of the baseline assumptions above, so
  # ALL calculations, projections, charts, waterfall, framework ROI, summaries and
  # takeaways recompute when the scenario changes. Default = expected.
  default_scenario: expected
  scenarios:
    conservative:
      label: "Conservative"
      adoption_pct: 0.30                 # only 30% of in-scope apps onboarded
      target_applications: 600           # VAPT-only universe
      frameworks: ["VAPT"]
      observations_per_application: 1.5
      email_reduction_pct: 0.50
      evidence_reuse_factor: 1.3         # ~30% reuse uplift
      observation_prevention_pct: 0.25
      closure_acceleration_pct: 0.40
      audit_effort_reduction_pct: 0.40
      framework_onboarding_reduction_pct: 0.50
    expected:
      label: "Expected"
      adoption_pct: 1.0
      target_applications: 605           # VAPT applications (recommended)
      frameworks: ["VAPT"]
      observations_per_application: 2.5
      emails_per_observation: 7
      email_reduction_pct: 0.65
      evidence_reuse_factor: 2.0         # ~50% reuse
      observation_prevention_pct: 0.50
      closure_acceleration_pct: 0.65
      audit_effort_reduction_pct: 0.55
      framework_onboarding_reduction_pct: 0.70
    aggressive:
      label: "Aggressive"
      adoption_pct: 1.0
      target_applications: 905           # full bank, multi-framework
      frameworks: ["VAPT", "RBI", "ISO27001", "PCI-DSS", "SWIFT", "AI Governance"]
      observations_per_application: 2.5
      email_reduction_pct: 0.85
      evidence_reuse_factor: 5.0         # high reuse across frameworks
      observation_prevention_pct: 0.60
      closure_acceleration_pct: 0.80
      audit_effort_reduction_pct: 0.65
      framework_onboarding_reduction_pct: 0.80

  # ---- Value driver weighting (Section 2) ---------------------------------- #
  # Relative contribution of each lever to total ECS value (configurable).
  value_drivers:
    evidence_reuse: 0.40
    observation_prevention: 0.25
    closure_acceleration: 0.15
    auditor_productivity: 0.10
    email_reduction: 0.05
    framework_automation: 0.05

  # ---- Payback analysis (Section 4) ---------------------------------------- #
  payback:
    # Total implementation/program investment (₹). Configurable.
    implementation_cost: 80000000        # ₹8 Cr program investment
    annual_run_cost: 20000000            # ₹2 Cr/yr run cost
    horizons_years: [3, 5, 10]

  # ---- Team / investment workstreams (Section 9) --------------------------- #
  # Investment is illustrative & configurable; NO hardcoded team sizes in UI.
  workstreams:
    - name: "Core Platform"
      headcount: 6
      annual_cost: 18000000
    - name: "Integrations"
      headcount: 4
      annual_cost: 11000000
    - name: "AI & Evidence Intelligence"
      headcount: 4
      annual_cost: 13000000
    - name: "DevOps & Platform"
      headcount: 3
      annual_cost: 9000000
    - name: "Operations & Reliability"
      headcount: 3
      annual_cost: 8000000
    - name: "Database & Data Platform"
      headcount: 2
      annual_cost: 6000000
    - name: "Program Governance"
      headcount: 2
      annual_cost: 7000000

  # ---- Observation aging (final executive pass) ---------------------------- #
  aging:
    before_closure_days: 45   # avg observation closure days before ECS
    # after = before * (1 - closure_acceleration_pct), computed by the engine.

  # ---- Enterprise rollout simulator milestones ----------------------------- #
  rollout:
    milestones: [25, 100, 250, 500, 605, 905]

  # ---- Risk reduction model ------------------------------------------------ #
  risk:
    # Deterministic risk-reduction curve: more onboarded apps -> higher coverage,
    # capped at max_reduction_pct.
    per_app_reduction_pct: 0.12
    max_reduction_pct: 78

  # ---- Onboarding ramp (storyboard + projections) -------------------------- #
  onboarding:
    apps_per_year: 100                 # default linear onboarding pace
    storyboard_apps: [25, 100, 200]    # Screens 3-5
    projection_apps: [25, 100, 200, 400, 600]  # 5-year projection (Screen 8)
    projection_years: [1, 2, 3, 4, 5]

  # ---- Framework value view (Screen 6) ------------------------------------- #
  # weight = relative share of observations/effort attributable to the framework;
  # apps_covered may be overridden per framework, else derived from coverage_pct.
  frameworks:
    - name: "VAPT"
      apps_covered: 600
      weight: 1.4
      reuse_factor: 5
    - name: "RBI"
      coverage_pct: 0.9
      weight: 1.2
      reuse_factor: 4
    - name: "ISO27001"
      coverage_pct: 0.7
      weight: 1.0
      reuse_factor: 4
    - name: "PCI-DSS"
      coverage_pct: 0.4
      weight: 1.1
      reuse_factor: 3
    - name: "SWIFT"
      coverage_pct: 0.25
      weight: 1.0
      reuse_factor: 3
    - name: "AI Governance"
      coverage_pct: 0.15
      weight: 0.8
      reuse_factor: 2
