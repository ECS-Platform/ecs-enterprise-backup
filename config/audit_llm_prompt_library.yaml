    input_variables: [application, framework, status]
    required_context: [observations]
    system_prompt: *sys_det
    user_prompt_template: |
      Summarize this observation count result for {application_or_all}:
      {deterministic_result}
    expected_output_format: "short_text_with_number"
    confidence_policy: not_applicable
    citation_policy: none
    risk_level: low
    token_profile: small_4k
    applicable_frameworks: [ALL]
    applicable_roles: [auditor, compliance_head, owner, cio]
    recommended_model_size: small
    local_16gb_supported: true
    local_20gb_supported: true

