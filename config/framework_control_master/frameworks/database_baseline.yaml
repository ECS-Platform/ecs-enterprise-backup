controls:
- id: DBB-C-01
  title: Transparent Data Encryption
  domain: Encryption
  criticality: High
  description: TDE enabled on production databases storing sensitive data.
  policy_refs:
  - DBB-POL-ENCRYPTION-01
  procedures:
  - id: DBB-PROC-01
    title: Execute — Transparent Data Encryption
    owner: Control Owner
    frequency: Quarterly
    steps:
    - Identify in-scope applications and environments for Transparent Data Encryption.
    - Collect configuration or attestation artefacts from system owners.
    - Validate evidence against policy baseline and record exceptions.
    - Submit evidence package for auditor review and track remediation.
  evidence_requirements:
  - id: DBB-EVR-011
    title: Transparent Data Encryption — primary attestation
    artefact_type: Attestation / Configuration Export
    frequency: Quarterly
    collection_method: Manual Upload
    retention_period: 12 months
  - id: DBB-EVR-012
    title: Transparent Data Encryption — supporting review log
    artefact_type: Review Log / Scan Report
    frequency: Quarterly
    collection_method: Scheduler Pull
    retention_period: 12 months
