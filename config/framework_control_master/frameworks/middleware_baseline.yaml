controls:
- id: MWB-C-01
  title: TLS 1.2+ on Internet Banking Edge
  domain: TLS
  criticality: High
  description: Edge proxy enforces approved cipher suites.
  policy_refs:
  - MWB-POL-TLS-01
  procedures:
  - id: MWB-PROC-01
    title: Execute — TLS 1.2+ on Internet Banking Edge
    owner: Control Owner
    frequency: Quarterly
    steps:
    - Identify in-scope applications and environments for TLS 1.2+ on Internet Banking
      Edge.
    - Collect configuration or attestation artefacts from system owners.
    - Validate evidence against policy baseline and record exceptions.
    - Submit evidence package for auditor review and track remediation.
  evidence_requirements:
  - id: MWB-EVR-011
    title: TLS 1.2+ on Internet Banking Edge — primary attestation
    artefact_type: Attestation / Configuration Export
    frequency: Quarterly
    collection_method: Manual Upload
    retention_period: 12 months
  - id: MWB-EVR-012
    title: TLS 1.2+ on Internet Banking Edge — supporting review log
    artefact_type: Review Log / Scan Report
    frequency: Quarterly
    collection_method: Scheduler Pull
    retention_period: 12 months
