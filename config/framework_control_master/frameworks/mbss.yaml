controls:
- id: MBSS-C-01
  title: Privileged Access Review
  domain: Identity
  criticality: High
  description: Quarterly recertification of privileged accounts.
  policy_refs:
  - MBSS-POL-IDENTITY-01
  procedures:
  - id: MBSS-PROC-01
    title: Execute — Privileged Access Review
    owner: Control Owner
    frequency: Quarterly
    steps:
    - Identify in-scope applications and environments for Privileged Access Review.
    - Collect configuration or attestation artefacts from system owners.
    - Validate evidence against policy baseline and record exceptions.
    - Submit evidence package for auditor review and track remediation.
  evidence_requirements:
  - id: MBSS-EVR-011
    title: Privileged Access Review — primary attestation
    artefact_type: Attestation / Configuration Export
    frequency: Quarterly
    collection_method: Manual Upload
    retention_period: 12 months
  - id: MBSS-EVR-012
    title: Privileged Access Review — supporting review log
    artefact_type: Review Log / Scan Report
    frequency: Quarterly
    collection_method: Scheduler Pull
    retention_period: 12 months
