  code: MBSS
  name: MBSS
  display_name: Minimum Baseline Security Standard
  category: Security Baseline
  regulator: Information Security
  version: '2026.1'
  description: Enterprise minimum security baseline for production banking systems.
  source: file_catalog
  phase: 1
