controls:
- id: VAP-C-01
  title: Internal Vulnerability Assessment
  domain: Internal VA
  criticality: High
  description: Quarterly authenticated scan of CDE assets.
  policy_refs:
  - VAP-POL-INTERNAL_VA-01
  procedures:
  - id: VAP-PROC-01
    title: Execute — Internal Vulnerability Assessment
    owner: Control Owner
    frequency: Quarterly
    steps:
    - Identify in-scope applications and environments for Internal Vulnerability Assessment.
    - Collect configuration or attestation artefacts from system owners.
    - Validate evidence against policy baseline and record exceptions.
    - Submit evidence package for auditor review and track remediation.
  evidence_requirements:
  - id: VAP-EVR-011
    title: Internal Vulnerability Assessment — primary attestation
    artefact_type: Attestation / Configuration Export
    frequency: Quarterly
    collection_method: Manual Upload
    retention_period: 12 months
  - id: VAP-EVR-012
    title: Internal Vulnerability Assessment — supporting review log
    artefact_type: Review Log / Scan Report
    frequency: Quarterly
    collection_method: Scheduler Pull
    retention_period: 12 months
