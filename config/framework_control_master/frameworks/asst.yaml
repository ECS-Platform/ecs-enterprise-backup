controls:
- id: ASST-C-01
  title: Encryption Posture
  domain: Encryption
  criticality: High
  description: Data-at-rest and in-transit encryption self-attestation.
  policy_refs:
  - ASST-POL-ENCRYPTION-01
  procedures:
  - id: ASST-PROC-01
    title: Execute — Encryption Posture
    owner: Control Owner
    frequency: Quarterly
    steps:
    - Identify in-scope applications and environments for Encryption Posture.
    - Collect configuration or attestation artefacts from system owners.
    - Validate evidence against policy baseline and record exceptions.
    - Submit evidence package for auditor review and track remediation.
  evidence_requirements:
  - id: ASST-EVR-011
    title: Encryption Posture — primary attestation
    artefact_type: Attestation / Configuration Export
    frequency: Quarterly
    collection_method: Manual Upload
    retention_period: 12 months
  - id: ASST-EVR-012
    title: Encryption Posture — supporting review log
    artefact_type: Review Log / Scan Report
    frequency: Quarterly
    collection_method: Scheduler Pull
    retention_period: 12 months
