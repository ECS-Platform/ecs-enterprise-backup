framework:
  id: asst
  code: ASST
  name: ASST
  display_name: Application Security Self-Assessment
  category: Pre-Assessment
  regulator: AppSec CoE
  version: '2026.1'
  description: Pre-audit application security posture questionnaire for banking channels.
  source: file_catalog
  phase: 1
policies:
- id: ASST-POL-ENCRYPTION-01
  title: Encryption Policy
  description: Governing policy for encryption requirements within Application Security
    Self-Assessment.
  owner: Compliance & Controls
  status: Active
  review_frequency: Annual
- id: ASST-POL-AUTHENTICATI-01
  title: Authentication Policy
