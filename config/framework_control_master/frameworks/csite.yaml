controls:
- id: CSI-C-01
  title: SIEM Alert Monitoring & Triage
  domain: SOC Operations
  criticality: High
  description: 24x7 alert triage within defined SLA.
  policy_refs:
  - CSI-POL-SOC_OPERATIO-01
  procedures:
  - id: CSI-PROC-01
    title: Execute — SIEM Alert Monitoring & Triage
    owner: Control Owner
    frequency: Quarterly
    steps:
    - Identify in-scope applications and environments for SIEM Alert Monitoring &
      Triage.
    - Collect configuration or attestation artefacts from system owners.
    - Validate evidence against policy baseline and record exceptions.
    - Submit evidence package for auditor review and track remediation.
  evidence_requirements:
  - id: CSI-EVR-011
    title: SIEM Alert Monitoring & Triage — primary attestation
    artefact_type: Attestation / Configuration Export
    frequency: Quarterly
    collection_method: Manual Upload
    retention_period: 12 months
  - id: CSI-EVR-012
    title: SIEM Alert Monitoring & Triage — supporting review log
    artefact_type: Review Log / Scan Report
    frequency: Quarterly
    collection_method: Scheduler Pull
    retention_period: 12 months
