controls:
- id: PCI-C-01
  title: Req 1.2 — Network Segmentation
  domain: Network
  criticality: High
  description: CDE segmented from untrusted networks.
  policy_refs:
  - PCI-POL-NETWORK-01
  procedures:
  - id: PCI-PROC-01
    title: Execute — Req 1.2 — Network Segmentation
    owner: Control Owner
    frequency: Quarterly
    steps:
    - Identify in-scope applications and environments for Req 1.2 — Network Segmentation.
    - Collect configuration or attestation artefacts from system owners.
    - Validate evidence against policy baseline and record exceptions.
    - Submit evidence package for auditor review and track remediation.
  evidence_requirements:
  - id: PCI-EVR-011
    title: Req 1.2 — Network Segmentation — primary attestation
    artefact_type: Attestation / Configuration Export
    frequency: Quarterly
    collection_method: Manual Upload
    retention_period: 12 months
  - id: PCI-EVR-012
    title: Req 1.2 — Network Segmentation — supporting review log
    artefact_type: Review Log / Scan Report
    frequency: Quarterly
    collection_method: Scheduler Pull
    retention_period: 12 months
