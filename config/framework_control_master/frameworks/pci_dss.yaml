  code: PCI
  name: PCI DSS
  display_name: Payment Card Industry Data Security Standard
  category: Regulatory
  regulator: PCI SSC
  version: 4.0.1
  description: Cardholder data environment controls for payment processing channels.
  source: file_catalog
  phase: 1
policies:
- id: PCI-POL-NETWORK-01
  title: Network Policy
  description: Governing policy for network requirements within Payment Card Industry
