controls:
- id: ITPP-C-01
  title: DR Plan Exists
  domain: Disaster Recovery
  criticality: High
  description: Enterprise DR plan approved and published annually.
  policy_refs:
  - ITPP-POL-DISASTER_REC-01
  procedures:
  - id: ITPP-PROC-01
    title: Execute — DR Plan Exists
    owner: Control Owner
    frequency: Quarterly
    steps:
    - Identify in-scope applications and environments for DR Plan Exists.
    - Collect configuration or attestation artefacts from system owners.
    - Validate evidence against policy baseline and record exceptions.
    - Submit evidence package for auditor review and track remediation.
  evidence_requirements:
  - id: ITPP-EVR-011
    title: DR Plan Exists — primary attestation
    artefact_type: Attestation / Configuration Export
    frequency: Quarterly
    collection_method: Manual Upload
    retention_period: 12 months
  - id: ITPP-EVR-012
    title: DR Plan Exists — supporting review log
    artefact_type: Review Log / Scan Report
    frequency: Quarterly
    collection_method: Scheduler Pull
    retention_period: 12 months
