framework:
  id: os_baseline
  code: OSB
  name: OS Baseline
  display_name: Operating System Baseline
  category: Security Baseline
  regulator: Infrastructure Operations
  version: '2026.1'
  description: CIS-aligned operating system hardening for Linux and Windows production
    servers.
  source: file_catalog
  phase: 1
policies:
- id: OSB-POL-HARDENING-01
  title: Hardening Policy
  description: Governing policy for hardening requirements within Operating System
    Baseline.
  owner: Compliance & Controls
  status: Active
  review_frequency: Annual
- id: OSB-POL-ACCESS-01
  title: Access Policy
  description: Governing policy for access requirements within Operating System Baseline.
  owner: Compliance & Controls
  status: Active
  review_frequency: Annual
- id: OSB-POL-PATCH-01
  title: Patch Policy
  description: Governing policy for patch requirements within Operating System Baseline.
  owner: Compliance & Controls
  status: Active
  review_frequency: Annual
- id: OSB-POL-MONITORING-01
  title: Monitoring Policy
  description: Governing policy for monitoring requirements within Operating System
