  review_frequency: Annual
controls:
- id: OSB-C-01
  title: Linux Server Hardening — CIS L2
  domain: Hardening
  criticality: High
  description: CIS benchmark scan with remediation tracker.
  policy_refs:
  - OSB-POL-HARDENING-01
  procedures:
  - id: OSB-PROC-01
    title: Execute — Linux Server Hardening — CIS L2
    owner: Control Owner
    frequency: Quarterly
    steps:
    - Identify in-scope applications and environments for Linux Server Hardening —
      CIS L2.
    - Collect configuration or attestation artefacts from system owners.
    - Validate evidence against policy baseline and record exceptions.
    - Submit evidence package for auditor review and track remediation.
  evidence_requirements:
  - id: OSB-EVR-011
    title: Linux Server Hardening — CIS L2 — primary attestation
    artefact_type: Attestation / Configuration Export
    frequency: Quarterly
    collection_method: Manual Upload
    retention_period: 12 months
  - id: OSB-EVR-012
    title: Linux Server Hardening — CIS L2 — supporting review log
    artefact_type: Review Log / Scan Report
    frequency: Quarterly
    collection_method: Scheduler Pull
    retention_period: 12 months
- id: OSB-C-02
  title: SSH Access Restrictions
  domain: Access
