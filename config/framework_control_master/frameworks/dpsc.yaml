controls:
- id: DPSC-C-01
  title: API Security Gateway Hardening
  domain: API Security
  criticality: High
  description: WAF and OAuth validation on payment APIs.
  policy_refs:
  - DPSC-POL-API_SECURITY-01
  procedures:
  - id: DPSC-PROC-01
    title: Execute — API Security Gateway Hardening
    owner: Control Owner
    frequency: Quarterly
    steps:
    - Identify in-scope applications and environments for API Security Gateway Hardening.
    - Collect configuration or attestation artefacts from system owners.
    - Validate evidence against policy baseline and record exceptions.
    - Submit evidence package for auditor review and track remediation.
  evidence_requirements:
  - id: DPSC-EVR-011
    title: API Security Gateway Hardening — primary attestation
    artefact_type: Attestation / Configuration Export
    frequency: Quarterly
    collection_method: Manual Upload
    retention_period: 12 months
  - id: DPSC-EVR-012
    title: API Security Gateway Hardening — supporting review log
    artefact_type: Review Log / Scan Report
    frequency: Quarterly
    collection_method: Scheduler Pull
    retention_period: 12 months
